name: Merge OCTO App into Spark App (Update Only)
 
on:
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
 
    env:
      ENV_URL: https://itstcoedev.crm8.dynamics.com
 
      # Solution names
      SPARK_SOLUTION_NAME: ITSTCOE_SETF_UATNext_Spark_Solution
      OCTO_SOLUTION_NAME: ITSTCOE_OCTO_UATNext_Test_Solution
 
      # Output zips
      SPARK_ZIP: spark.zip
      OCTO_ZIP: octo.zip
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
 
      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1
 
      # --------------------------------------------------
      # EXPORT BOTH SOLUTIONS
      # --------------------------------------------------
 
      - name: Export Spark Solution (identity anchor)
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ env.ENV_URL }}
          solution-name: ${{ env.SPARK_SOLUTION_NAME }}
          solution-output-file: ${{ env.SPARK_ZIP }}
          managed: false
          app-id: ${{ secrets.APPLICATION_ID }}
          client-secret: ${{ secrets.SECRET_VALUE }}
          tenant-id: ${{ secrets.DIRECTORY_ID }}
 
      - name: Export OCTO Solution (content source)
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ env.ENV_URL }}
          solution-name: ${{ env.OCTO_SOLUTION_NAME }}
          solution-output-file: ${{ env.OCTO_ZIP }}
          managed: false
          app-id: ${{ secrets.APPLICATION_ID }}
          client-secret: ${{ secrets.SECRET_VALUE }}
          tenant-id: ${{ secrets.DIRECTORY_ID }}
 
      # --------------------------------------------------
      # UNPACK BOTH
      # --------------------------------------------------
 
      - name: Unpack Spark Solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: ${{ env.SPARK_ZIP }}
          solution-folder: spark_unpacked
          solution-type: Unmanaged
          overwrite-files: true
 
      - name: Unpack OCTO Solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: ${{ env.OCTO_ZIP }}
          solution-folder: octo_unpacked
          solution-type: Unmanaged
          overwrite-files: true
 
      # --------------------------------------------------
      # COPY OCTO APP CONTENT INTO SPARK APP
      # --------------------------------------------------
 
      - name: Sync Canvas App Metadata Files Only
        shell: pwsh
        run: |
          $octoPath  = "octo_unpacked/CanvasApps"
          $sparkPath = "spark_unpacked/CanvasApps"

          $appTokens = @("uatnext", "qtestcoordinator")

          $allowedSuffixes = @(
            "_AdditionalUris0_identity.json",
            ".meta.xml"
          )

          foreach ($app in $appTokens) {

            Write-Host "Processing app: $app"

            foreach ($suffix in $allowedSuffixes) {

              # Find Octo file (AND condition)
              $octoFile = Get-ChildItem $octoPath -File |
                Where-Object {
                  $_.Name -match $app -and $_.Name -like "*$suffix"
                }

              # Find Spark file (AND condition)
              $sparkFile = Get-ChildItem $sparkPath -File |
                Where-Object {
                  $_.Name -match $app -and $_.Name -like "*$suffix"
                }

              if ($sparkFile.Count -ne 1) {
                Write-Error "Spark missing required file: $app | $suffix"
                exit 1
              }

              if ($octoFile.Count -eq 1) {
                Write-Host "  Replacing $suffix"
                Copy-Item $octoFile.FullName $sparkFile.FullName -Force
              }
              else {
                Write-Host "  Octo file not found, keeping Spark version: $suffix"
              }
            }
          }

 
      # --------------------------------------------------
      # 🔥 MSAPP SURGERY: OCTO → SPARK REFERENCES
      # --------------------------------------------------
 
      - name: Fix Environment Variables, Connectors & Flows
        shell: pwsh
        run: |
          $replaceMap = @{
          
            # Custom Connectors
            "ITS-TCOE_OCTO_UATNextTestMain" = "ITS-TCOE_SETF_UATNextSparkMain"
            "ITS-TCOE_OCTO_UATNextTestELog" = "ITS-TCOE_SETF_UATNextSparkELog"
 
            # Environment Variables
            "ITS-TCOE_OCTO_UATNext_Test_qTestProjectID"    = "ITS-TCOE_SETF_UATNext_Spark_qTestProjectID"
            "ITS-TCOE_OCTO_UATNext_Test_TestCaseModuleID" = "ITS-TCOE_SETF_UATNext_Spark_TestCaseModuleID"
            "ITS-TCOE_OCTO_UATNext_Test_qTestModuleID"    = "ITS-TCOE_SETF_UATNext_Spark_qTestModuleID"
            "ITS-TCOE_OCTO_UATNext_Test_AQUAModuleID"     = "ITS-TCOE_SETF_UATNext_Spark_AQUAModuleID"
            "ITS-TCOE_OCTO_UATNext_Test_Releases"         = "ITS-TCOE_SETF_UATNext_SparkReleases"
            "ITS-TCOE_OCTO_UATNext_Test_ModuleController" = "ITS-TCOE_SETF_UATNext_Spark_ModuleController"
            "ITS-TCOE_OCTO_UATNext_Test_Teams"            = "ITS-TCOE_SETF_UATNext_Spark_Teams"
 
            # Cloud Flow
            "ITS-TCOE_OCTO_UATNext_Test_AttachmentUpload_Flow" = "ITS-TCOE_SETF_UATNext_Spark_AttachmentUpload_Flow"
          }
 
          $apps = Get-ChildItem "spark_unpacked/CanvasApps" -Filter "*.msapp"
 
          foreach ($app in $apps) {
            $tmp = "tmp_extract"
            Expand-Archive $app.FullName $tmp -Force
 
            Get-ChildItem $tmp -Recurse -File | ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              $changed = $false
 
              foreach ($key in $replaceMap.Keys) {
                if ($content.Contains($key)) {
                  $content = $content.Replace($key, $replaceMap[$key])
                  $changed = $true
                }
              }
 
              if ($changed) {
                Set-Content $_.FullName $content
              }
            }
 
            Compress-Archive "$tmp/*" $app.FullName -Force
            Remove-Item $tmp -Recurse -Force
          }

      # --------------------------------------------------
      # CHECKING REQUIRED FILES BEFORE PACKING (MSAPP + JSON + XML)
      # --------------------------------------------------

      - name: Ensure Required Canvas App Files Exist
        shell: pwsh
        run: |
          $canvasPath = "spark_unpacked/CanvasApps"

          # Find all Canvas Apps by msapp
          $apps = Get-ChildItem $canvasPath |
            Where-Object { $_.Name -match "_DocumentUri\.msapp$" }

          foreach ($msapp in $apps) {
            $base = $msapp.Name -replace "_DocumentUri\.msapp$", ""

            $requiredFiles = @(
              "$base`_BackgroundImageUri",
              "$base`_AdditionalUris0_identity.json",
              "$base.meta.xml"
            )

            foreach ($file in $requiredFiles) {
              $fullPath = Join-Path $canvasPath $file
              if (-not (Test-Path $fullPath)) {
                Write-Host "Creating missing required file: $file"
                New-Item -Path $fullPath -ItemType File | Out-Null
              }
            }
          }

 
      # --------------------------------------------------
      # PACK & IMPORT (UPDATE ONLY)
      # --------------------------------------------------
 
      - name: Pack Spark Solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: spark_unpacked
          solution-file: Spark_Updated.zip
          solution-type: Unmanaged
 
      - name: Import Spark Solution (Update Existing Apps)
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ env.ENV_URL }}
          solution-file: Spark_Updated.zip
          app-id: ${{ secrets.APPLICATION_ID }}
          client-secret: ${{ secrets.SECRET_VALUE }}
          tenant-id: ${{ secrets.DIRECTORY_ID }}
