name: Merge DealerCRM App into Insight App (Update Only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest

    env:
      ENV_URL: https://itstcoedev.crm8.dynamics.com

      # Solution names
      DealerCRM_SOLUTION_NAME: ITS_TCOE_SET_UATNext_DealerCRM_Solution
      Insight_SOLUTION_NAME: ITSTCOE_Insights_UATNext_Solution

      # Output zips
      DealerCRM_ZIP: dealercrm.zip
      Insight_ZIP: insight.zip

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      # --------------------------------------------------
      # EXPORT BOTH SOLUTIONS
      # --------------------------------------------------

      - name: Export DealerCRM Solution
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ env.ENV_URL }}
          solution-name: ${{ env.DealerCRM_SOLUTION_NAME }}
          solution-output-file: ${{ env.DealerCRM_ZIP }}
          managed: false
          app-id: ${{ secrets.APPLICATION_ID }}
          client-secret: ${{ secrets.SECRET_VALUE }}
          tenant-id: ${{ secrets.DIRECTORY_ID }}

      - name: Export Insight Solution
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ env.ENV_URL }}
          solution-name: ${{ env.Insight_SOLUTION_NAME }}
          solution-output-file: ${{ env.Insight_ZIP }}
          managed: false
          app-id: ${{ secrets.APPLICATION_ID }}
          client-secret: ${{ secrets.SECRET_VALUE }}
          tenant-id: ${{ secrets.DIRECTORY_ID }}

      # --------------------------------------------------
      # UNPACK BOTH
      # --------------------------------------------------  

      - name: Unpack DealerCRM Solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: ${{ env.DealerCRM_ZIP }}
          solution-folder: dealercrm_unpacked
          solution-type: Unmanaged
          overwrite-files: true

      - name: Unpack Insight Solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: ${{ env.Insight_ZIP }}
          solution-folder: insight_unpacked
          solution-type: Unmanaged
          overwrite-files: true

      # --------------------------------------------------
      # COPY DealerCRM APP CONTENT INTO Insight APP
      # --------------------------------------------------

      - name: Replace Insight Canvas App Content
        shell: pwsh
        run: |
          $insightApps = Get-ChildItem "insight_unpacked/CanvasApps" -Filter "*.msapp"
          $DealerCRMApps = Get-ChildItem "dealercrm_unpacked/CanvasApps" -Filter "*.msapp"
          if ($insightApps.Count -ne $DealerCRMApps.Count) {
            Write-Error "Canvas App count mismatch"
            exit 1
          }
          for ($i = 0; $i -lt $insightApps.Count; $i++) {
            Copy-Item $DealerCRMApps[$i].FullName $insightApps[$i].FullName -Force
          }

      # --------------------------------------------------
      # 🔥 MSAPP SURGERY: DealerCRM → Insight REFERENCES
      # --------------------------------------------------

      - name: Fix Environment Variables, Connectors & Flows
        shell: pwsh
        run: |
          $replaceMap = @{
            # Custom Connectors
            "ITS-TCOE_SET_UATNextCRMMain" = "ITS-TCOE_FNI_UATNextMain"
            "ITS-TCOE_SET_UATNextCRMELog" = "ITS-TCOE_FNI_UATNextELog"

            # Environment Variables
            "ITS-TCOE_SET_UATNext_DealerCRM_qTestProjectID" = "ITS-TCOE_Insights_UATNext_qTestProjectID"
            "ITS-TCOE_SET_UATNext_DealerCRM_TestCaseModuleID" = "ITS-TCOE_Insights_UATNext_TestCaseModuleID"
            "ITS-TCOE_SET_UATNext_DealerCRM_qTestModuleID" = "ITS-TCOE_Insights_UATNext_qTestModuleID"
            "ITS-TCOE_SET_UATNext_DealerCRM_AQUAModuleID" = "ITS-TCOE_Insights_UATNext_AQUAModuleID"
            "ITS-TCOE_SET_UATNext_DealerCRM_Releases" = "ITS-TCOE_Insights_UATNext_Releases"
            "ITS-TCOE_SET_UATNext_DealerCRM_ModuleController" = "ITS-TCOE_Insights_UATNext_ModuleController"
            "ITS-TCOE_SET_UATNext_DealerCRM_Teams" = "ITS-TCOE_Insights_UATNext_Teams"

            # Cloud Flow
            "ITS-TCOE_SET_UATNext_DealerCRM_AttachmentUpload_Flow" = "ITS-TCOE_Insights_UATNext_AttachmentUpload_Flow"
          }
          $apps = Get-ChildItem "insight_unpacked/CanvasApps" -Filter "*.msapp"
          foreach ($app in $apps) {
            $tmp = "tmp_extract"
            if (Test-Path $tmp) { Remove-Item $tmp -Recurse -Force }
            Expand-Archive $app.FullName $tmp -Force
            Get-ChildItem $tmp -Recurse -File | ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              $changed = $false
              foreach ($key in $replaceMap.Keys) {
                if ($content.Contains($key)) {
                  $content = $content.Replace($key, $replaceMap[$key])
                  $changed = $true
                }
              }
              if ($changed) {
                Set-Content $_.FullName $content -NoNewline
              }
            }
            Compress-Archive "$tmp/*" $app.FullName -Force
            Remove-Item $tmp -Recurse -Force
          }

      # - name: Merge DealerCRM Custom Connectors into Insight
      #   shell: pwsh
      #   run: |
      #     $src = "dealercrm_unpacked/CustomConnectors"
      #     $dst = "insight_unpacked/CustomConnectors"

      #     if (Test-Path $src) {
      #       New-Item -ItemType Directory -Force -Path $dst
      #       Copy-Item "$src/*" $dst -Recurse -Force
      #     }


      # --------------------------------------------------
      # PACK & IMPORT (UPDATE ONLY)
      # --------------------------------------------------

      - name: Pack Insight Solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: insight_unpacked
          solution-file: Insight_Updated.zip
          solution-type: Unmanaged

      - name: Import Insight Solution
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ env.ENV_URL }}
          solution-file: Insight_Updated.zip
          app-id: ${{ secrets.APPLICATION_ID }}
          client-secret: ${{ secrets.SECRET_VALUE }}
          tenant-id: ${{ secrets.DIRECTORY_ID }}

      # --------------------------------------------------
      # UPLOAD AS ARTIFACT (DOWNLOAD TO LOCAL)
      # --------------------------------------------------

      # - name: Upload CorePlus Solution Artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: CorePlus_Updated_Solution
      #     path: CorePlus_Updated.zip
