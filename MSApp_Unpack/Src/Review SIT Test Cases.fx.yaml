                Layout: =Layout.Vertical
                OnSelect: =//Navigate('TestCase Details')
                TemplatePadding: =0
                TemplateSize: =60
                Width: =939
                X: =RSITTCETCBackgroundRectangle.X
                Y: =RSITTCETCBackgroundRectangle.Y + RSITTCETCBackgroundRectangle.Height
                ZIndex: =5

                RSITTCETSNameValueLbl As label:
