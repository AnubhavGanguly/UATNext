"'Review SIT Test Cases' As screen.'phoneLayout_FluidGridWithHeaderPageLayout_ver3.0'":
    OnHidden: |-
        =UpdateContext({varReqGallerySelected: false});
        
        Concurrent(
            Clear(ColABC),
        
            Clear(colReviewTestCase),
        
            Clear(colRequirementProperties),
        
            Clear(colRequirement),
        
            UpdateContext({varModulename: Blank()})
        )
    OnVisible: |-
        =Concurrent(   
            Set(varScreenName, "Review SIT Test Cases"),
            
            Set(varVideoLink, Concatenate(nfSharepointbaseUrl,"video/Review_SIT_Test_Cases.mp4")),
        
            Set(varPDFLink, Concatenate(nfSharepointbaseUrl,"pdf/Review_SIT_Test_Cases.pdf"))
        );
        Concurrent(
            //Reseting the module combobox
            Reset(RSITTCModuleCombobox),
        
            //Updaing collection with blank value
            //ClearCollect( colEmpty, Blank()),
        
            //Set variable value to false
            Set( varREnableSearch, false);
        
            UpdateContext(
                {
                    //Update the variable value to true
                    ResetCheckBox: true,
        
                    //Update variable value with number
                    varRQpageNumber: 1,
        
                    //Update variable value with number
                    ReviewTestCasePageNumber: 1,
        
                    //Update variable value with blank value 
                    varModule: Blank()
                }
            )
        );
        
        //Update requiremnt info in this variable 
        UpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", Page: varRQpageNumber, pageSize: nfRequirementPageSize, fields: ["*"], query: $"'Module' in '{constModuleInfo.pid} {constModuleInfo.name}'"})});
        
        //Update total number of requirement in this variable.
        UpdateContext({ RequirementsCount: varRequirementRecords.total});
        
        //Update total requirement info in this variable.
        ClearCollect( colRequirement, varRequirementRecords.items)

    RSITTCCanvas As fluidGrid.fluidGridWithBlankCard:
        BorderThickness: =0
        Height: =Parent.Height - 50 /*- UATBackgroundRectangle.Height + 50*/
        Width: =Parent.Width
        Y: =RSITTC_Outer_Header_Component.Y + RSITTC_Outer_Header_Component.Height
        ZIndex: =3

        RSITTCDataCard As dataCard:
            BorderColor: =RGBA(0, 0, 0, 1)
            BorderStyle: =BorderStyle.Solid
            BorderThickness: =0
            DisplayMode: =DisplayMode.Edit
            Fill: |-
                =//RGBA(241, 244, 249, 1)
                ColorFade(RGBA(70, 189, 198, 1), 90%)
            Height: =Parent.Height
            Width: =Parent.Width
            X: =0
            Y: =0
            ZIndex: =1

            TCLDataCardbackgroundRectabgle_2 As rectangle:
                Fill: =RGBA(255, 255, 255, 1)
                Height: =Parent.Height
                Width: =939
                X: =427
                Y: =Parent.Y
                ZIndex: =1

            RSITTCRequirementSearchTxtBox As text:
                BorderColor: =RGBA(255, 255, 255, 1)
                BorderThickness: =0.4
                Color: =RGBA(153, 153, 153, 1)
                Default: =""
                DelayOutput: =true
                Fill: =Color.White
                FocusedBorderThickness: =1
                Font: =Font.'Segoe UI'
                FontWeight: =FontWeight.Lighter
                HintText: ="Search Requirement"
                HoverBorderColor: =RGBA(0, 0, 0, 0)
                HoverFill: =Self.Fill
                OnChange: |-
                    =If( 
                        IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, " ", "")),
                        If(
                            RSITTCModuleCombobox.Selected.name = Blank(),
                    
                            UpdateContext(
                                { 
                                    varRQpageNumber: 1,
                                    varModulename: Blank(),
                                    varReqGallerySelected: false
                                }
                            );
                    
                            Set( varREnableSearch, false);
                    
                            Clear(colReviewTestCase);
                    
                            Clear(colRequirement);
                    
                            Clear(colRequirementProperties);
                    
                            UpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", Page: varRQpageNumber, pageSize: nfRequirementPageSize, fields: ["*"], query: Concatenate( "'Module' ","in", " '" & constModuleInfo.pid & " " & constModuleInfo.name & "'")})});
                    
                            UpdateContext({ RequirementsCount: varRequirementRecords.total});
                    
                            ClearCollect( colRequirement, varRequirementRecords.items);
                            
                            UpdateContext({varErrorMsg: false}),
                    
                            UpdateContext(
                                {
                                    varRQpageNumber: 1,
                                    varModulename: Blank(),
                                    varReqGallerySelected: false
                                }
                            );
                    
                            Set( varREnableSearch, false);
                    
                            Clear(colReviewTestCase);
                    
                            Clear(colRequirement);
                    
                            Clear(colRequirementProperties);
                    
                            UpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", Page: varRQpageNumber, pageSize: nfRequirementPageSize, fields: ["*"], query: Concatenate( "'Module' ","in", " '" & RSITTCModuleCombobox.Selected.pid & " " & RSITTCModuleCombobox.Selected.name & "'")})});
                    
                            UpdateContext({ RequirementsCount: varRequirementRecords.total});
                    
                            ClearCollect( colRequirement, varRequirementRecords.items);
                    
                            UpdateContext({varErrorMsg: false})
                        )
                    );
                    
                    UpdateContext({reqid: Blank()})
                OnSelect: |-
                    =If( IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, " ", "")), 
                    
                        Clear(colReviewTestCase);
                    
                        UpdateContext({varModulename: Blank()});
                    
                        Clear(colRequirementProperties);
                    
                        UpdateContext({varReqGallerySelected: false})
                    )
                PaddingLeft: =10
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =11
                Width: =400
                X: =RSITTCProjectLbl.X
                Y: =RSITTCModuleLbl.Y + RSITTCModuleLbl.Height + 5
                ZIndex: =2

            RSITTCRequirementSearchIcon As icon.Add:
                Color: =If(RSITTCRequirementSearchTxtBox.DisplayMode = DisplayMode.Edit,RGBA(70, 189, 198, 1), RGBA(153, 153, 153, 1))
                DisabledColor: =RGBA(153, 153, 153, 1)
                DisplayMode: =If( !IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, " ", "")), DisplayMode.Edit, DisplayMode.Disabled)
                Height: =40
                Icon: =Icon.Search
                OnSelect: |-
                    =Set( varREnableSearch, true);
                    
                    Reset(RSITTCModuleCombobox);
                    
                    UpdateContext(
                        { 
                            varRQpageNumber: 1, 
                            varModulename: Blank(), 
                            varReqGallerySelected: false
                        }
                    );
                    
                    Clear(colReviewTestCase);
                    
                    Clear(colRequirement);
                    
                    Clear(colRequirementProperties);
                    
                    If( 
                        !IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, " ", "")) && StartsWith(RSITTCRequirementSearchTxtBox.Text, "RQ-"),
                    
                        UpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", pageSize: nfRequirementPageSize, page: varRQpageNumber, fields: ["*"], query: Concatenate("'Module' ","in"," '" & constModuleInfo.pid & " " & constModuleInfo.name & "' And 'id' =" & " '" & RSITTCRequirementSearchTxtBox.Text & "'")})});
                    
                        UpdateContext({ RequirementsCount: varRequirementRecords.total});
                    
                        ClearCollect( colRequirement, varRequirementRecords.items),
                        
                        !IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, " ", "")),
                    
                        UpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", pageSize: nfRequirementPageSize, page: varRQpageNumber, fields: ["*"], query: Concatenate("'Module' ","in"," '" & constModuleInfo.pid & " " & constModuleInfo.name & "' And 'name' ", "~"," '" & RSITTCRequirementSearchTxtBox.Text & "' ")})});
                    
                        UpdateContext({ RequirementsCount: varRequirementRecords.total});
                    
                        ClearCollect( colRequirement, varRequirementRecords.items)
                    );
                    
                    If( CountRows(colRequirement) = 0, UpdateContext({varErrorMsg: true}), UpdateContext({varErrorMsg: false}))
                PaddingBottom: =10
                PaddingLeft: =10
                PaddingRight: =10
                PaddingTop: =10
                Width: =40
                X: =371
                Y: =RSITTCRequirementSearchTxtBox.Y
                ZIndex: =3

            RSITTCGalleryRequirement As gallery.variableTemplateHeightGallery:
                '#CopilotOverlayLabel': ="Filtered"
                Default: ={}
                Height: =550
                Items: =colRequirement
                Layout: =Layout.Vertical
                OnSelect: =
                TemplateFill: |-
                    =//If(ThisItem.IsSelected,Color.AliceBlue,RGBA(0, 0, 0, 0))
                    If(ThisItem.IsSelected,ColorFade(RGBA(70, 189, 198, 1), 100%),RGBA(0, 0, 0, 0))
                TemplatePadding: =0
                TemplateSize: =30
                Width: =424
                Y: =RSITTCRequirementSearchTxtBox.Y + RSITTCRequirementSearchTxtBox.Height + 5
                ZIndex: =4

                RSITTCGMSeperatorRectangle As rectangle:
                    BorderStyle: =BorderStyle.None
                    Fill: =RGBA(204, 204, 204, 1)
                    FocusedBorderThickness: =0
                    Height: =0.4
                    OnSelect: =Select(Parent)
                    Width: =Parent.Width
                    Y: =29.6
                    ZIndex: =1

                RSITTCGMFilderIcon As icon.Add:
                    Color: =RGBA(0, 134, 146, 1)
                    Height: =20
                    Icon: =Icon.DocumentWithContent
                    OnSelect: =Select(Parent)
                    Width: =20
                    X: =15
                    Y: =5
                    ZIndex: =2

                RSITTCLabelRequirementName As label:
                    Color: |-
                        =If(RSITTCLabelRequirementName.Text=RSITTCGalleryRequirement.Selected.name,
                        RGBA(17, 192, 190, 1), 
                        RGBA(107, 106, 106, 1)
                        )
                    Font: =Font.'Segoe UI'
                    FontWeight: =FontWeight.Semibold
                    Height: =30
                    HoverColor: =RGBA(70, 189, 198, 1)
                    OnSelect: |-
                        =UpdateContext({ReviewTestCasePageNumber: 1});
                        
                        ClearCollect( colRequirementProperties, ThisItem.properties);
                        
                        ClearCollect( CollectTestcaseId, 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink( constProjectInfo.id, { type: "requirements", ids: ThisItem.id}));
                        
                        Clear(colPTUTestCase);
                        
                        Clear(ColABC);
                        
                        ForAll( CollectTestcaseId, Collect( ColABC, objects));
                        
                        ClearCollect(colTestCaseIdQuery, {Id: 1, TC: ""});
                        
                        ForAll( Filter(ColABC, StartsWith(pid, "TC")), Patch(colTestCaseIdQuery, First(colTestCaseIdQuery),{TC: Concatenate(First(colTestCaseIdQuery).TC, " or ", Concatenate("'Id' = '",ThisRecord.pid,"'" ))}));
                        
                        If(
                            !IsBlank(Right(First(colTestCaseIdQuery).TC, Len( First(colTestCaseIdQuery).TC)-3)),
                        
                            UpdateContext({ReviewTestCaseRecord: 'ITS-TCOE_OCTO_UATMain_V1'.Search(constProjectInfo.id,{object_type:"test-cases", page: ReviewTestCasePageNumber, pageSize: nfReviewTestCasePageSize, fields:["*"],query:Right(First(colTestCaseIdQuery).TC, Len( First(colTestCaseIdQuery).TC)-3)})});
                        
                            UpdateContext({ReviewTestCaseCount: ReviewTestCaseRecord.total});
                        
                            ClearCollect(colReviewTestCase, ReviewTestCaseRecord.items),
                        
                            Clear(colReviewTestCase)
                        );
                        
                        UpdateContext({varReqGallerySelected: true});
                        
                        UpdateContext({reqid: ThisItem.id});
                        
                        UpdateContext({varModulename: 'ITS-TCOE_OCTO_UATMain_V1'.GetAModule( constProjectInfo.id, ThisItem.parent_id)})
                    Size: =11
                    Text: ="(" & ThisItem.pid & ") "& ThisItem.name
                    Tooltip: =ThisItem.name
                    VerticalAlign: =VerticalAlign.Top
                    Width: =380
                    Wrap: =false
                    X: =RSITTCGMFilderIcon.X + RSITTCGMFilderIcon.Width
                    ZIndex: =4

            RSITTCGalleryExistingTestCase As gallery.galleryVertical:
