                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Color: =RGBA(107, 106, 106, 1)
                    Font: =Font.'Segoe UI'
                    Height: =60
                    PaddingLeft: =12
                    Size: =10.5
                    Text: =ThisItem.pid
                    VerticalAlign: =VerticalAlign.Top
                    Width: =90
                    ZIndex: =3

                RSITTCETSDescriptionValueLbl As label:
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Color: =RGBA(107, 106, 106, 1)
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    Size: =10.5
                    Text: =PlainText(ThisItem.description)
                    Tooltip: =PlainText(ThisItem.description)
                    VerticalAlign: =VerticalAlign.Top
                    Width: =160
                    X: =RSITTCETSNameValueLbl.X + RSITTCETSNameValueLbl.Width
                    ZIndex: =4

                RSITTCETSTestStepsValueLbl As label:
                    Align: =Align.Center
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Color: =RGBA(0, 166, 255, 1)
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Size: =10.5
                    Text: =CountRows(ThisItem.test_steps)
                    Width: =80
                    X: =RSITTCETSPriorityValueLbl.X + RSITTCETSPriorityValueLbl.Width
                    ZIndex: =6

                RSITTCETSTypeValueLbl As label:
                    Align: =Align.Center
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Color: =RGBA(107, 106, 106, 1)
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Size: =10.5
                    Text: =LookUp(ThisItem.properties,field_name="Type",field_value_name)
                    Width: =70
                    Wrap: =false
                    X: =RSITTCETCStatusValueBtn.X + RSITTCETCStatusValueBtn.Width+15
                    ZIndex: =8

                RSITTCETSPriorityValueLbl As label:
                    Align: =Align.Center
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Color: =RGBA(107, 106, 106, 1)
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Size: =10.5
                    Text: =LookUp(ThisItem.properties,field_name="Priority",field_value_name)
                    Width: =80
                    Wrap: =false
                    X: =RSITTCETSTypeValueLbl.X + RSITTCETSTypeValueLbl.Width
                    ZIndex: =10

