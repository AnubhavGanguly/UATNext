                    VerticalAlign: =VerticalAlign.Top
                    Width: =160
                    X: =RSITTCETSTestCaseIdvalueLbl.X + RSITTCETSTestCaseIdvalueLbl.Width
                    ZIndex: =1

                RSITTCETSTestCaseIdvalueLbl As label:
