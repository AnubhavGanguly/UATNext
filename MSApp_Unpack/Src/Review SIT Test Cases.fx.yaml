                    X: =RSITTCETSDescriptionValueLbl.X + RSITTCETSDescriptionValueLbl.Width+10
                    Y: =18
                    ZIndex: =13

                RSITTCShowTestStepCountValuebtn As button:
                    BorderStyle: =BorderStyle.None
                    Color: =Color.Transparent
                    DisabledBorderColor: =Self.Fill
                    DisabledColor: =Self.Color
                    DisabledFill: =Self.Fill
                    Fill: =Color.Transparent
                    Font: =Font.'Segoe UI'
                    Height: =RSITTCETSTestStepsValueLbl.Height
                    HoverColor: =Self.Color
                    HoverFill: =Self.Fill
                    OnSelect: |-
                        =Reset(RSITTSRadioButton);
                        
                        Set(TempTcId,ThisItem.id);
                        
                        ClearCollect( colRequirementTestcaseLink, 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink(constProjectInfo.id, { type: "test-cases", ids: TempTcId}));
                        
                        ClearCollect(colTCInfo, 'ITS-TCOE_OCTO_UATMain_V1'.GetTestcase(constProjectInfo.id,TempTcId, {expand: "teststep"}));
                        
                        ClearCollect( colSITTestSteps, First(colTCInfo).test_steps);
                        
                        Set(Index,1);
                        
                        ClearCollect(colTraceOfClickTC,{ID:Index,TC:ThisItem.id});
                        
                        UpdateContext({varShowTestSteps: true})
                    PressedColor: =Self.Color
                    PressedFill: =Self.Fill
                    Text: =""
                    Width: =RSITTCETSTestStepsValueLbl.Width
                    X: =RSITTCETSTestStepsValueLbl.X
                    Y: =RSITTCETSTestStepsValueLbl.Y
                    ZIndex: =14

                RSITTCPromoteToUatCheckBox As checkbox:
                    BorderColor: =RGBA(236, 248, 249, 1)
                    BorderStyle: =BorderStyle.None
                    CheckboxBackgroundFill: =If( Self.DisplayMode = DisplayMode.Edit, RGBA(255, 255, 255, 1), RGBA(186, 186, 186, 1))
                    CheckboxBorderColor: =If( Self.DisplayMode = DisplayMode.Edit, RGBA(70, 189, 198, 1), RGBA(186, 186, 186, 1))
                    CheckboxSize: =25
                    CheckmarkFill: =RGBA(107, 106, 106, 1)
                    Color: =RGBA(107, 106, 106, 1)
