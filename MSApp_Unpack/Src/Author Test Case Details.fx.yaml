"'Author Test Case Details' As screen.'phoneLayout_FluidGridWithHeaderPageLayout_ver3.0'":
    OnHidden: |-
        =Concurrent(
            Reset( TCDTitlevalueTxtinput),
        
            Reset( ETCQAUserValueDrodpown),
        
            Reset( TCDDescriptionValueTxtInput),
        
            Reset( TCDAutomationProgressDrodpown),
        
            Reset( ETCStatusValueDrodpown),
        
            Reset( TCDPreconditionValueTxtInput),
        
            Reset( ETCTypeValueDrodpown),
        
            Reset( ETCNonQaUserValueDropdown),
            
            Clear(colTestStep)
        )
    OnVisible: |-
        =//Enabling ReqLoading Spinnier
        UpdateContext({ showTCDLoadingSpinner: true});
        
        Concurrent(
            Set(varScreenName, "Author Test Case Details"),
        
            Set(varVideoLink, Concatenate(nfSharepointbaseUrl,"video/Author_Test_Case_Details.mp4")),
                
            Set(varPDFLink, Concatenate(nfSharepointbaseUrl,"pdf/Author_Test_Case_Details.pdf"))
        );
        
        UpdateContext({varAddTestCaseVisiblity: false});
        
        Reset(TCDETSRadioButton);
        
        UpdateContext({showTestStep: false});
        
        ClearCollect( colTCInfo, 'ITS-TCOE_OCTO_UATMain_V1'.GetTestcase( constProjectInfo.id, gallerySelectedTestcase.id, {expand:"teststep"}));
        
        ClearCollect( colTCProperties, First( colTCInfo).properties);
        
        //Update the update by column
        UpdateIf(
            colTCProperties, field_id = Value( First( colAllTestCaseFieldId).UpdatedByUAT),
            {
                field_id: Value (First( colAllTestCaseFieldId).UpdatedByUAT),
                field_name: "Updated By (UATNext Only)",
                field_value: nfUserObject.'Full Name'
            }
        );
        
        ClearCollect( colTestStep, AddColumns( First( colTCInfo).test_steps, Order, order));
        
        ClearCollect( colTestStep1, colTestStep);
        
        //Enabling ReqLoading Spinnier
        UpdateContext({ showTCDLoadingSpinner: false});

    TCDetailsCanvas As fluidGrid.fluidGridWithBlankCard:
        BorderThickness: =0
        Height: =Parent.Height - AUATTCD_Inner_Header_Component.Height - 4
        Width: =Parent.Width
        Y: =AUATTCD_Inner_Header_Component.Y + AUATTCD_Inner_Header_Component.Height
        ZIndex: =3

        TCDetailsDataCard As dataCard:
            BorderColor: =RGBA(0, 0, 0, 1)
            BorderStyle: =BorderStyle.Solid
            BorderThickness: =0
            DisplayMode: =DisplayMode.Edit
            Fill: =ColorFade(RGBA(230, 230, 230, 0.82), 1000%)
            Height: =Parent.Height
            Width: =Parent.Width
            X: =0
            Y: =0
            ZIndex: =1

            "GalleryExistTestStep As gallery.'BrowseLayout_Flexible_SocialFeed_ver5.0'":
                DelayItemLoading: =true
                Height: |-
                    =//If( GallerynewSteps.Visible = false, 380,121)
                    If(showTestStep,185,380)
                Items: |+
                    =If( 
                        TCDETSRadioButton.Selected.Value = "Show All Test Steps", 
                        
                        SortByColumns( colTestStep,"Order",SortOrder.Ascending), 
                        
                        SortByColumns( Filter( colTestStep, Not( LookUp( ThisRecord.customFieldInfo, Lower(name) = Lower("UAT Category")).value = Text( LookUp( colBusinessValuesTS, label = "Technical",value)))),"Order",SortOrder.Ascending)
                    )
                    
                    
                Layout: =Layout.Vertical
                LoadingSpinner: =LoadingSpinner.Data
                TemplatePadding: =0
                TemplateSize: =232
                Width: =Parent.Width
                Y: =ETSHeaderbackgroundrectangle.Y+ETSHeaderbackgroundrectangle.Height
                ZIndex: =4

                GETSStepsDeleteIcon As icon.Add:
                    Color: =RGBA(184, 0, 0, 1)
                    Height: =30
                    Icon: =Icon.Trash
                    OnSelect: |-
                        =UpdateContext({ showTCDLoadingSpinner: true});
                        
                        'ITS-TCOE_OCTO_UATMain_V1'.DeleteTeststep(constProjectInfo.id,gallerySelectedTestcase.id,ThisItem.id);
                        
                        If( IsBlank( LookUp( colTCProperties, field_id = Value( First( colAllTestCaseFieldId).Type)).field_value), Remove( colTCProperties, LookUp( colTCProperties, field_id = Value( First( colAllTestCaseFieldId).Type))));
                        
                        'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestcase( constProjectInfo.id, gallerySelectedTestcase.id, {properties: colTCProperties});
                        
                        Clear(colTestStep);
                        
                        Collect(colTestStep, AddColumns('ITS-TCOE_OCTO_UATMain_V1'.GetTestStep(constProjectInfo.id,gallerySelectedTestcase.id),Order,order));
                        
                        ClearCollect(colTestStep1, colTestStep);
                        
                        UpdateContext({ showTCDLoadingSpinner: false});
                    PaddingBottom: =5
                    PaddingLeft: =5
                    PaddingRight: =5
                    PaddingTop: =5
                    Tooltip: ="Delete"
                    Width: =30
                    X: =StepsUpIcon.X + StepsUpIcon.Width + 20
