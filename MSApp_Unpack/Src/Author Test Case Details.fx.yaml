                    Height: =ATCTestCaseSearchTxtBox.Height
                    Icon: =Icon.Search
                    OnSelect: |-
                        =UpdateContext({ showACTCLoadingSpinner: true});
                        
                        If(
                            !IsBlank(
                                Substitute(
                                    ATCTestCaseSearchTxtBox.Text,
                                    " ",
                                    ""
                                )
                            ),
                            If( StartsWith(ATCTestCaseSearchTxtBox.Text,"TC-"),
                                ClearCollect(
                                    colSearchTestCase,
                                    'ITS-TCOE_OCTO_UATMain_V1'.Search(
                                        constProjectInfo.id,
                                        {
                                            pageSize: 999,
                                            page: 1,
                                            object_type: "test-cases",
                                            fields: ["*"],
                                            query: Concatenate(" 'Id' ", "=", " '" & ATCTestCaseSearchTxtBox.Text & "'")
                                        }
                                    ).items
                                ),
                                ClearCollect(
                                    colSearchTestCase,
                                    'ITS-TCOE_OCTO_UATMain_V1'.Search(
                                        constProjectInfo.id,
                                        {
                                            pageSize: 999,
                                            page: 1,
                                            object_type: "test-cases",
                                            fields: ["*"],
                                            query: Concatenate( "'Name' ", "~"," '" & ATCTestCaseSearchTxtBox.Text & "'")
                                        }
                                    ).items
                                )
                            )
                        );
