    TCDBackIcon As icon.ArrowRight:
        Color: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(0, 134, 146, 1)
        Height: =50
        Icon: =Icon.BackArrow
        OnSelect: |
            =If(
                CountRows(colTraceOfClickTC) > 1 || checkUpdateTestCase = true,
            
                // Enabling TCDLoading Spinner
                UpdateContext({ showTCDLoadingSpinner: true});
            
                Concurrent(
                    Reset( TCDTitlevalueTxtinput),
                    Reset( ETCQAUserValueDrodpown),
                    Reset( TCDDescriptionValueTxtInput),
                    Reset( TCDAutomationProgressDrodpown),
                    Reset( ETCStatusValueDrodpown),
                    Reset( TCDPreconditionValueTxtInput),
                    Reset( ETCTypeValueDrodpown)
                );
            
                If(
                    CountRows(colTraceOfClickTC) = 1,
            
                    Navigate('Author Test Cases'),
                
                    Set( TempTcId, LookUp( colTraceOfClickTC, ID = Last(colTraceOfClickTC).ID - 1).TC);
            
                    UpdateContext({ gallerySelectedTestcase: 'ITS-TCOE_OCTO_UATMain_V1'.GetTestcase( constProjectInfo.id, TempTcId, {expand: "teststep"})});
            
                    ClearCollect(colTCInfo, gallerySelectedTestcase);
                
                    ClearCollect( colTestStep, AddColumns( First(colTCInfo).test_steps, Order, order));
            
                    ClearCollect(colTestStep1,colTestStep);
                
                    ClearCollect( colRequirementTestcaseLink, 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink( constProjectInfo.id, { type: "test-cases", ids: TempTcId}));
                    
                    RemoveIf( colTraceOfClickTC, ID = LookUp( colTraceOfClickTC, ID = Last(colTraceOfClickTC).ID).ID)
                );
            
                //Disabling TCDLoading Spinner
                UpdateContext({ showTCDLoadingSpinner: false}),
            
                Navigate('Author Test Cases')
            );
        PaddingBottom: =8
        PaddingLeft: =8
        PaddingRight: =8
        PaddingTop: =8
        Width: =50
        ZIndex: =8

