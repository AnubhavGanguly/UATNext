                                }
                            ),
                        
                            If(
                                !( Int( LookUp( ThisItem.customFieldInfo, true).value) = Self.Selected.value),
                                    
                                Patch(
                                        colTestStep1,
                                        LookUp(colTestStep1,id=ThisItem.id),
                                        {
                                            id: ThisItem.id,
