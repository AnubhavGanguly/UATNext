"Update_Defect As screen.'phoneLayout_FluidGridWithHeaderPageLayout_ver3.0'":
    OnHidden: |-
        =Clear(colTemDefFinalProperty);
        
        Clear(Attachments);
        
        Reset(IEDSummaryTxtInput); Reset(IEDDescriptionTxtInput); Reset(IEDAffectedReleaseCombobox); Reset(IEDSeverityCombobox); Reset('IEDFR/BCombobox'); Reset(IEDRootCauseCombobox); Reset(IEDPriorityCombobox); Reset(EDModuleCombobox); Reset(IEDAssignedToCOmbobox); Reset(IEDStatusCombobox); Reset(IEDTypeCombobox); Reset(IEDTRBuildCombobox); Reset(IEDReasonCombobox); Reset(IEDCategoryCombobox);
    OnVisible: |-
        =//Enable EDLoading Spinnier
        UpdateContext({ showEDLoadingSpinner: true});
        
        Concurrent(
            Set(varScreenName, "Update Defect"),
        
            Set(varVideoLink, Concatenate(nfSharepointbaseUrl,"video/Update_Defect.mp4")),
            
            Set(varPDFLink, Concatenate(nfSharepointbaseUrl,"pdf/Update_Defect.pdf"))
        );
        
        Concurrent( 
            Clear(colEDSummary), 
            Clear(colEDAffReaBuild),
            Clear(colEDSeverity), 
            Clear(colEDFixedRelease), 
            Clear(colEDRootCause), 
            Clear(colEDPriority), 
            Clear(colEDModule), 
            Clear(colEDEnvironment), 
            Clear(colEDStatus), 
            Clear(colEDType), 
            Clear(colEDTRBuild), 
            Clear(colEDReason), 
            Clear(colEDCategory), 
            Clear(colEDAssignTo), 
            Clear(colEDNonQAUser),
            Clear(colEDTeam), 
            Clear(colEDDescription), 
            Clear(Attachments),
            Clear(colTotalAttachments), 
            
            Reset(IEDTeamCombobox), 
            Reset(IEDGalleryENVCombobox),
            Reset(IEDAttachmentUpload)
        );
        
        Concurrent(
            ClearCollect( colGetDef, 'ITS-TCOE_OCTO_UATMain_V1'.GetDefect( constProjectInfo.id, varSelectedDefectid)),
        
            ClearCollect( colDefectComments, 'ITS-TCOE_OCTO_UATMain_V1'.GetAllCommentsOfADefect( constProjectInfo.id, varSelectedDefectid).items),
        
            ClearCollect( colLinkedTR, First( 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink(constProjectInfo.id, {type:"defects", ids: varSelectedDefectid})).objects),
        
            ClearCollect( colDefectAttachments, 'ITS-TCOE_OCTO_UATMain_V1'.GetAttachments( constProjectInfo.id,"defects", varSelectedDefectid))
        );
        
        ForAll( colGetDef, Collect( colDefPro, ThisRecord.properties));
        
        //Disable EDLoading Spinnier
        UpdateContext({ showEDLoadingSpinner: false});

