            IDESaveBtn As button:
                BorderThickness: =0.4
                Fill: =RGBA(4, 141, 154, 1)
                FocusedBorderThickness: =0.4
                Font: =Font.'Segoe UI'
                HoverBorderColor: =ColorFade(Self.HoverFill, 20%)
                HoverFill: =RGBA(255, 152, 1, 1)
                OnSelect: |-
                    =//Enable EDLoading Spinnier
                    UpdateContext({ showEDLoadingSpinner: true});
                    
                    //Clear( colDFAttachmentStatus);
                    UpdateContext({ varDFAttachmentsSuccesedFiles: ""});
                    UpdateContext({ varDFAttachmentsFailedFiles: ""});
                    
                    ClearCollect(
                        colTotalAttachments,
                        ShowColumns(
                            AddColumns(
                                IEDAttachmentsHiddenGal.AllItems,
                                data,
                                With(
                                    {
                                        varDemoFormAttachmentCOntrol: JSON(
                                            IEDImageValue.Image,
                                            JSONFormat.IncludeBinaryData
                                        )
                                    },
                                    Mid(
                                        varDemoFormAttachmentCOntrol,
                                        Find(
                                            ",",
                                            varDemoFormAttachmentCOntrol
                                        ) + 1,
                                        Len(varDemoFormAttachmentCOntrol) - Find(
                                            ",",
                                            varDemoFormAttachmentCOntrol
                                        ) - 1
                                    )
                                ),
                                name,
                                IEDNameValue.Text,
                                content_type,
                                IEDContentTypeValue.Text
                            ),
                            data,
                            name,
                            content_type
                        )
                    );
                    
                    //Store the Updated by column value
                    ClearCollect(
                        colEDUpdatedby,
                        {
                            field_id: First(colAllDefectFieldsId).UpdatedByUAT,
                            field_name: "Updated By (UATNext Only)",
                            field_value: nfUserObject.'Full Name',
                            field_value_name: ""
                        }
                    );
                    
                    Clear(colEDFinalProperty);
                    
                    
                    Collect(
                        colEDFinalProperty,
                        If(
                            !IsEmpty(colEDSummary),
                            colEDSummary
                        ),
                        If(
                            !IsEmpty(colEDAffReaBuild),
                            colEDAffReaBuild
                        ),
                        If(
                            !IsEmpty(colEDSeverity),
                            colEDSeverity
                        ),
                        If(
                            !IsEmpty(colEDFixedRelease),
                            colEDFixedRelease
                        ),
                        If(
                            !IsEmpty(colEDRootCause),
                            colEDRootCause
                        ),
                        If(
                            !IsEmpty(colEDPriority),
                            colEDPriority
                        ),
                        If(
                            !IsEmpty(colEDModule),
                            colEDModule
                        ),
                        If(
                            !IsEmpty(colEDStatus),
                            colEDStatus
                        ),
                        If(
                            !IsEmpty(colEDType),
                            colEDType
                        ),
                        If(
                            !IsEmpty(colEDTRBuild),
                            colEDTRBuild
                        ),
                        If(
                            !IsEmpty(colEDReason),
                            colEDReason
                        ),
                        If(
                            !IsEmpty(colEDCategory),
                            colEDCategory
                        ),
                        If(
                            !IsEmpty(colEDEnvironment),
                            colEDEnvironment
                        ),
                        If(
                            !IsEmpty(colEDAssignTo),
                            colEDAssignTo
                        ),
                        If(
                            !IsEmpty(colEDNonQAUser),
                            colEDNonQAUser
                        ),
                        If(
                            !IsEmpty(colEDTeam),
                            colEDTeam
                        ),
                        If(
                            !IsEmpty(colEDDescription),
                            colEDDescription
                        ),
                        If(
                            !IsEmpty(colEDUpdatedby),
                            colEDUpdatedby
                        )
                    );
                    
                    
                    If( 
                        Lower(nfTeamsInfo) = "no",
                        If(
                            !IsBlank(IEDSummaryTxtInput.Text) && !IsBlank(IEDDescriptionTxtInput.Text) && !IsBlank(EDModuleCombobox.Selected) && !IsBlank(IEDAffectedReleaseCombobox.Selected) && !IsBlank(IEDSeverityCombobox.Selected) && !IsBlank(IEDPriorityCombobox.Selected) && !IsBlank(IEDStatusCombobox.Selected) && !IsBlank(IEDTypeCombobox.Selected),
                    
                            'ITS-TCOE_OCTO_UATMain_V1'.UpdateDefect(
                                constProjectInfo.id,
                                varSelectedDefectid,
                                {
                                    properties: colEDFinalProperty
                                }
                            );
                            If(
                                !IsEmpty( colTotalAttachments),
                                ForAll(
                                    colTotalAttachments,
                                    Collect(
                                        colDFAttachmentStatus,
                                        'ITS-TCOE_OCTO_UATNext_Test_AttachmentUpload_Flow'.Run(
                                            ThisRecord.name,
                                            ThisRecord.data,
                                            ThisRecord.content_type,
                                            constProjectInfo.id,
                                            "defects",
                                            First(colGetDef).id
                                        )
                                    )
                                )
                            );
                            If(
                                !IsEmpty( colTotalAttachments),
                                UpdateContext({ varDFAttachmentsFailedFiles: Concat( Filter( colDFAttachmentStatus, StartsWith(status_code,4) ||  StartsWith(status_code,5)), file_name & ", ")});
                                UpdateContext({ varDFAttachmentsSuccesedFiles: Concat( Filter( colDFAttachmentStatus, StartsWith(status_code,2)), file_name & ", ")})
                            );
                            If(
                                !IsBlank( varDFAttachmentsSuccesedFiles) && IsBlank( varDFAttachmentsFailedFiles),
                                Notify("Defect Updated Successfully With Attachment.", NotificationType.Success, 4000),
                                !IsBlank( varDFAttachmentsFailedFiles) && IsBlank( varDFAttachmentsSuccesedFiles),
                                Notify("Attachment Upload Failed For " & varDFAttachmentsFailedFiles, NotificationType.Error, 8000),
                                Notify( "Defect Updated Successfully.", NotificationType.Success, 4000)  
                            );
                            If(
                                !IsBlank(IEDComboBoxADOUser.Selected.label),
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateDefectComment(
                                    constProjectInfo.id,
                                    varSelectedDefectid,
                                    {content: "Assigned To : " & IEDComboBoxADOUser.Selected.label}
                                )
                            ),
                    
                            Notify( "Please fill in all required fields before saving the defect.", NotificationType.Information, 4000)
                        ),
                    
                    
                        If(
                            !IsBlank(IEDSummaryTxtInput.Text) && !IsBlank(IEDDescriptionTxtInput.Text) && !IsBlank(IEDTeamCombobox.Selected) && !IsBlank(EDModuleCombobox.Selected) && !IsBlank(IEDAffectedReleaseCombobox.Selected) && !IsBlank(IEDSeverityCombobox.Selected) && !IsBlank(IEDPriorityCombobox.Selected) && !IsBlank(IEDStatusCombobox.Selected) && !IsBlank(IEDTypeCombobox.Selected),
                            
                            'ITS-TCOE_OCTO_UATMain_V1'.UpdateDefect(
                                constProjectInfo.id,
                                varSelectedDefectid,
                                {
                                    properties: colEDFinalProperty
                                }
                            );
                            If(
                                !IsEmpty( colTotalAttachments),
                                ForAll(
                                    colTotalAttachments,
                                    Collect(
                                        colDFAttachmentStatus,
                                        'ITS-TCOE_OCTO_UATNext_Test_AttachmentUpload_Flow'.Run(
                                            ThisRecord.name,
                                            ThisRecord.data,
                                            ThisRecord.content_type,
                                            constProjectInfo.id,
                                            "defects",
                                            First(colGetDef).id
                                        )
                                    )
                                )
                            );
                            If(
                                !IsEmpty( colTotalAttachments),
                                UpdateContext({ varDFAttachmentsFailedFiles: Concat( Filter( colDFAttachmentStatus, StartsWith(status_code,4) ||  StartsWith(status_code,5)), file_name & ", ")});
                                UpdateContext({ varDFAttachmentsSuccesedFiles: Concat( Filter( colDFAttachmentStatus, StartsWith(status_code,2)), file_name & ", ")})
                            );
                            If(
                                !IsBlank( varDFAttachmentsSuccesedFiles) && IsBlank( varDFAttachmentsFailedFiles),
                                Notify("Defect Updated Successfully With Attachment.", NotificationType.Success, 4000),
                                !IsBlank( varDFAttachmentsFailedFiles) && IsBlank( varDFAttachmentsSuccesedFiles),
                                Notify("Attachment Upload Failed For " & varDFAttachmentsFailedFiles, NotificationType.Error, 8000),
                                Notify( "Defect Updated Successfully.", NotificationType.Success, 4000)  
                            );
                            If(
                                !IsBlank(IEDComboBoxADOUser.Selected.label),
                                
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateDefectComment(
                                    constProjectInfo.id,
                                    varSelectedDefectid,
                                    {content: "Assigned To : " & IEDComboBoxADOUser.Selected.label}
                                )
                            ),
                            
                        Notify( "Please fill in all required fields before saving the defect.", NotificationType.Information, 4000)
                        )
                    );
                    
                    //Disable EDLoading Spinnier
                    UpdateContext({ showEDLoadingSpinner: false});
