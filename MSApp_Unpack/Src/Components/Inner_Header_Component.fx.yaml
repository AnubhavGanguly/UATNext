Inner_Header_Component As CanvasComponent:
    Fill: =RGBA(0, 0, 0, 0)
    Height: =50
    PDFLink: ="Text"
    ScreenName: ="Text"
    VideoLink: ="Text"
    Width: =1366
    X: =0
    Y: =0
    ZIndex: =1

    InnerHeaderBackgroundRectangle As rectangle:
        Fill: =RGBA(70, 189, 198, 1)
        Height: =50
        Width: =Parent.Width
        ZIndex: =1

    BackIconbackgroundRectangle As rectangle:
        Fill: =RGBA(0, 134, 146, 1)
        Height: =50
        Width: =50
        ZIndex: =2

    PDFImage As image:
        Height: =InnerHeaderBackgroundRectangle.Height
        Image: ='reshot-icon-pdf-WFAVXEYNPZ'
        PaddingBottom: =5
        PaddingLeft: =5
        PaddingRight: =5
        PaddingTop: =5
        Width: =50
        X: =InnerHeaderBackgroundRectangle.Width-PDFImage.Width-5
        Y: =InnerHeaderBackgroundRectangle.Y
        ZIndex: =3

    AppNameBtn As button:
        BorderStyle: =BorderStyle.None
        DisplayMode: =DisplayMode.View
        Fill: =RGBA(0, 0, 0, 0)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Bold
        Height: =InnerHeaderBackgroundRectangle.Height
        HoverFill: =//ColorFade(RGBA(56, 96, 178, 1), -20%)
        Size: =16
        Text: ="UATNext"
        Width: =100
        X: =BackIconbackgroundRectangle.Width+20
        Y: =InnerHeaderBackgroundRectangle.Y
        ZIndex: =5

    PlayImage As image:
        Height: =InnerHeaderBackgroundRectangle.Height
        Image: ='Video Help'
        PaddingBottom: =8
        PaddingLeft: =8
        PaddingRight: =8
        PaddingTop: =8
        Width: =50
        X: =InnerHeaderBackgroundRectangle.Width-PlayImage.Width-5-PDFImage.Width
        Y: =InnerHeaderBackgroundRectangle.Y
        ZIndex: =7

    ScreenNameLabel As label:
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Height: =AppNameBtn.Height
        Size: =16
        Text: =Inner_Header_Component.ScreenName
        Width: =400
        X: =HeaderSeperatorTxtInput.X + HeaderSeperatorTxtInput.Width + 5
        Y: =AppNameBtn.Y
        ZIndex: =8

    HeaderSeperatorTxtInput As text:
        Align: =Align.Center
        BorderStyle: =BorderStyle.None
        Color: =RGBA(255, 255, 255, 1)
        Default: ="|"
        DisplayMode: =DisplayMode.View
        Fill: =RGBA(0, 0, 0, 0)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Bold
        Height: =50
        HoverFill: =RGBA(0, 0, 0, 0)
        PaddingLeft: =5
        Size: =16
        Width: =30
        X: =AppNameBtn.X+AppNameBtn.Width + 10
        ZIndex: =9

    IHCPlayImfBtn As button:
        BorderStyle: =BorderStyle.None
        BorderThickness: =0
        Fill: =RGBA(0, 0, 0, 0)
        Font: =Font.'Segoe UI'
        Height: =PlayImage.Height
        HoverBorderColor: =
        HoverColor: =RGBA(0, 0, 0, 0)
        HoverFill: =
        OnSelect: =Launch(Inner_Header_Component.VideoLink)
        PressedBorderColor: =
        PressedFill: =
        Size: =11
        Text: =""
        Width: =PlayImage.Width
        X: =PlayImage.X
        Y: =PlayImage.Y
        ZIndex: =10

    IHCPDFImageBtn As button:
        BorderStyle: =BorderStyle.None
        BorderThickness: =0
        Fill: =RGBA(0, 0, 0, 0)
        Font: =Font.'Segoe UI'
        Height: =PDFImage.Height
        HoverBorderColor: =
        HoverColor: =RGBA(0, 0, 0, 0)
        HoverFill: =
        OnSelect: =Launch(Inner_Header_Component.PDFLink)
        PressedBorderColor: =
        PressedFill: =
        Size: =11
        Text: =""
        Width: =PDFImage.Width
        X: =PDFImage.X
        Y: =PDFImage.Y
        ZIndex: =11

