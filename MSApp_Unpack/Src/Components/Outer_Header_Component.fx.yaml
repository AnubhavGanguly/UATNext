Outer_Header_Component As CanvasComponent:
    conProjectID: ="Text"
    Fill: =RGBA(0, 0, 0, 0)
    Height: =50
    OuterComponentPDFLink: ="Text"
    OuterComponentVideoLink: ="Text"
    TabMenuItems: =ColTabMenuItems
    Width: =1366
    X: =0
    Y: =0
    ZIndex: =1

    OuterHeaderBackgroundRectangle As rectangle:
        Fill: =RGBA(70, 189, 198, 1)
        Height: =50
        Width: =Parent.Width
        ZIndex: =1

    PursuitLogoBackgroundRectangle As rectangle:
        Fill: =RGBA(0, 134, 146, 1)
        Height: =50
        Width: =50
        ZIndex: =2

    PDFImg As image:
        Height: =OuterHeaderBackgroundRectangle.Height
        Image: ='reshot-icon-pdf-WFAVXEYNPZ'
        OnSelect: =
        PaddingBottom: =5
        PaddingLeft: =5
        PaddingRight: =5
        PaddingTop: =5
        Width: =50
        X: =OuterHeaderBackgroundRectangle.Width-PDFImg.Width-5
        Y: =OuterHeaderBackgroundRectangle.Y
        ZIndex: =3

    PursuitImg As image:
        Height: =OuterHeaderBackgroundRectangle.Height
        Image: ='PursuitSoftwareLogo-White'
        PaddingBottom: =6
        PaddingLeft: =6
        PaddingRight: =6
        PaddingTop: =6
        Width: =50
        X: =Parent.X
        Y: =OuterHeaderBackgroundRectangle.Y
        ZIndex: =4

    AppNameButton As button:
        BorderStyle: =BorderStyle.None
        DisplayMode: =DisplayMode.View
        Fill: =RGBA(0, 0, 0, 0)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Bold
        Height: =OuterHeaderBackgroundRectangle.Height / 2 + 5
        HoverFill: =//ColorFade(RGBA(56, 96, 178, 1), -20%)
        Size: =16
        Text: ="UATNext"
        Tooltip: =Outer_Header_Component.conProjectID
        Width: =100
        X: =PursuitImg.Width+20
        Y: =OuterHeaderBackgroundRectangle.Y
        ZIndex: =5

    HeadderCTabMenuGallery As gallery.galleryHorizontal:
        '#CopilotOverlayLabel': ="Filtered"
        Height: =OuterHeaderBackgroundRectangle.Height
        Items: =Outer_Header_Component.TabMenuItems
        OnSelect: =
        TemplateSize: =GallerySelectedBtn.Width
        Width: =1000
        X: =VersionIfoLbl.X+VersionIfoLbl.Width
        Y: =OuterHeaderBackgroundRectangle.Y
        ZIndex: =6

        GallerySelectedBtn As button:
            BorderStyle: =BorderStyle.None
            BorderThickness: =0
            Fill: =RGBA(70, 189, 198, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =If(ThisItem.Screen = App.ActiveScreen,FontWeight.Bold,FontWeight.Normal)
            Height: =OuterHeaderBackgroundRectangle.Height-GallerySelectedDownRectangle.Height-5
            HoverBorderColor: =ColorFade(RGBA(70, 189, 198, 1), 20%)
            HoverColor: =Self.Color
            HoverFill: =ColorFade( Self.Fill,30%)
            OnSelect: =Navigate(ThisItem.Screen)
            PressedColor: =Self.HoverColor
            PressedFill: =Self.HoverFill
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Size: =12
            Text: =ThisItem.Name
            Width: =190
            ZIndex: =1

        GallerySelectedDownRectangle As rectangle:
            BorderColor: =RGBA(1, 139, 152, 1)
            BorderStyle: =BorderStyle.None
            Fill: =RGBA(255, 152, 1, 1)
            Height: =5
            Visible: =If(ThisItem.Screen = App.ActiveScreen,true,false) 
            Width: =GallerySelectedBtn.Width
            X: =GallerySelectedBtn.X
            Y: =GallerySelectedBtn.Height
            ZIndex: =2

    PlayImg As image:
        Height: =OuterHeaderBackgroundRectangle.Height
        Image: ='Video Help'
        OnSelect: =
        PaddingBottom: =8
        PaddingLeft: =8
        PaddingRight: =8
        PaddingTop: =8
        Width: =50
        X: =OuterHeaderBackgroundRectangle.Width-PlayImg.Width-5-PDFImg.Width
        Y: =OuterHeaderBackgroundRectangle.Y
        ZIndex: =7

    PlayImfBtn As button:
        BorderStyle: =BorderStyle.None
        BorderThickness: =0
        Fill: =RGBA(0, 0, 0, 0)
        Font: =Font.'Segoe UI'
        Height: =PlayImg.Height
        HoverBorderColor: =
        HoverColor: =RGBA(0, 0, 0, 0)
        HoverFill: =
        OnSelect: =Launch(Outer_Header_Component.OuterComponentVideoLink)
        PressedBorderColor: =
        PressedFill: =
        Size: =11
        Text: =""
        Width: =PlayImg.Width
        X: =PlayImg.X
        Y: =PlayImg.Y
        ZIndex: =8

    PDFImgBtn As button:
        BorderStyle: =BorderStyle.None
        BorderThickness: =0
        Fill: =RGBA(0, 0, 0, 0)
        Font: =Font.'Segoe UI'
        Height: =PDFImg.Height
        HoverBorderColor: =
        HoverColor: =RGBA(0, 0, 0, 0)
        HoverFill: =
        OnSelect: =Launch(Outer_Header_Component.OuterComponentPDFLink)
        PressedBorderColor: =
        PressedFill: =
        Size: =11
        Text: =""
        Width: =PDFImg.Width
        X: =PDFImg.X
        Y: =PDFImg.Y
        ZIndex: =9

    VersionIfoLbl As label:
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Semibold
        Height: =Parent.Height - AppNameButton.Height
        LineHeight: =1
        Size: =11
        Text: ="3.4.0.2 11-FEB-26"
        X: =PursuitImg.Width+20
        Y: =AppNameButton.Y + AppNameButton.Height - 5
        ZIndex: =10

