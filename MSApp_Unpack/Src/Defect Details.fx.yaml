"'Defect Details' As screen.'phoneLayout_FluidGridWithHeaderPageLayout_ver3.0'":
    OnVisible: |-
        =UpdateContext({ showddloadingspinner: true});
        
        Concurrent(
            Set(varScreenName, "Defect Details"),
        
            Set(varVideoLink, Concatenate(nfSharepointbaseUrl,"video/Defect_Details.mp4")),
            
            Set(varPDFLink, Concatenate(nfSharepointbaseUrl,"pdf/Defect_Details.pdf"))
        );
        
        UpdateContext({varDlinkDF: false});
        
        Concurrent(
            ClearCollect( colGetDef, 'ITS-TCOE_OCTO_UATMain_V1'.GetDefect( constProjectInfo.id, SelectedDefectInfo.id)),
        
            ClearCollect( colDefectComments, 'ITS-TCOE_OCTO_UATMain_V1'.GetAllCommentsOfADefect(constProjectInfo.id, SelectedDefectInfo.id).items),
        
            ClearCollect(colDefectAttachments, 'ITS-TCOE_OCTO_UATMain_V1'.GetAttachments( constProjectInfo.id,"defects", SelectedDefectInfo.id)),
        
            ClearCollect( colLinkedTR, First( 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink(constProjectInfo.id, {type:"defects", ids: SelectedDefectInfo.id})).objects) 
        );
        
        ForAll(colGetDef, Collect(colDefPro,ThisRecord.properties));
        
        UpdateContext({ showddloadingspinner: false});

    TUATDD_Inner_Header_Component As Inner_Header_Component:
        PDFLink: =varPDFLink
        ScreenName: =varScreenName
        VideoLink: =varVideoLink
        ZIndex: =8

    TUATDDBackIcon As icon.ArrowRight:
        Color: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(0, 134, 146, 1)
        Height: =50
        Icon: =Icon.BackArrow
        OnSelect: |-
            =Back();
            Clear(colDefectAttachments)
        PaddingBottom: =8
        PaddingLeft: =8
        PaddingRight: =8
        PaddingTop: =8
        Width: =50
        ZIndex: =9

