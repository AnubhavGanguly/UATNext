                TCGalPageLeftNavIcon As icon.ArrowLeft:
                    Color: =RGBA(128, 128, 128, 1)
                    DisplayMode: |-
                        =//If((Defectstart+19)=defectCount,DisplayMode.Disabled,DisplayMode.Edit)
                        DisplayMode.Edit
                    Height: =25
                    Icon: =Icon.ArrowLeft
                    OnSelect: |-
                        =UpdateContext(
                            { 
                                showTCLoadingSpinner: true
                            }
                        );
                        
                        If(
                            varTCpageNumber > 1,
                            Set( varTCpageNumber, varTCpageNumber - 1)
                        );
                        
                        Set(
                            varTCQuery,
                            With(
                                {
                                    varConcatinatedTCData:
                                        FirstN(
                                            LastN(
                                                Sort( colTCOnly, Number, SortOrder.Ascending),
                                                CountRows( colTCOnly) - ( (varTCpageNumber - 1) * nfAuthorTestCasePageSizeTC)
                                            ),
                                            nfAuthorTestCasePageSizeTC
                                        )
                                },
                                Concat(
                                    varConcatinatedTCData,
                                    "'Id' = '" & pid & "'",
                                    " or "
                                )
                            )
                        );
                        
                        If(
                            !IsBlank( varTCQuery),
                        
                            UpdateContext(
                                {
                                    TotalTCRecords: 
                                    'ITS-TCOE_OCTO_UATMain_V1'.Search( 
                                        constProjectInfo.id, 
                                        {
                                            object_type: "test-cases", 
                                            page: nfAuthorTestCasePageTC, 
                                            pageSize: nfAuthorTestCasePageSizeTC, 
                                            fields: ["*"], 
                                            query: varTCQuery 
                                        }
                                    )
                                }
                            );
                        
                            ClearCollect( colTestCase, TotalTCRecords.items),
                        
                            Clear( colTestCase)
                        );
                        
                        UpdateContext(
                            { 
                                showTCLoadingSpinner: false
                            }
                        );
                    PaddingTop: =7
                    Visible: =If(varTCpageNumber = 1 || CountRows(colTestCase) = 0, false, true)
                    Width: =25
                    X: =800
                    Y: =DTCTCGalPageInfoLbl.Y
