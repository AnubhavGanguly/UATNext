                                field_name: "Updated By (UATNext Only)",
                                field_value: nfUserObject.'Full Name',
                                field_value_name:""
                            }
                        );
                        
                        ClearCollect(
                            colFinalTCProperty,
                            If(
                                !IsEmpty( colPropertyTCAssignedTo),
                                colPropertyTCAssignedTo
                            ),
                            If(
                                !IsEmpty( colPropertyTCBusinessUser),
                                colPropertyTCBusinessUser
                            ),
                            If(
                                !IsEmpty( colPropertyTCCreatedBy),
                                colPropertyTCCreatedBy
                            ),
                            If(
                                !IsEmpty( colPropertyTCUpdatedBy),
                                colPropertyTCUpdatedBy
                            )
                        );
                        
                        If( 
                            constTestcaseLoc = 1, 
                            Set( FinalconstTestcaseLoc, varModulename.id),
                            Set( FinalconstTestcaseLoc, constTestcaseLoc)
                        );
                        
                        ClearCollect( 
                            colTempTC, 
                            'ITS-TCOE_OCTO_UATMain_V1'.CreateTestcase( 
                                constProjectInfo.id, 
                                {
                                    name:GOLNameTextInput.Text, 
                                    parent_id: FinalconstTestcaseLoc, 
                                    description:GOLDescriptionTxtInput.Text, 
                                    precondition:GOLPreconditionTextInput.Text, 
                                    properties: colFinalTCProperty
                                }
                            )
                        );
                        
                        'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(
                            constProjectInfo.id,
                            "requirements",
                            areqid.id,
                            {
                                type: "test-cases", 
                                CreateAobjectlinkingRequestBody: [First(colTempTC).id]
                            }
                        );
                        
                        Set( varTCpageNumber, 1);
                        
                        Collect( 
                            ColABC, 
                            {
                                id: First(colTempTC).id, 
                                pid: First(colTempTC).pid, 
                                link_type: "is_covered_by", 
                                self: ""
                            }
                        );
                        
                        ClearCollect(
                            colTCOnly,
                            With(
                                { varTCData: SortByColumns( Filter( ColABC, StartsWith(pid, "TC-")), "pid", SortOrder.Descending)},
                                ForAll(
                                    Sequence( CountRows( varTCData)),
                                    {
                                        Number: Value,
                                        id: Last( FirstN( varTCData, Value)).id,
                                        pid: Last( FirstN( varTCData, Value)).pid
                                    }
                                )
                            )
                        );
                        
                        Set(
                            varTCQuery,
                            With(
                                {
                                    varConcatinatedTCData:
                                        FirstN(
                                            LastN(
                                                Sort( colTCOnly, Number, SortOrder.Ascending),
                                                CountRows( colTCOnly) - ( (varTCpageNumber - 1) * nfAuthorTestCasePageSizeTC)
                                            ),
                                            nfAuthorTestCasePageSizeTC
                                        )
                                },
                                Concat(
                                    varConcatinatedTCData,
                                    "'Id' = '" & pid & "'",
                                    " or "
                                )
                            )
                        );
                        
                        If(
                            !IsBlank( varTCQuery),
                        
                            UpdateContext(
                                {
