"'Author Test Cases' As screen.'phoneLayout_FluidGridWithHeaderPageLayout_ver3.0'":
    OnHidden: =Set( close, false)
    OnVisible: |-
        =//Set variable to decide network call or back func
        Set( checkUpdateTestCase, false);
        
        Concurrent(
            
            Set(varScreenName, "Author Test Cases"),
        
            Set(varVideoLink, Concatenate(nfSharepointbaseUrl,"video/Author_Test_Cases.mp4")),
                
            Set(varPDFLink, Concatenate(nfSharepointbaseUrl,"pdf/Author_Test_Cases.pdf"))
        
        );
        
        //Set variable value with false
        Set(varShowRec,false)

    TCLCanvas As fluidGrid.fluidGridWithBlankCard:
        BorderThickness: =0
        Height: =Parent.Height - 50 /*- UATBackgroundRectangle.Height + 50*/
        Width: =Parent.Width
        Y: =AUATTC_Outer_Header_Component.Y + AUATTC_Outer_Header_Component.Height
        ZIndex: =3

        TCLDataCard As dataCard:
            BorderColor: =RGBA(0, 0, 0, 1)
            BorderStyle: =BorderStyle.Solid
            BorderThickness: =0
            DisplayMode: =DisplayMode.Edit
            Fill: |-
                =//RGBA(241, 244, 249, 1)
                ColorFade(RGBA(70, 189, 198, 1), 90%)
            Height: =Parent.Height
            Width: =Parent.Width
            X: =0
            Y: =0
            ZIndex: =1

            TCLDataCardbackgroundRectabgle As rectangle:
                Fill: =RGBA(255, 255, 255, 1)
                Height: =Parent.Height
                Width: =939
                X: =427
                Y: =Parent.Y
                ZIndex: =1

            RequirementSearchTxtBox As text:
                BorderColor: =RGBA(255, 255, 255, 1)
                BorderThickness: =0.4
                Default: =""
                DelayOutput: =true
                Fill: =Color.White
                FocusedBorderThickness: =1
                Font: =Font.'Segoe UI'
                FontWeight: =FontWeight.Lighter
                HintText: ="Search Requirement"
                HoverBorderColor: =RGBA(0, 0, 0, 0)
                HoverFill: =Self.Fill
                OnChange: |-
                    =//Enabling TCLoading Spinnier
                    UpdateContext({ showReqLoadingSpinner: true});
                    
                    If( 
                        IsBlank( Substitute( RequirementSearchTxtBox.Text, " ", "")),
                        
                        If(
                            ATCEpicL1Combobox.Selected.name = Blank(),
                    
                            Set( varARQpageNumber, 1);
                    
                            Set( varAEnableSearch, false);
                    
                            UpdateContext({varModulename: Blank()});
                            
                            UpdateContext({varReqGallerySelected: false});
                    
                            Clear(colTestCase);
                    
                            Clear(colRequirement);
                    
                            Clear(colRequirementProperties);
                    
                            Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", Page: varARQpageNumber, pageSize: nfAUATTCRequirementPageSize, fields: ["*"], query: Concatenate( "'Module' ","in", " '" & constModuleInfo.pid & " " & constModuleInfo.name & "'")}));
                    
                            Set( varATCRequirementsCount, varATCRequirementRecords.total);
                    
                            ClearCollect( colRequirement, varATCRequirementRecords.items);
                            
                            UpdateContext({varErrorMsg: false}),
                    
                            Set( varARQpageNumber, 1);
                    
                            Set( varAEnableSearch, false);
                    
                            UpdateContext({varModulename: Blank()});
                            
                            UpdateContext({varReqGallerySelected: false});
                    
                            Clear(colTestCase);
                    
                            Clear(colRequirement);
                    
                            Clear(colRequirementProperties);
                    
                            Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", page: varARQpageNumber, pageSize: nfAUATTCRequirementPageSize, fields: ["*"], query: Concatenate( "'Module' ","in", " '" & ATCEpicL1Combobox.Selected.pid & " " & ATCEpicL1Combobox.Selected.name & "'")}));
                    
                            Set( varATCRequirementsCount, varATCRequirementRecords.total);
                    
                            ClearCollect( colRequirement, varATCRequirementRecords.items);
                    
                            UpdateContext({varErrorMsg: false})
                        ),
                        Select(RequirementSearchIcon)
                    );
                    
                    Set( areqid, Blank());
                    
                    //Disabling ReqLoading Spinnier
                    UpdateContext({ showReqLoadingSpinner: false});
                PaddingLeft: =10
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =11
                Width: =400
                X: =DTCProjectLbl.X
                Y: =ATCTeamLbl.Y + ATCTeamLbl.Height + 10
                ZIndex: =2

            RequirementSearchIcon As icon.Add:
                Color: =If(RequirementSearchTxtBox.DisplayMode = DisplayMode.Edit,RGBA(70, 189, 198, 1), RGBA(153, 153, 153, 1))
                DisabledColor: =RGBA(153, 153, 153, 1)
                DisplayMode: =If( !IsBlank( Substitute( RequirementSearchTxtBox.Text, " ", "")), DisplayMode.Edit, DisplayMode.Disabled)
                Height: =40
                Icon: =Icon.Search
                OnSelect: |-
                    =//Enabling ReqLoading Spinnier
                    UpdateContext({ showReqLoadingSpinner: true});
                    
                    Concurrent(
                        Set( varAEnableSearch, true),
                    
                        //Store gallery selected requirement info 
                        Set( varSelectedRequirementInfo, Blank()),
                    
                        Reset(ATCEpicL1Combobox),
                    
                        Reset(ATCEpicL2Combobox),
                    
                        Reset(ATCTeamCombobox),
                    
                        Reset(GalleryRequirement),
                    
                        Set( varARQpageNumber, 1),
                    
                        UpdateContext({varModulename: Blank()}),
                    
                        Clear(colTestCase),
                    
                        Clear(colRequirement),
                    
                        Clear(colRequirementProperties),
                    
                        UpdateContext({varReqGallerySelected: false})
                    );
                    
                    If( 
                        !IsBlank( Substitute( RequirementSearchTxtBox.Text, " ", "")) && StartsWith(RequirementSearchTxtBox.Text, "RQ-"),
                    
                        Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", pageSize: nfAUATTCRequirementPageSize, page: varARQpageNumber, fields: ["*"], query: Concatenate("'Module' ","in"," '" & constModuleInfo.pid & " " & constModuleInfo.name & "' And 'id' =" & " '" & RequirementSearchTxtBox.Text & "'")}));
                    
                        Set( varATCRequirementsCount, varATCRequirementRecords.total);
                    
                        ClearCollect( colRequirement, varATCRequirementRecords.items),
                        
                        !IsBlank( Substitute( RequirementSearchTxtBox.Text, " ", "")) && !IsNumeric( RequirementSearchTxtBox.Text),
                    
                        Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", pageSize: nfAUATTCRequirementPageSize, page: varARQpageNumber, fields: ["*"], query: Concatenate("'Module' ","in"," '" & constModuleInfo.pid & " " & constModuleInfo.name & "' And 'name' ", "~"," '" & RequirementSearchTxtBox.Text & "' ")}));
                    
                        Set( varATCRequirementsCount, varATCRequirementRecords.total);
                    
                        ClearCollect( colRequirement, varATCRequirementRecords.items),
                    	
                    	!IsBlank( Substitute( RequirementSearchTxtBox.Text, " ", "")) && IsNumeric( RequirementSearchTxtBox.Text),
                    
                        Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: "requirements", pageSize: nfAUATTCRequirementPageSize, page: varARQpageNumber, fields: ["*"], query: Concatenate("'Module' ","in"," '" & constModuleInfo.pid & " " & constModuleInfo.name & "' And 'Link ID' ", "="," '" & RequirementSearchTxtBox.Text & "' ")}));
                    
                        Set( varATCRequirementsCount, varATCRequirementRecords.total);
                    
                        ClearCollect( colRequirement, varATCRequirementRecords.items)
                    );
                    
                    If( CountRows(colRequirement) = 0, UpdateContext({varErrorMsg: true}), UpdateContext({varErrorMsg: false}));
                    
                    //Disabling ReqLoading Spinnier
                    UpdateContext({ showReqLoadingSpinner: false});
                PaddingBottom: =10
                PaddingLeft: =10
                PaddingRight: =10
                PaddingTop: =10
                Width: =40
                X: =371
                Y: =RequirementSearchTxtBox.Y
                ZIndex: =3

            GalleryRequirement As gallery.variableTemplateHeightGallery:
                '#CopilotOverlayLabel': ="Filtered"
                Default: =If(!IsBlank(varSelectedRequirementInfo), LookUp(colRequirement,name = areqid.name),{})
                Height: =435
                Items: =colRequirement
                Layout: =Layout.Vertical
                ShowScrollbar: =false
                TemplateFill: =If( ThisItem.IsSelected, ColorFade( RGBA(70, 189, 198, 1), 100%), RGBA(0, 0, 0, 0))
                TemplatePadding: =0
                TemplateSize: =30
                Width: =424
                Y: =RequirementSearchTxtBox.Y + RequirementSearchTxtBox.Height + 5
                ZIndex: =4

                GMSeperatorRectangle As rectangle:
                    BorderStyle: =BorderStyle.None
                    Fill: =RGBA(204, 204, 204, 1)
                    FocusedBorderThickness: =0
                    Height: =0.4
                    OnSelect: =Select(Parent)
                    Width: =Parent.Width
                    Y: =30
                    ZIndex: =1

                GMFilderIcon As icon.Add:
                    Color: =RGBA(0, 134, 146, 1)
                    Height: =20
                    Icon: =Icon.DocumentWithContent
                    OnSelect: =Select(Parent)
                    Width: =20
                    X: =15
                    Y: =5
                    ZIndex: =2

                GRAddTestCaseIcon As icon.AddLibrary:
                    Color: =RGBA(255, 152, 1, 1)
                    Height: =20
                    Icon: =Icon.AddLibrary
                    OnSelect: |-
                        =Set( close, true);
                        
                        ClearCollect( colRequirementProperties, ThisItem.properties);
                        
                        Set( areqid, ThisItem)
                    Tooltip: ="Create Test Case"
                    Visible: =If(ThisItem.IsSelected && varReqGallerySelected,true,false)
                    Width: =20
                    X: =LabelRequirementName.X + LabelRequirementName.Width
                    Y: =LabelRequirementName.Y + 5
                    ZIndex: =3

                LabelRequirementName As label:
                    Color: =If( LabelRequirementName.Text = GalleryRequirement.Selected.name, RGBA(17, 192, 190, 1), RGBA(107, 106, 106, 1))
                    Font: =Font.'Segoe UI'
                    FontWeight: =FontWeight.Semibold
                    Height: =30
                    HoverColor: =RGBA(70, 189, 198, 1)
                    OnSelect: |-
                        =UpdateContext(
                            { 
                                showTCLoadingSpinner: true
                            }
                        );
                        
                        Set( close, false);
                        
                        Set( varTCpageNumber, 1);
                        
                        Set( varTCQuery, Blank());
                        
                        Set( areqid, ThisItem);
                        
                        ClearCollect( colRequirementProperties, ThisItem.properties);
                        
                        ClearCollect( 
                            CollectTestcaseId, 
                            'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink( 
                                constProjectInfo.id, 
                                { 
                                    type: "requirements", 
                                    ids: areqid.id
                                }
                            )
                        );
                        
                        Clear( ColABC);
                        
                        ForAll( 
                            CollectTestcaseId, 
                            Collect( 
                                ColABC, 
                                objects
                            )
                        );
                        
                        ClearCollect(
                            colTCOnly,
                            With(
                                { varTCData: SortByColumns( Filter( ColABC, StartsWith(pid, "TC-")), "pid", SortOrder.Descending)},
                                ForAll(
                                    Sequence( CountRows( varTCData)),
                                    {
                                        Number: Value,
                                        id: Last( FirstN( varTCData, Value)).id,
                                        pid: Last( FirstN( varTCData, Value)).pid
                                    }
                                )
                            )
                        );
                        
                        Set(
                            varTCQuery,
                            With(
                                {
                                    varConcatinatedTCData:
                                        FirstN(
                                            LastN(
                                                Sort( colTCOnly, Number, SortOrder.Ascending),
                                                CountRows( colTCOnly) - ( (varTCpageNumber - 1) * nfAuthorTestCasePageSizeTC)
                                            ),
                                            nfAuthorTestCasePageSizeTC
                                        )
                                },
                                Concat(
                                    varConcatinatedTCData,
                                    "'Id' = '" & pid & "'",
                                    " or "
                                )
                            )
                        );
                        
                        If(
                            !IsBlank( varTCQuery),
                        
                            UpdateContext(
                                {
                                    TotalTCRecords: 
                                    'ITS-TCOE_OCTO_UATMain_V1'.Search( 
                                        constProjectInfo.id, 
                                        {
                                            object_type: "test-cases", 
                                            page: nfAuthorTestCasePageTC, 
                                            pageSize: nfAuthorTestCasePageSizeTC, 
                                            fields: ["*"], 
                                            query: varTCQuery 
                                        }
                                    )
                                }
                            );
                        
                            Set( varAUTestCaseCount, CountRows( colTCOnly));
                        
                            ClearCollect( colTestCase, TotalTCRecords.items),
                        
                            Clear( colTestCase)
                        );
                        
                        UpdateContext(
                            {
                                varReqGallerySelected: true
                            }
                        );
                        
                        UpdateContext(
                            {
                                varModulename: 
                                'ITS-TCOE_OCTO_UATMain_V1'.GetAModule( 
                                    constProjectInfo.id, 
                                    ThisItem.parent_id
                                )
                            }
                        );
                        
                        UpdateContext(
                            { 
                                showTCLoadingSpinner: false
                            }
                        );
                    Size: =11
                    Text: ="(" & ThisItem.pid & ") "& ThisItem.name
                    Tooltip: =ThisItem.name
                    VerticalAlign: =VerticalAlign.Top
                    Width: =350
                    Wrap: =false
                    X: =GMFilderIcon.X + GMFilderIcon.Width
                    ZIndex: =4

                ButtonRequirementName As button:
                    Fill: =RGBA(0, 0, 0, 0)
                    Font: =Font.'Segoe UI'
                    Height: =LabelRequirementName.Height
                    HoverFill: =
                    OnSelect: =Select(LabelRequirementName)
                    PressedFill: =
                    Text: =
                    Tooltip: =ThisItem.name
                    Width: =LabelRequirementName.Width
                    X: =LabelRequirementName.X
                    Y: =LabelRequirementName.Y
                    ZIndex: =5

            GalleryExistingTestCase As gallery.galleryVertical:
                '#CopilotOverlayLabel': ="Filtered"
                BorderColor: =RGBA(232, 244, 217, 1)
                Height: =If(close,180,425)
                Items: =Sort(colTestCase,id,SortOrder.Descending)
                Layout: =Layout.Vertical
                OnSelect: =//Navigate('TestCase Details')
                TemplatePadding: =0
                TemplateSize: =60
                Width: =939
                X: =423
                Y: =ETCBackgroundRectangle.Y + ETCBackgroundRectangle.Height + 5
                ZIndex: =5

                ETSNameValueLbl As label:
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    Size: =10.5
                    Text: =PlainText(ThisItem.name)
                    Tooltip: =PlainText(ThisItem.name)
                    VerticalAlign: =VerticalAlign.Top
                    Width: =140
                    X: =ETSTestCaseIdvalueLbl.X + ETSTestCaseIdvalueLbl.Width
                    ZIndex: =1

                ETSTestCaseIdvalueLbl As label:
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Color: =RGBA(0, 166, 255, 1)
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: |-
                        =//Set variable to decide network call or back func
                        Set(checkUpdateTestCase,false);
                        
                        Clear(colUpdatedTestCaseDetail);
                        
                        Set(Index,1);
                        
                        ClearCollect(colTraceOfClickTC,{ID:Index,TC:ThisItem.id});
                        
                        Navigate( 'Author Test Case Details', ScreenTransition.None, {gallerySelectedTestcase: ThisItem});
                    PaddingLeft: =12
                    Size: =10.5
                    Text: =ThisItem.pid
                    Tooltip: =Self.Text
                    VerticalAlign: =VerticalAlign.Top
                    Width: =90
                    ZIndex: =2

                ETSDescriptionValueLbl As label:
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    Size: =10.5
                    Text: =PlainText(ThisItem.description)
                    Tooltip: =PlainText(ThisItem.description)
                    VerticalAlign: =VerticalAlign.Top
                    Width: =170
                    X: =ETSNameValueLbl.X + ETSNameValueLbl.Width
                    ZIndex: =3

                ETSTestStepsValueLbl As label:
                    Align: =Align.Center
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Size: =10.5
                    Text: =LookUp( ThisItem.properties, field_name = "Automation Progress", field_value_name)
                    Tooltip: =Self.Text
                    Width: =ETCAutomationProgressLbl.Width
                    X: =ETSTypeValueLbl.X + ETSTypeValueLbl.Width
                    ZIndex: =4

                ETSTypeValueLbl As label:
                    Align: =Align.Center
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    PaddingLeft: =10
                    Size: =10.5
                    Text: =LookUp(ThisItem.properties,field_name="Type",field_value_name)
                    Tooltip: =Self.Text
                    Width: =90
                    Wrap: =false
                    X: =ETCStatusValueBtn.X + ETCStatusValueBtn.Width+10
                    ZIndex: =5

                ETSSTatusvalueLbl As label:
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Color: =RGBA(107, 106, 106, 1)
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Size: =11
                    Text: =LookUp(ThisItem.properties,field_name="Status",field_value_name)
                    VerticalAlign: =VerticalAlign.Top
                    Visible: =false
                    Width: =90
                    Wrap: =false
                    X: =ETSDescriptionValueLbl.X + ETSDescriptionValueLbl.Width
                    ZIndex: =6

                ETSPriorityValueLbl As label:
                    Align: =Align.Center
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    Size: =10.5
                    Text: =LookUp( ThisItem.properties, field_name = "Non-QA User (UATNext Only)", field_value_name)
                    Tooltip: =Self.Text
                    Width: =ETCNonQaUserLbl.Width
                    X: =ETSAssignedToValueLbl.X + ETSAssignedToValueLbl.Width
                    ZIndex: =7

                ETSAssignedToValueLbl As label:
                    Align: =Align.Center
                    BorderColor: =RGBA(240, 248, 255, 1)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.2
                    Font: =Font.'Segoe UI'
                    Height: =60
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    Size: =10.5
                    Text: =Mid( LookUp( ThisItem.properties, field_name = "Assigned To", field_value_name), 2, ( Find( "]", LookUp( ThisItem.properties,field_name = "Assigned To", field_value_name)) - 2))
                    Tooltip: =Self.Text
                    Width: =ETCAssignedToLbl.Width
                    X: =ETSTestStepsValueLbl.X + ETSTestStepsValueLbl.Width
                    ZIndex: =8

                ETCSeperator As rectangle:
                    Fill: =RGBA(177, 227, 230, 1)
                    Height: =1
                    OnSelect: =Select(Parent)
                    Width: =GalleryExistingTestCase.Width
                    X: =ETSTestCaseIdvalueLbl.X + 2
                    Y: =ETSDescriptionValueLbl.Y+ETSDescriptionValueLbl.Height
                    ZIndex: =9

                ETCStatusValueBtn As button:
                    BorderColor: |-
                        =Switch(
                            ETCStatusValueBtn.Text,
                            "New", RGBA(0, 166, 255, 1),//ColorValue("#54A0FE"), 
                            "In Progress", ColorValue("#81A489"),
                            "Ready For Baseline", ColorValue("#F1C40F"),
                            "Baselined", ColorValue("#34495E")
                        )
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.5
                    Color: |-
                        =Switch(
                            ETCStatusValueBtn.Text,
                            "New", ColorValue("#3468C0"), 
                            "In Progress", ColorValue("#54A0FE"),
                            "Ready For Baseline", ColorValue("#E3651D"),
                            "Baselined", ColorValue("#F39F5A")
                        )
                    DisabledBorderColor: |-
                        =RGBA(255, 255, 255, 1)
                        /*If(Button2.Text="New",ColorValue("#1F4172"), 
                        If(Button2.Text="In Progress",ColorValue("#81A489"),
                        If(Button2.Text="Ready For Baseline",ColorValue("#B06161"),
                        If(Button2.Text="Baselined",ColorValue("#776B5D")
                        ))))*/
                    DisabledColor: |-
                        =Switch(
                            ETCStatusValueBtn.Text,
                            "New", ColorValue("#3468C0"), 
                            "In Progress", ColorValue("#54A0FE"),
                            "Ready For Baseline", ColorValue("#E3651D"),
                            "Baselined", ColorValue("#E94560"),
                            "Inactive", ColorValue("#A0A0A0")
                        )
                    DisabledFill: |-
                        =Switch(
                            ETCStatusValueBtn.Text,
                            "New", ColorValue("#D8DEFE"), 
                            "In Progress", ColorValue("#D5F0C1"),
                            "Ready For Baseline", ColorValue("#FFDBAA"),
                            "Baselined", ColorFade(ColorValue("#FF9B9B"),30%),
                            "Inactive", ColorFade( ColorValue("#A0A0A0"), 70%)
                        )
                    DisplayMode: =DisplayMode.Disabled
                    Fill: |-
                        =Switch(
                            ETCStatusValueBtn.Text,
                            "New", ColorValue("#D8DEFE"), 
                            "In Progress", ColorValue("#D5F0C1"),
                            "Ready For Baseline", ColorValue("#FFDBAA"),
                            "Baselined", ColorValue("#FDFFAB")
                        )
                    Font: =Font.'Segoe UI'
                    Height: =25
                    OnSelect: =Select(Parent)
                    RadiusBottomLeft: =5
                    RadiusBottomRight: =5
                    RadiusTopLeft: =5
                    RadiusTopRight: =5
                    Size: =7
                    Text: =LookUp( ThisItem.properties, field_name = "Status", field_value_name)
                    Tooltip: =Self.Text
                    Width: =ETCStatusLbl.Width-10
                    X: =ETSDescriptionValueLbl.X + ETSDescriptionValueLbl.Width+10
                    Y: =18
                    ZIndex: =10

                TCBrokenLinkImage As image:
                    Height: =DelinkTestCaseBtn.Height
                    Image: ='Broken link'
                    OnSelect: =Select(Parent)
                    Width: =DelinkTestCaseBtn.Width
                    X: =DelinkTestCaseBtn.X
                    Y: =DelinkTestCaseBtn.Y
                    ZIndex: =11

                DelinkTestCaseBtn As icon.Add:
                    Color: |-
                        =Color.Transparent
                        
                        //RGBA(184, 0, 0, 1)
                    Height: =30
                    Icon: =Icon.Trash
                    OnSelect: |-
                        =UpdateContext(
                            { 
                                showTCLoadingSpinner: true
                            }
                        );
                        
                        UpdateContext(
                            {
                                gallerySelectedTestcase: ThisItem
                            }
                        );
                        
                        'ITS-TCOE_OCTO_UATMain_V1'.RemoveObjectLink( 
                            constProjectInfo.id, 
                            "requirements", 
                            areqid.id,
                            {
                                type: "test-cases", 
                                RemoveLinkedObjectsResuestBody: [gallerySelectedTestcase.id]
                            }
                        );
                        
                        RemoveIf( CollectTestcaseId, id = gallerySelectedTestcase.id);
                        
                        RemoveIf( ColABC, id = gallerySelectedTestcase.id);
                        
                        ClearCollect(
                            colTCOnly,
                            With(
                                { varTCData: SortByColumns( Filter( ColABC, StartsWith(pid, "TC-")), "pid", SortOrder.Descending)},
                                ForAll(
                                    Sequence( CountRows( varTCData)),
                                    {
                                        Number: Value,
                                        id: Last( FirstN( varTCData, Value)).id,
                                        pid: Last( FirstN( varTCData, Value)).pid
                                    }
                                )
                            )
                        );
                        
                        If( 
                            Parent.AllItemsCount = 1, 
                            Set( varTCpageNumber, varTCpageNumber-1)
                        );
                        
                        Set(
                            varTCQuery,
                            With(
                                {
                                    varConcatinatedTCData:
                                        FirstN(
                                            LastN(
                                                Sort( colTCOnly, Number, SortOrder.Ascending),
                                                CountRows( colTCOnly) - ( (varTCpageNumber - 1) * nfAuthorTestCasePageSizeTC)
                                            ),
                                            nfAuthorTestCasePageSizeTC
                                        )
                                },
                                Concat(
                                    varConcatinatedTCData,
                                    "'Id' = '" & pid & "'",
                                    " or "
                                )
                            )
                        );
                        
                        If(
                            !IsBlank( varTCQuery),
                        
                            UpdateContext(
                                {
                                    TotalTCRecords: 
                                    'ITS-TCOE_OCTO_UATMain_V1'.Search( 
                                        constProjectInfo.id, 
                                        {
                                            object_type: "test-cases", 
                                            page: nfAuthorTestCasePageTC, 
                                            pageSize: nfAuthorTestCasePageSizeTC, 
                                            fields: ["*"], 
                                            query: varTCQuery 
                                        }
                                    )
                                }
                            );
                        
                            Set( varAUTestCaseCount, CountRows( colTCOnly));
                        
                            ClearCollect( colTestCase, TotalTCRecords.items),
                        
                            Clear( colTestCase)
                        );
                        
