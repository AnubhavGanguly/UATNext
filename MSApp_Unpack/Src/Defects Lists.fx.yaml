    DLPaginationLeftNavIcon As icon.ArrowLeft:
        Color: =RGBA(128, 128, 128, 1)
        Height: =35
        Icon: =Icon.ArrowLeft
        OnSelect: |-
            =Set( varDFPageNumber, varDFPageNumber - 1);
            
            If(
                searchOn = false,
                
                ClearCollect( colDefectList, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {page: varDFPageNumber, pageSize:nfDefectPageSize, object_type: "defects", fields: ["*"], query: varFilteredDefectsQuery}).items),
            
                ClearCollect( colDefectList, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {page: varDFPageNumber, pageSize: nfDefectPageSize, object_type: "defects", fields:["*"], query: varDefectSearchQuery}).items)
            )
        Visible: =If( varDFPageNumber = 1 || DLDefectListGallery.AllItemsCount = 0, false, true)
        Width: =35
        X: =590
        Y: =DLPaginationInfoLbl.Y + 5
        ZIndex: =7

    DLPaginationRightNavIcon As icon.ArrowLeft:
        Color: =RGBA(128, 128, 128, 1)
        Height: =35
        Icon: =Icon.ArrowRight
        OnSelect: |-
            =Set(varDFPageNumber, varDFPageNumber + 1);
            
            If(
                searchOn = false,
                
                ClearCollect( colDefectList, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {page: varDFPageNumber, pageSize: nfDefectPageSize,object_type: "defects", fields: ["*"], query: varFilteredDefectsQuery}).items),
            
                ClearCollect( colDefectList, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {page: varDFPageNumber, pageSize: nfDefectPageSize, object_type: "defects", fields:["*"], query: varDefectSearchQuery}).items)
            )
        Visible: =If( DLDefectListGallery.AllItemsCount = 0 || varDFPageNumber = RoundUp( defectCount / nfDefectPageSize, 0), false, true)
        Width: =35
        X: =DLPaginationInfoLbl.X + DLPaginationInfoLbl.Width
        Y: =DLPaginationInfoLbl.Y + 5
        ZIndex: =8

    DLPaginationInfoLbl As label:
        Align: =Align.Center
        Color: =RGBA(19, 61, 83, 1)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Lighter
        Size: =11
        Text: ="Page " & varDFPageNumber & " of " & RoundUp( defectCount / nfDefectPageSize, 0) & " Pages"
        Visible: =If( DLDefectListGallery.AllItemsCount > 0 , true, false)
        X: =DLPaginationLeftNavIcon.X + DLPaginationLeftNavIcon.Width
        Y: =725
        ZIndex: =9

