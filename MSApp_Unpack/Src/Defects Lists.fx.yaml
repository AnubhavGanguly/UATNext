            DLSearchIcon As button:
                BorderThickness: =0.1
                Fill: =RGBA(70, 189, 198, 1)
                FocusedBorderThickness: =0.4
                Font: =Font.'Segoe UI'
                Height: =31
                HoverBorderColor: =ColorFade(Self.HoverFill, 20%)
                HoverFill: =RGBA(255, 152, 1, 1)
                OnSelect: |
                    =// Hide NoTestRun Found Status Msg
                    UpdateContext({varDefectErrorMsg: false});
                    
                    // Building the search query based on the affected release selection
                    If(
                        !IsBlank( DefectAffRealBuild),
                        UpdateContext({
                            varDefectSearchQuery: Left(
                                Concatenate( DefectId, DefectSummery, DefectStatus, DefectPriority, DefectSeverity, DefectAssignedTo, DefectTeam, DefectBusinessUser, DefectCreatedBy, DefectAffRealBuild),
                    
                                Len(
                                    Concatenate( DefectId, DefectSummery, DefectStatus, DefectPriority, DefectSeverity, DefectAssignedTo, DefectTeam, DefectBusinessUser, DefectCreatedBy, DefectAffRealBuild)
                                ) - 4
                            )
                        }),
                    
                        UpdateContext({
                            varDefectSearchQuery: varFilteredDefectsQuery & " And " & Left(
                                Concatenate( DefectId, DefectSummery, DefectStatus, DefectPriority, DefectSeverity, DefectAssignedTo, DefectTeam, DefectBusinessUser, DefectCreatedBy, DefectAffRealBuild),
                    
                                Len(
                                    Concatenate( DefectId, DefectSummery, DefectStatus, DefectPriority, DefectSeverity, DefectAssignedTo, DefectTeam, DefectBusinessUser, DefectCreatedBy, DefectAffRealBuild)
                                ) - 4
                            )
                        })
                    );
                    
                    If(
                        IsBlank(DefectTeam) && IsBlank(DefectAssignedTo) && IsBlank(DefectSeverity) && IsBlank(DefectPriority) && IsBlank(DefectStatus) && IsBlank(DefectSummery) && IsBlank(DefectId) && IsBlank(DefectAffRealBuild) && IsBlank(DefectBusinessUser) && IsBlank(DefectCreatedBy),
                    
                        Notify( "Please select some value to search.", NotificationType.Error, 4000),
                    
                        UpdateContext({searchOn: true});
                    
                        Set( varDFPageNumber, 1);
                    
                        UpdateContext(
                            {
                                varDefectRecord: 'ITS-TCOE_OCTO_UATMain_V1'.Search(
                                    constProjectInfo.id,
                                    {
                                        object_type: "defects",
                                        page: varDFPageNumber,
                                        pageSize: nfDefectPageSize,
                                        fields: ["*"],
                                        query: varDefectSearchQuery
                                    }
                                )
                            }
                        );
                    
                        UpdateContext({defectCount: varDefectRecord.total});
                    
                        ClearCollect(
                            colDefectList,
                            varDefectRecord.items
                        );
                    
                        UpdateContext({varDFSearchReset: true})
                    );
                    
                    If(
                        CountRows(colDefectList) = 0,
                    
                        UpdateContext({varDefectErrorMsg: true}),
                        UpdateContext({varDefectErrorMsg: false})
                    );
