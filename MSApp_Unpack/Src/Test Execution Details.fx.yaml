"'Test Execution Details' As screen.'phoneLayout_FluidGridWithHeaderPageLayout_ver3.0'":
    OnHidden: |-
        =UpdateContext({addDefectVisiblity: false})
    OnVisible: |-
        =//Enabling TEDLoading Spinnier
        UpdateContext({ showTEDLoadingSpinner: true});
        
        Concurrent(
            Set(varScreenName, "Test Execution Details"),
        
            Set(varVideoLink, Concatenate(nfSharepointbaseUrl,"video/Test_Execution_Details.mp4")),
            
            Set(varPDFLink, Concatenate(nfSharepointbaseUrl,"pdf/Test_Execution_Details.pdf"))
        );
        
        Concurrent(
            Reset(StatusCombobox),
        
            Reset(TETLRadioButton),
        
            Reset(ChangeLogToggle),
        
            Clear(colAttachmentsTR),
        
            Clear(colTestLogTestStep)
        );
        
        UpdateContext({ExeStartDate: Concatenate( Text(  DateAdd( Now(), TimeZoneOffset( Now()), TimeUnit.Minutes), "yyyy-mm-dd"), "T", Text(  DateAdd( Now(), TimeZoneOffset( Now()), TimeUnit.Minutes), "hh:mm:ss"),"+00:00")});
        
        UpdateContext({ExeEndDate: Concatenate( Text( DateAdd( Now(), TimeZoneOffset( Now()), TimeUnit.Minutes), "yyyy-mm-dd"), "T", Text( DateAdd( Now(),TimeZoneOffset( Now()), TimeUnit.Minutes), "hh:mm:ss"),"+00:00")});
        
        If(
            IsBlank(SelectedCycleinfo),
        
            Set(TestCycleId, Last(Split(LookUp(gallerySelectedTestrun.links,rel = "test-cycle",href), "/")).Value);
        
            Set(CycleInfo , 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-cycles", fields: ["*"], query: Concatenate("'Id' ", "=", " '" & TestCycleId & "' ")}).items);
        
            Set(CycleName, First(CycleInfo).name),
        
            Set(CycleName,Trim(SelectedCycleinfo.name))
        );
        
        If( IsBlank(selectedSuiteInfo), Set( selectedSuiteInfo, 'ITS-TCOE_OCTO_UATMain_V1'.GetAtestsuite(constProjectInfo.id,gallerySelectedTestrun.parentId)));
        
        UpdateContext({CreatecolTestLogTestStep:false});
        
        Set( varFetchedTestcaseDetail, 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink(constProjectInfo.id,{type:"test-runs",ids:gallerySelectedTestrun.id}).objects);
        
        Clear(colFetchedTestcaseidrows);
        
        ForAll( varFetchedTestcaseDetail, Collect( colFetchedTestcaseidrows, ThisRecord.objects));
        
        Set( FetchedTestCaseDetails, 'ITS-TCOE_OCTO_UATMain_V1'.GetTestcase( constProjectInfo.id, LookUp( colFetchedTestcaseidrows, StartsWith( pid, "TC"), id)));
        
        //Disable TEDLoading Spinnier
        UpdateContext({ showTEDLoadingSpinner: false});

