                                        Now(),
                                        TimeZoneOffset(Now()),
                                        TimeUnit.Minutes
                                    ),
                                    "hh:mm:ss"
                                ),
                                "+00:00"
                            )
                        }
                    );
                    
                    If(
                        varCreateTestLog = true,
                    
                        ClearCollect(
