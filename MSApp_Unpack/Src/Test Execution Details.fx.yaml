                                            field_value_name: ""
                                        }
                                    ],
                    
                                    test_case_version_id: lastApprovedVersionId
                                }
                            )
                        );
                    
                        Set( varCreateTestLog, false);
                    
                        Navigate('Test Execution Details'),
                    
                    
                        If(
                            IsEmpty( colTestLogTestStep),
                    
                            ClearCollect(
                                colLatestTestLog,
                                'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestlogStatus(
                                    constProjectInfo.id,
                                    gallerySelectedTestrun.id,
                                    TSGallery.Selected.id,
                                    {
                                        properties: [
