                TSLDLinkDefectBtn As button:
                    BorderThickness: =0.4
                    DisplayMode: |+
                        =If(!IsBlank(TSLDSearchDefectGal.Selected.id) ,DisplayMode.Edit,DisplayMode.Disabled  )
                        
                    Fill: =RGBA(70, 189, 198, 1)
                    FocusedBorderThickness: =0.4
                    Font: =Font.'Segoe UI'
                    Height: =30
                    HoverBorderColor: =ColorFade(Self.HoverFill, 20%)
                    HoverFill: =RGBA(255, 152, 1, 1)
                    OnSelect: |-
                        =If( 
                            varLinkDefectVisibility = false, 
                            
                            Notify( "Please save the execution before submitting the defect.", NotificationType.Error, 4000),
                        
                            //UpdateContext({ showTEDLoadingSpinner: true});
                        
                            UpdateContext({ varLinkedDefectRes: 'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(
                                    constProjectInfo.id,
                                    "test-steps",
                                    varSelectedTestStepForDefect.test_step_log_id,
                                    {
                                        type: "defects",
                                        CreateAobjectlinkingRequestBody: [TSLDSearchDefectGal.Selected.id]
                                    }
                                )
                            });
                        
                            'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestlogStatus(
                                constProjectInfo.id,
                                gallerySelectedTestrun.id,
                                LookUp(
                                    colTestSteplog,
                                    result_number = Max(
                                        colTestSteplog,
                                        result_number
                                    )
                                ).id,
                                {
                                    properties: [
                                        {
                                            field_id: varTestRunUpdatedByUAT,
                                            field_name: "Updated By (UATNext Only)",
                                            field_value: nfUserObject.'Full Name',
                                            field_value_name: ""
                                        }
                                    ],
                                    exe_end_date: ExeEndDate,
                                    exe_start_date: ExeStartDate,
                                    status: LookUp( colTestSteplog, result_number = Max( colTestSteplog, result_number)).status
                                }
                            );
                        
                            Set( varFetchedTestStepLinkedDefectPid, 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink(constProjectInfo.id,{type:"test-steps",ids:varSelectedTestStepForDefect.test_step_log_id}).objects);
                        
                            Clear(colFetchedTestStepLinkedDefectPid);
                        
                            ForAll( varFetchedTestStepLinkedDefectPid, Collect( colFetchedTestStepLinkedDefectPid, ThisRecord.objects));
                        
                            ClearCollect(
                                colTestSteplog,
                                'ITS-TCOE_OCTO_UATMain_V1'.GetTestLog(
                                    constProjectInfo.id,
                                    gallerySelectedTestrun.id
                                ).items
                            );
                        
                            If(
                                !IsBlank( varLinkedDefectRes),
                        
                                Notify(
                                    "Successfully Linked Defect.",
                                    NotificationType.Success,
                                    4000
                                ),
                        
                                Notify(
                                    "Linking Defect Failed",
                                    NotificationType.Error,
                                    4000
                                )
                            );
                        
                        
                            Clear(colSearchDefect);
                        
                            Reset(TSLDefectSearchTxtBox);
                        
                            UpdateContext({varNRF: false});
                        
                            UpdateContext({ addDefectVisiblity: false});
                        
                            //UpdateContext({ showTEDLoadingSpinner: false});
                        
                            //Testrun list screen data show without network call
                            Update(
                                colTestRun,
                                LookUp(
                                    colTestRun,
                                    id = gallerySelectedTestrun.id
                                ),
                                {
                                    automation: gallerySelectedTestrun.automation,
                                    id: gallerySelectedTestrun.id,
                                    name: gallerySelectedTestrun.name,
                                    order: gallerySelectedTestrun.order,
                                    parentId: gallerySelectedTestrun.parentId,
                                    parentType: gallerySelectedTestrun.parentType,
                                    pid: gallerySelectedTestrun.pid,
                                    properties: First(colTestSteplog).properties,
                                    testCaseId: gallerySelectedTestrun.testCaseId,
                                    latest_test_log: {
                                        id: First(colLatestTestLog).id,
                                        exe_end_date: First(colLatestTestLog).exe_end_date,
                                        exe_start_date: First(colLatestTestLog).exe_start_date,
                                        status: ""
                                    }
                                }
                            );
                        
                            Navigate('Test Execution Details')
                        )
                    RadiusBottomLeft: =4
