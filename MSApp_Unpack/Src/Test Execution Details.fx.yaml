                                        ) + 1,
                                        Len(varDemoFormAttachmentCOntrol) - Find(
                                            ",",
                                            varDemoFormAttachmentCOntrol
                                        ) - 1
                                    )
                                ),
                                name,
                                CDAHNameValue_1.Text,
                                content_type,
                                CDAHContentTypeValue_1.Text,
                                created_date,
                                Concatenate(
                                    Text(
                                        DateAdd(
                                            Now(),
                                            TimeZoneOffset(Now()),
                                            TimeUnit.Minutes
                                        ),
                                        "yyyy-mm-dd"
                                    ),
                                    "T",
                                    Text(
                                        DateAdd(
                                            Now(),
                                            TimeZoneOffset(Now()),
                                            TimeUnit.Minutes
                                        ),
                                        "hh:mm:ss"
                                    ),
                                    "+00:00"
                                )
                            ),
                            data,
                            name,
                            content_type,
                            created_date
                        )
                    );
                    
                    UpdateContext(
