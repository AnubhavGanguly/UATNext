            "'IDCSave&SubmitBtn' As button":
                BorderThickness: =0.4
                Fill: =RGBA(4, 141, 154, 1)
                FocusedBorderThickness: =0.4
                Font: =Font.'Segoe UI'
                HoverBorderColor: =ColorFade(Self.HoverFill, 20%)
                HoverFill: =RGBA(255, 152, 1, 1)
                OnSelect: |-
                    =UpdateContext({ showCDLoadingSpinner: true});
                    
                    
                    ClearCollect(
                        colTotalAttachments,
                        ShowColumns(
                            AddColumns(
                                ICDAttachmentsHiddenGal.AllItems,
                                data,
                                With(
                                    {
                                        varDemoFormAttachmentCOntrol: JSON(
                                            ICDAHGImage.Image,
                                            JSONFormat.IncludeBinaryData
                                        )
                                    },
                                    Mid(
                                        varDemoFormAttachmentCOntrol,
                                        Find(
                                            ",",
                                            varDemoFormAttachmentCOntrol
                                        ) + 1,
                                        Len(varDemoFormAttachmentCOntrol) - Find(
                                            ",",
                                            varDemoFormAttachmentCOntrol
                                        ) - 1
                                    )
                                ),
                                name,
                                ICDAHNameValue.Text,
                                content_type,
                                ICDAHContentTypeValue.Text
                            ),
                            data,
                            name,
                            content_type
                        )
                    );
                    
                    
                    Concurrent(
                        ClearCollect(
                            colTemDefSummary,
                            {
                                field_id: First(colAllDefectFieldsId).Summary,
                                field_name: "Summary",
                                field_value: ICDSummaryTxtInput.Text,
                                field_value_name: ""
                            }
                        ),
                        ClearCollect(
                            colTemDefCreatedby,
                            {
                                field_id: First(colAllDefectFieldsId).CreatedByUAT,
                                field_name: "Created By (UATNext Only)",
                                field_value: nfUserObject.'Full Name',
                                field_value_name: ""
                            }
                        ),
                        ClearCollect(
                            colTempDefUpdatedby,
                            {
                                field_id: First(colAllDefectFieldsId).UpdatedByUAT,
                                field_name: "Updated By (UATNext Only)",
                                field_value: nfUserObject.'Full Name',
                                field_value_name: ""
                            }
                        ),
                        ClearCollect(
                            colTemDefDescription,
                            {
                                field_id: First(colAllDefectFieldsId).Description,
                                field_name: "Description",
                                field_value: ICDDescriptionTxtInput.Text,
                                field_value_name: ""
                            }
                        )
                    );
                    
                    
                    Clear(colTemDefFinalProperty);
                    
                    
                    Collect(
                        colTemDefFinalProperty,
                    
                        If( !IsEmpty(colTemDefSummary), colTemDefSummary),
                    
                        If( !IsEmpty(colTemDefCreatedby), colTemDefCreatedby),
                    
                        If( !IsEmpty(colTempDefUpdatedby), colTempDefUpdatedby),
                    
                        If( !IsEmpty(colTemDefDescription), colTemDefDescription),
                        
                        If( !IsEmpty(colTemDefAffReaBuild), colTemDefAffReaBuild),
                    
                        If( !IsEmpty(colTemDefSeverity), colTemDefSeverity),
                    
                        If( !IsEmpty(colTemDefFixedRelease), colTemDefFixedRelease),
                    
                        If( !IsEmpty(colTemDefRootCause), colTemDefRootCause),
                    
                        If( !IsEmpty(colTemDefPriority), colTemDefPriority), 
                        
                        If( !IsEmpty(colTemDefStatus), colTemDefStatus),
                    
                        If( !IsEmpty(colTemDefType), colTemDefType),
                    
                        If( !IsEmpty(colTemDefTRBuild), colTemDefTRBuild),
                        
                        If( !IsEmpty(colTemDefReason), colTemDefReason),
                    
                        If( !IsEmpty(colTemDefCategory), colTemDefCategory),
                    
                        If( !IsEmpty(colTemDefEnvironment), colTemDefEnvironment),
                    
                        If( !IsEmpty(colTemDefAssignTo), colTemDefAssignTo),
                    
                        If( !IsEmpty(colTemDefNonQAUser), colTemDefNonQAUser),
                    
                        If( !IsEmpty(colTemDefTeam), colTemDefTeam),
                    
                        If( !IsEmpty(colTemDefModule), colTemDefModule)
                    );
                    
                    
                    If( 
                        Lower( nfTeamsInfo)="no",
                    
                    
                        If(
                            !IsBlank(ICDSummaryTxtInput.Text) && !IsBlank(ICDDescriptionTxtInput.Text) && !IsBlank(CDModuleCombobox.Selected) && !IsBlank(ICDAffectedReleaseCombobox.Selected) && !IsBlank(ICDSeverityCombobox.Selected) && !IsBlank(ICDPriorityCombobox.Selected) && !IsBlank(ICDStatusCombobox.Selected) && !IsBlank(ICDTypeCombobox.Selected),
                    
                            UpdateContext({
                                varCreateDefectid:
                    
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateDefect(
                                    constProjectInfo.id,
                                    {
                                        properties: colTemDefFinalProperty,
                                        attachments: colTotalAttachments
                                    }
                                ).id
                            });
                    
                    
                            Notify( "Defect Created Successfully", NotificationType.Success, 4000);
                    
                    
                            If(
                                !IsBlank(ICDComboBoxBusinessUser.Selected),
                    
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateDefectComment(
                                    constProjectInfo.id,
                                    varCreateDefectid,
                                    {
                                        content: "Assigned To : " & ICDComboBoxBusinessUser.Selected.label
                                    }
                                )
                            );
                    
                            If(
                                !IsBlank(varSelectedTestStepForDefect),
                    
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(
                                    constProjectInfo.id,
                                    "test-steps",
                                    varSelectedTestStepForDefect.test_step_log_id,
                                    {
                                        type: "defects",
                                        CreateAobjectlinkingRequestBody: [varCreateDefectid]
                                    }
                                );
                                Set( varFetchedTestStepLinkedDefectPid, 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink(constProjectInfo.id,{type:"test-steps",ids:varSelectedTestStepForDefect.test_step_log_id}).objects);
                    
                                Clear(colFetchedTestStepLinkedDefectPid);
                    
                                ForAll( varFetchedTestStepLinkedDefectPid, Collect( colFetchedTestStepLinkedDefectPid, ThisRecord.objects));
                    
                                ClearCollect(
                                    colTestSteplog,
                                    'ITS-TCOE_OCTO_UATMain_V1'.GetTestLog(
                                        constProjectInfo.id,
                                        gallerySelectedTestrun.id
                                    ).items
                                ),
                    
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(
                                    constProjectInfo.id,
                                    "test-logs",
                                    TestLogId,
                                    {
                                        type: "defects",
                                        CreateAobjectlinkingRequestBody: [varCreateDefectid]
                                    }
                                )
                            );
                    
                    
                            Back(),
                            
                    
                            Notify( "Please fill in all required fields before saving the defect.", NotificationType.Information, 4000)
                        ),
                    
                    
                        If(
                            !IsBlank(ICDSummaryTxtInput.Text) && !IsBlank(ICDDescriptionTxtInput.Text) && !IsBlank(ICDTeamCombobox.Selected) && !IsBlank(CDModuleCombobox.Selected) && !IsBlank(ICDAffectedReleaseCombobox.Selected) && !IsBlank(ICDSeverityCombobox.Selected) && !IsBlank(ICDPriorityCombobox.Selected) && !IsBlank(ICDStatusCombobox.Selected) && !IsBlank(ICDTypeCombobox.Selected),
                    
                    
                            UpdateContext({
                                varCreateDefectid:
                    
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateDefect(
                                    constProjectInfo.id,
                                    {
                                        properties: colTemDefFinalProperty,
                                        attachments: colTotalAttachments
                                    }
                                ).id
                            });
                    
                    
                            Notify( "Defect Created Successfully.", NotificationType.Success, 4000);
                    
                    
                            If(
                                !IsBlank(ICDComboBoxBusinessUser.Selected),
                    
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateDefectComment(
                                    constProjectInfo.id,
                                    varCreateDefectid,
                                    {
                                        content: "Assigned To : " & ICDComboBoxBusinessUser.Selected.label
                                    }
                                )
                            );
                    
                    
                            If(
                                !IsBlank(varSelectedTestStepForDefect),
                                
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(
                                    constProjectInfo.id,
                                    "test-steps",
                                    varSelectedTestStepForDefect.test_step_log_id,
                                    {
                                        type: "defects",
                                        CreateAobjectlinkingRequestBody: [varCreateDefectid]
                                    }
                                );
                                
                                Clear(colFetchedTestStepLinkedDefectPid);
                    
                                ForAll( varFetchedTestStepLinkedDefectPid, Collect( colFetchedTestStepLinkedDefectPid, ThisRecord.objects));
                    
                                ClearCollect(
                                    colTestSteplog,
                                    'ITS-TCOE_OCTO_UATMain_V1'.GetTestLog(
                                        constProjectInfo.id,
                                        gallerySelectedTestrun.id
                                    ).items
                                ),
                    
                                'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(
                                    constProjectInfo.id,
                                    "test-logs",
                                    TestLogId,
                                    {
                                        type: "defects",
                                        CreateAobjectlinkingRequestBody: [varCreateDefectid]
                                    }
                                )
                            );
                    
                    
                            Back(),
                    
                    
                            Notify( "Please fill in all required fields before saving the defect", NotificationType.Information, 4000)
                        )
                    );
                    
                    
                    UpdateContext({ showCDLoadingSpinner: false});
