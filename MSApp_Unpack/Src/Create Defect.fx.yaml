"'Create Defect' As screen.'phoneLayout_FluidGridWithHeaderPageLayout_ver3.0'":
    OnHidden: |-
        =Clear(colTemDefFinalProperty);
        
        Clear(Attachments);
        
        Reset(ICDAttachmentUpload); Reset(ICDSummaryTxtInput); Reset(ICDDescriptionTxtInput); Reset(ICDAffectedReleaseCombobox); Reset(ICDSeverityCombobox); Reset('ICDFR/BCombobox'); Reset(ICDRootCauseCombobox); Reset(ICDPriorityCombobox); Reset(CDModuleCombobox); Reset(ICDAssignedToCOmbobox); Reset(ICDStatusCombobox); Reset(ICDTypeCombobox); Reset(ICDTRBuildCombobox); Reset(ICDReasonCombobox); Reset(ICDCategoryCombobox);
    OnVisible: |-
        =UpdateContext({ showCDLoadingSpinner: true});
        
        Concurrent(
            Set(varScreenName, "Create Defect"),
        
            Set(varVideoLink, Concatenate(nfSharepointbaseUrl,"video/Create_Defect.mp4")),
            
            Set(varPDFLink, Concatenate(nfSharepointbaseUrl,"pdf/Create_Defect.pdf"))
        );
        
        
        Concurrent( Clear(colRequirementDetails), Clear(Attachments), Reset(ICDTeamCombobox), Reset(ICDGalleryENVCombobox));
        
        
        Concurrent( Clear(colTemDefAffReaBuild), Clear(colTemDefSeverity), Clear(colTemDefFixedRelease), Clear(colTemDefRootCause), Clear(colTemDefPriority), Clear(colTemDefModule), Clear(colTemDefEnvironment), Clear(colTemDefStatus), Clear(colTemDefType), Clear(colTemDefTRBuild), Clear(colTemDefReason), Clear(colTemDefCategory), Clear(colTemDefAssignTo), Clear(colTemDefNonQAUser),Clear(colTemDefTeam));
        
        ClearCollect( colLinkedRequirements, Filter( First( 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink( constProjectInfo.id, {type: "test-cases", ids: gallerySelectedTestrun.testCaseId})).objects, StartsWith( Upper( pid), "RQ-")));
        
        ForAll( colLinkedRequirements, Collect( colRequirementDetails, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "requirements", fields:["*"], query: $"'Id' = '{ThisRecord.id}'"}).items));
        
        
        Concurrent(
            ClearCollect(
                colTemDefAffReaBuild,
                {
                    field_id: First(colAllDefectFieldsId).AffectedReleaseBuild,
                    field_name: "Affected Release/Build",
                    field_value: Text( LookUp( colAffectReleaseValues, label = constReleaseInfo.name).value),
                    field_value_name: LookUp( colAffectReleaseValues, label = constReleaseInfo.name).label
                }
            ),
        
            If(
                !IsBlank( LookUp( colSeverityValues, is_default = true)),
        
                ClearCollect(
                    colTemDefSeverity,
                    {
                        field_id: First(colAllDefectFieldsId).Severity,
                        field_name: "Severity",
                        field_value: Text( LookUp( colSeverityValues, is_default = true).value),
                        field_value_name: LookUp( colSeverityValues, is_default = true).label
                    }
                ),
        
                ClearCollect( colTemDefSeverity, Blank())
            ),
        
            If(
                !IsBlank( LookUp( colRotCauseValues, is_default = true)),
            
                ClearCollect(
                    colTemDefRootCause,
                    {
                        field_id: First(colAllDefectFieldsId).RootCause,
                        field_name: "Root Cause",
                        field_value: Text( LookUp( colRotCauseValues, is_default = true).value),
                        field_value_name: LookUp( colRotCauseValues, is_default = true).label
                    }
                ),
        
                ClearCollect( colTemDefRootCause, Blank())
            ),
            
            If(
                !IsBlank( LookUp( colPriorityValues, is_default = true)),
        
                ClearCollect(
                    colTemDefPriority,
                    {
                        field_id: First(colAllDefectFieldsId).Priority,
                        field_name: "Priority",
                        field_value: Text( LookUp( colPriorityValues, is_default = true).value),
                        field_value_name: LookUp( colPriorityValues, is_default = true).label
                    }
                ),
        
                ClearCollect( colTemDefPriority, Blank())
            ),
        
            ClearCollect(
                colTemDefModule,
                {
                    field_id: First(colAllDefectFieldsId).Module,
                    field_name: "Module",
                    field_value: Text( LookUp( colModuleValues, value = constAreaPathModuleInfo.id).value),
                    field_value_name: LookUp( colModuleValues, value = constAreaPathModuleInfo.id).label
                }
            ),
        
            If(
                !IsBlank( LookUp( colStatusValues, is_default = true)),
        
                ClearCollect(
                    colTemDefStatus,
                    {
                        field_id: First(colAllDefectFieldsId).Status,
                        field_name: "Status",
                        field_value: Text( LookUp( colStatusValues, is_default = true).value),
                        field_value_name: LookUp( colStatusValues, is_default = true).label
                    }
                ),
        
                ClearCollect( colTemDefStatus, Blank())
            ),
        
            If(
                !IsBlank( LookUp( colTypeValues, is_default = true)),
        
                ClearCollect(
                    colTemDefType,
                    {
                        field_id: First(colAllDefectFieldsId).Type,
                        field_name: "Type",
                        field_value: Text( LookUp( colTypeValues, is_default = true).value),
                        field_value_name: LookUp( colTypeValues, is_default = true).label
                    }
                ),
        
                ClearCollect( colTemDefType, Blank())
            ),
        
            If(
                !IsBlank( LookUp( colCategoryValues, is_default = true)),
        
                ClearCollect(
                    colTemDefCategory,
                    {
                        field_id: First(colAllDefectFieldsId).Category,
                        field_name: "Category",
                        field_value: Text( LookUp( colCategoryValues, is_default = true).value),
                        field_value_name: LookUp( colCategoryValues, is_default = true).label
                    }
                ),
        
                ClearCollect( colTemDefCategory, Blank())
            )
        );
        
        UpdateContext({ showCDLoadingSpinner: false});

