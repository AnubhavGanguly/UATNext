"'Execute Test Cases' As screen.'phoneLayout_FluidGridWithHeaderPageLayout_ver3.0'":
    OnHidden: =
    OnVisible: |
        =//Set variable value with true
        Set(varShowRec,true);
        
        Concurrent(
            Set(varScreenName, "Execute UAT Test Cases"),
        
            Set(varVideoLink, Concatenate(nfSharepointbaseUrl,"video/Execute_Test_Cases.mp4")),
            
            Set(varPDFLink, Concatenate(nfSharepointbaseUrl,"pdf/Execute_Test_Cases.pdf"))
        );
        
        //Set variable value with false
        Set(varShowRec,false)

    TRCanvas As fluidGrid.fluidGridWithBlankCard:
        BorderThickness: =0
        Height: =Parent.Height - Self.Y
        Width: =Parent.Width
        Y: =EUATTC_Outer_Header_Component.Y + EUATTC_Outer_Header_Component.Height 
        ZIndex: =3

        TRDataCard As dataCard:
            BorderColor: =RGBA(0, 0, 0, 1)
            BorderStyle: =BorderStyle.Solid
            BorderThickness: =0
            DisplayMode: =DisplayMode.Edit
            Fill: |-
                =//RGBA(242, 240, 240, 1)
                ColorFade(RGBA(70, 189, 198, 1), 90%)
            Height: =Parent.Height
            Width: =Parent.Width
            WidthFit: =false
            X: =0
            Y: =0
            ZIndex: =1

            TRTestRunGalbackgroundRectangle As rectangle:
                Fill: =RGBA(255, 255, 255, 1)
                Height: =Parent.Height
                Width: =997
                X: =369
                ZIndex: =1

            TRTestRunGallery As gallery.galleryVertical:
                '#CopilotOverlayLabel': ="Filtered"
                Height: =560
                Items: =colTestRun
                Layout: =Layout.Vertical
                TemplateFill: |-
                    =//If(TRGalStatusValueLbl.Text = TRGalLacolTestlogStatus.Text,RGBA(0, 0, 0, 0), ColorValue("#F4F4F4"))
                    RGBA(0, 0, 0, 0)
                TemplatePadding: =0
                TemplateSize: =80
                Width: =997
                X: =369
                Y: =107
                ZIndex: =2

                TRGalNameValueLbl As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Font: =Font.'Segoe UI'
                    Height: =35
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    PaddingLeft: =10
                    Size: =11
                    Text: =ThisItem.name
                    Tooltip: =ThisItem.name
                    Width: =TRTestRunIdValueLbl.Width + TRTestCaseIdValueLbl.Width + TRGalAssignedToValue.Width + TRBusinessUserValueLbl.Width + TRGalStatusValueLbl.Width + TRGalLacolTestlogStatus.Width + TRGalStartDateLbl.Width + TRGalEndDateLbl.Width
                    X: =TRTestRunIdValueLbl.X 
                    Y: =TRTestRunIdValueLbl.Y + TRTestRunIdValueLbl.Height 
                    ZIndex: =1

                TRGalStatusValueLbl As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Font: =Font.'Segoe UI'
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    PaddingLeft: =0
                    Size: =11
                    Text: =LookUp(ThisItem.properties,field_name = "Status",field_value_name)
                    Tooltip: =Self.Text
                    Width: =TRStatusLbl.Width
                    X: =TRBusinessUserValueLbl.X + TRBusinessUserValueLbl.Width
                    ZIndex: =2

                TRTestRunIdValueLbl As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Font: =Font.'Segoe UI'
                    PaddingLeft: =10
                    Size: =11
                    Text: =ThisItem.pid
                    Tooltip: =ThisItem.pid
                    VerticalAlign: =VerticalAlign.Top
                    Width: =TRTestRunIDLbl.Width
                    Wrap: =false
                    ZIndex: =3

                TRGalEndDateLbl As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Font: =Font.'Segoe UI'
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    Size: =11
                    Text: =Text(DateValue(LookUp(ThisItem.properties,field_name = "Planned End Date",field_value),"en-US"),"dd-mmm-yyyy")
                    Tooltip: =Self.Text
                    VerticalAlign: =VerticalAlign.Top
                    Width: =TREndDateLbl.Width
                    X: =TRGalStartDateLbl.X + TRGalStartDateLbl.Width
                    ZIndex: =4

                TRGalStartDateLbl As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Font: =Font.'Segoe UI'
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    Size: =11
                    Text: =Text(DateValue(LookUp(ThisItem.properties,field_name = "Planned Start Date",field_value),"en-US"),"dd-mmm-yyyy")
                    Tooltip: =Self.Text
                    VerticalAlign: =VerticalAlign.Top
                    Width: =TRStartDateLbl.Width
                    X: =TRGalExecutionStartLbl.X + TRGalExecutionStartLbl.Width
                    ZIndex: =5

                TRGalAssignedToValue As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Font: =Font.'Segoe UI'
                    OnSelect: =
                    Overflow: =Overflow.Scroll
                    PaddingRight: =25
                    Size: =11
                    Text: =LookUp(ThisItem.properties,field_name = "Assigned To",field_value_name)
                    Tooltip: =Self.Text
                    Visible: =If( gallerySelectedTestrunId = Text(ThisItem.id), false, true)
                    Width: =TRAssignedToLbl.Width
                    X: =TRTestCaseIdValueLbl.X + TRTestCaseIdValueLbl.Width
                    ZIndex: =6

                TRGalRunBtn As button:
                    BorderColor: =ColorFade(Self.Fill, -95%)
                    BorderStyle: =BorderStyle.None
                    BorderThickness: =0.4
                    DisplayMode: |
                        =DisplayMode.Edit
                        
                        //If(TRGalStatusValueLbl.Text = TRGalLacolTestlogStatus.Text, DisplayMode.Edit, DisplayMode.Disabled)
                    Fill: =RGBA(4, 141, 154, 1)
                    Font: =Font.'Segoe UI'
                    Height: =30
                    HoverBorderColor: =ColorFade(Self.HoverFill, 20%)
                    HoverFill: =RGBA(255, 152, 1, 1)
                    OnSelect: |-
                        =//Set variable value with true
                        Set(varShowRec,true);
                        
                        Set( gallerySelectedTestrun, ThisItem);
                         
                        //This variable will define wheather create new test log or edit existing test log
                        Set( varCreateTestLog, true);
                        
                        //Approve Test Case Operation Starting Point
                        Set(lastApprovedVersionId,'ITS-TCOE_OCTO_UATMain_V1'.ApproveTestcase( constProjectInfo.id, gallerySelectedTestrun.testCaseId).test_case_version_id);
                         
                        //Getting Test Case Details Operation Starting Point
                        Set( getLatestTcDetails, 'ITS-TCOE_OCTO_UATMain_V1'.GetTestcase( constProjectInfo.id, gallerySelectedTestrun.testCaseId));
                         
                        //Collecting Test Log Details Operation Starting Point
                        ClearCollect(colTestSteplogRecord, 'ITS-TCOE_OCTO_UATMain_V1'.GetTestLog( constProjectInfo.id, gallerySelectedTestrun.id));
                         
                        ClearCollect(colTestSteplog, First(colTestSteplogRecord).items);
                        
                        ClearCollect(colPreviousTestStepLog, colTestSteplog);
                         
                        If(
                            IsEmpty(colTestSteplog),
                        
                            //This variable is used to control the link defect button visibility
                            Set(varLinkDefectVisibility, false);
                        
                            //After APIM Integration
                            ClearCollect( colTestSteplog, 'ITS-TCOE_OCTO_UATELog_V1'.ExecuteTestRun({projectId:  constProjectInfo.id, testrunId: gallerySelectedTestrun.id}));
                        
                            Set(varCreateTestLog, true),
                            //This variable is used to control the link defect button visibility
                        
                            Set(varLinkDefectVisibility, true);
                        
                            Set(varCreateTestLog, false)
                        );
                        
                        //Set variable value with false
                        Set(varShowRec,false);
                        
                        Navigate( 'Test Execution Details')
                    RadiusBottomLeft: =6
                    RadiusBottomRight: =6
                    RadiusTopLeft: =6
                    RadiusTopRight: =6
                    Size: =10.5
                    Text: ="RUN"
                    Width: =TRActionLbl.Width - 10
                    X: =TRGalEndDateLbl.X + TRGalEndDateLbl.Width + 5
                    Y: =10
                    ZIndex: =7

                TRTestRunSeperator As rectangle:
                    Fill: =RGBA(235, 248, 249, 1)
                    Height: =2
                    OnSelect: =Select(Parent)
                    Width: =TRTestRunGallery.Width
                    X: =TRTestRunIdValueLbl.X
                    Y: =78
                    ZIndex: =8

                TRTestCaseIdValueLbl As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Font: =Font.'Segoe UI'
                    OnSelect: =
                    PaddingLeft: =0
                    Size: =11
                    Text: =If( CountRows(colTestRun) > 0 && !IsBlank(ThisItem.testCaseId), 'ITS-TCOE_OCTO_UATMain_V1'.GetTestcase(constProjectInfo.id,ThisItem.testCaseId).pid)
                    Tooltip: =Self.Text
                    VerticalAlign: =VerticalAlign.Top
                    Width: =TRTestCaseIDLbl.Width
                    Wrap: =false
                    X: =TRTestRunIdValueLbl.X+TRTestRunIdValueLbl.Width
                    ZIndex: =9

                TestRunEditIcon As icon.Add:
                    Color: =RGBA(37, 150, 190, 1)
                    DisabledColor: =RGBA(153, 153, 153, 1)
                    DisplayMode: |-
                        =DisplayMode.Edit
                        
                        //If(TRGalStatusValueLbl.Text = TRGalLacolTestlogStatus.Text, DisplayMode.Edit, DisplayMode.Disabled)
                    Height: =20
                    Icon: =Icon.Edit
                    OnSelect: |-
                        =Set( gallerySelectedTestrun, ThisItem);
                        
                        UpdateContext({ gallerySelectedTestrunId: Text(ThisItem.id)})
                    Visible: =false
                    Width: =20
                    X: =TRGalAssignedToValue.X + TRGalAssignedToValue.Width -Self.Width-10
                    Y: =5
                    ZIndex: =10

                TRGalLacolTestlogStatus As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Color: =RGBA(128, 124, 124, 1)
                    Font: =Font.'Segoe UI'
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    PaddingLeft: =0
                    Size: =11
                    Text: =//If( CountRows( colTestRun) > 0,If(IsEmpty('ITS-TCOE_OCTO_UATMain_V1'.GetTestLog(constProjectInfo.id, ThisItem.id).items),"Unexecuted",LookUp('ITS-TCOE_OCTO_UATMain_V1'.GetTestLog(constProjectInfo.id, ThisItem.id).items,true,status.name)))
                    Visible: =false
                    Width: =TRLacolTestlogStatusLbl.Width
                    X: =TRGalStatusValueLbl.X + TRGalStatusValueLbl.Width
                    ZIndex: =14

                NonQaUserAssignToGroup As group:
                    Height: =5
                    Width: =5
                    X: =40
                    Y: =40
                    ZIndex: =14

                    TRNonQaUseDropdown As combobox:
                        AccessibleLabel: ="Release"
                        BorderColor: =RGBA(177, 227, 230, 1)
                        BorderThickness: =1
                        ChevronBackground: =Color.White
                        ChevronFill: =RGBA(211, 239, 241, 1)
                        ChevronHoverBackground: =RGBA(70, 189, 198, 1)
                        Color: =RGBA(107, 106, 106, 1)
                        DefaultSelectedItems: =
                        DisplayFields: =["label"]
                        FocusedBorderThickness: =0.5
                        Font: =Font.'Segoe UI'
                        Height: =30
                        HoverColor: =RGBA(128, 128, 128, 1)
                        HoverFill: =ColorFade(RGBA(70, 189, 198, 1), 90%)
                        InputTextPlaceholder: ="Non QA User"
                        Items: =colTRNonQaUser
                        OnChange: =
                        PressedFill: =RGBA(70, 189, 198, 1)
                        SearchFields: =["label"]
                        SearchItems: =Search(Filter(colTRNonQaUser,is_active),TRNonQaUseDropdown.SearchText,label)
                        SelectionColor: =RGBA(70, 189, 198, 1)
                        SelectionFill: =RGBA(236, 248, 249, 1)
                        SelectionTagFill: =Color.Transparent
                        SelectMultiple: =false
                        Size: =11
                        Visible: =If( gallerySelectedTestrunId = Text(ThisItem.id), true, false)
                        Width: =TRGalAssignedToValue.Width
                        X: =TRTestCaseIdValueLbl.X + TRTestCaseIdValueLbl.Width
                        Y: =TRGalAssignedToValue.Y
                        ZIndex: =11

                    TestRunCancelIcon As icon.Add:
                        Color: =RGBA(255, 0, 0, 1)
                        DisabledColor: =RGBA(153, 153, 153, 1)
                        DisplayMode: |-
                            =DisplayMode.Edit
                            
                            //If( !IsBlank( Substitute( TestRunSearchTxtBox.Text, " ", "")) && !(IsBlank(TestRunStatusDrodpown)), DisplayMode.Edit, DisplayMode.Disabled)
                        Height: =20
                        Icon: =Icon.Cancel
                        OnSelect: |-
                            =UpdateContext({ gallerySelectedTestrunId: ""})
                        Visible: =If( gallerySelectedTestrunId = Text(ThisItem.id), true, false)
                        Width: =20
                        X: =TRGalAssignedToValue.X + TRGalAssignedToValue.Width -Self.Width - TestRunSaveIcon.Width-15
                        Y: =30
                        ZIndex: =12

                    TestRunSaveIcon As icon.Add:
                        Color: |-
                            =ColorValue("#04AA6D")
                        DisabledColor: =RGBA(153, 153, 153, 1)
                        DisplayMode: |
                            =If( TRNonQaUseDropdown.Selected.label = Blank(), DisplayMode.Disabled, DisplayMode.Edit)
                            
                            //DisplayMode.Edit
                        Fill: =RGBA(255, 255, 255, 1)
                        Height: =20
                        Icon: =Icon.Check
                        OnSelect: |-
                            ='ITS-TCOE_OCTO_UATMain_V1'.UpdateTestrun( constProjectInfo.id, ThisItem.id, {properties:[{field_id: varTestRunNonQAUser, field_name: "Non-QA User (UATNext Only)", field_value: Text(TRNonQaUseDropdown.Selected.value), field_value_name: TRNonQaUseDropdown.Selected.label}]});
                            
                            If(
                                varTRSearch = true,
                            
                                Set( VarTestRunRecord, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-runs", fields: ["*"], page: varTRpageNumber, pageSize: nfTRPageSize, query: TRSearchquery}));
                            
                                Set( totaltestRunCount, VarTestRunRecord.total);
                            
                                ClearCollect( colTestRun, VarTestRunRecord.items),
                            
                                If(
                                    varASTVAFilter = "Assigned To Me All",
                            
                                    //Starting point           
                                    If(
                                                
                                        IsBlank( LookUp( colTRNonQaUser, Lower(label) = Lower(nfUserObject.'Primary Email'))) && !IsBlank( LookUp( colTRAssignToUser,Lower(label) = Lower(nfUserObject.'Full Name'))),
                                        
                                        Set( VarTestRunRecord, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-runs", page: varTRpageNumber, pageSize: nfTRPageSize, fields: ["*"], query: Concatenate("'Assigned To' ", "=", " '" & nfUserObject.'Full Name' & "' and" & " 'Test Cycle' ", "=", " '" & SelectedCycleinfo.pid & " " & Trim(SelectedCycleinfo.name) & "'")})),
                                                
                                        If(
                                        
                                            !IsBlank( LookUp( colTRNonQaUser, Lower(label) = Lower(nfUserObject.'Primary Email'))) && IsBlank( LookUp( colTRAssignToUser,Lower(label) = Lower(nfUserObject.'Full Name'))),
                                            
                                            Set( VarTestRunRecord, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-runs", fields: ["*"], page: varTRpageNumber, pageSize: nfTRPageSize, query: Concatenate( "'Non-QA User (UATNext Only)' ", "=", " '" & nfUserObject.'Primary Email' & "' and" & " 'Test Cycle' ", "=", " '" & SelectedCycleinfo.pid & " " & Trim( SelectedCycleinfo.name) & "'")})),
                                            
                                            If(
                            
                                                !IsBlank( LookUp( colTRNonQaUser, Lower(label) = Lower(nfUserObject.'Primary Email'))) && !IsBlank( LookUp( colTRAssignToUser, Lower(label) = Lower(nfUserObject.'Full Name'))),
                                                
                                                Set( VarTestRunRecord, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-runs", fields: ["*"], page: varTRpageNumber, pageSize: nfTRPageSize, query: Concatenate( "'Assigned To' ", "=", " '" & nfUserObject.'Full Name' & "' or " & "'Non-QA User (UATNext Only)' ", "=", " '" & nfUserObject.'Primary Email' & "' and" & " 'Test Cycle' ", "=", " '" & SelectedCycleinfo.pid & " " & Trim(SelectedCycleinfo.name) & "'")}))
                                            )
                                        )
                                    );
                            
                                    Set( totaltestRunCount, VarTestRunRecord.total);
                            
                                    ClearCollect( colTestRun, VarTestRunRecord.items)
                                    //Ending Point
                                    ,
                            
                                    If(
                                        varASTVAFilter = "Assigned To Me" && !IsBlank(selectedSuiteInfo),
                            
                                        //Starting Point
                                        If(
                                    
                                            IsBlank( LookUp( colTRNonQaUser, Lower(label) = Lower(nfUserObject.'Primary Email'))) && !IsBlank( LookUp( colTRAssignToUser,Lower(label) = Lower(nfUserObject.'Full Name'))),
                                            
                                            Set( VarTestRunRecord, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-runs", fields: ["*"], page: varTRpageNumber, pageSize: nfTRPageSize, query: Concatenate("'Assigned To' ", "=", " '" & nfUserObject.'Full Name' & "' and" & " 'Test Suite' ", "=", " '" & selectedSuiteInfo.pid & " " & Trim(selectedSuiteInfo.name) & "'")})),
                                        
                                            If(
                                            
                                                !IsBlank( LookUp( colTRNonQaUser, Lower(label) = Lower(nfUserObject.'Primary Email'))) && IsBlank( LookUp( colTRAssignToUser, Lower(label) = Lower(nfUserObject.'Full Name'))),
                                                
                                                Set( VarTestRunRecord, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-runs", fields: ["*"], page: varTRpageNumber, pageSize: nfTRPageSize, query: Concatenate( "'Non-QA User (UATNext Only)' ", "=", " '" & nfUserObject.'Primary Email' & "' and" & " 'Test Suite' ", "=", " '" & selectedSuiteInfo.pid & " " & Trim(selectedSuiteInfo.name) & "'")})),
                                            
                                                If(
                                    
                                                    !IsBlank( LookUp( colTRNonQaUser, Lower(label) = Lower(nfUserObject.'Primary Email'))) && !IsBlank( LookUp( colTRAssignToUser, Lower(label) = Lower(nfUserObject.'Full Name'))),
                                                    
                                                    Set( VarTestRunRecord, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-runs", fields: ["*"], page: varTRpageNumber, pageSize: nfTRPageSize, query: Concatenate( "'Assigned To' ", "=", " '" & nfUserObject.'Full Name' & "' or " & "'Non-QA User (UATNext Only)' ", "=", " '" & nfUserObject.'Primary Email' & "' and" & " 'Test Suite' ", "=", " '" & selectedSuiteInfo.pid & " " & Trim(selectedSuiteInfo.name) & "'")}))
                                            )
                                        )
                                    );
                            
                                    Set( totaltestRunCount, VarTestRunRecord.total);
                            
                                    ClearCollect( colTestRun, VarTestRunRecord.items)
                                    //Ending Point
                                    ,
                                    If(
                                        varASTVAFilter = "View All" && IsBlank(selectedSuiteInfo),
                            
                                        //Starting Point
                                        Set( VarTestRunRecord, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-runs", fields: ["*"],page: varTRpageNumber, pageSize: nfTRPageSize, query: Concatenate("'Test Cycle' ", "=", " '" & SelectedCycleinfo.pid & " " & Trim(SelectedCycleinfo.name) & "'")}));
                            
                                        Set( totaltestRunCount, VarTestRunRecord.total);
                            
                                        ClearCollect( colTestRun, VarTestRunRecord.items)
                                        //Ending Point
                                        ,
                                            Set( VarTestRunRecord, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: "test-runs", fields: ["*"],page: varTRpageNumber, pageSize: nfTRPageSize, query: Concatenate("'Test Suite' ", "=", " '" & selectedSuiteInfo.pid & " " & Trim(selectedSuiteInfo.name) & "'")}));
                            
                                            Set( totaltestRunCount, VarTestRunRecord.total);
                            
                                            ClearCollect( colTestRun, VarTestRunRecord.items)
                                        )
                                    )
                                )
                            );
                            
                            UpdateContext({ gallerySelectedTestrunId: ""});
                            
                            Notify("Successfully Saved", NotificationType.Success, 4000)
                        Visible: =If( gallerySelectedTestrunId = Text(ThisItem.id), true, false)
                        Width: =20
                        X: =TRGalAssignedToValue.X + TRGalAssignedToValue.Width -Self.Width-5
                        Y: =30
                        ZIndex: =13

                TRBusinessUserValueLbl As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Font: =Font.'Segoe UI'
                    OnSelect: =
                    Overflow: =Overflow.Scroll
                    PaddingLeft: =0
                    Size: =11
                    Text: =LookUp(ThisItem.properties,field_name = "Non-QA User (UATNext Only)",field_value_name)
                    Tooltip: =Self.Text
                    VerticalAlign: =VerticalAlign.Top
                    Width: =TRBusinessUserLbl.Width
                    X: =TRGalAssignedToValue.X+TRGalAssignedToValue.Width
                    ZIndex: =15

                TRGalExecutionStartLbl As label:
                    BorderColor: =RGBA(230, 230, 230, 1)
                    BorderStyle: =BorderStyle.None
                    Font: =Font.'Segoe UI'
                    OnSelect: =Select(Parent)
                    Overflow: =Overflow.Scroll
                    PaddingLeft: =0
                    Size: =11
                    Text: |-
                        =Text( DateTimeValue( ThisItem.latest_test_log.exe_end_date, "en-US"), "dd-mmm-yyyy hh:mm:ss")
                    Tooltip: =Self.Text
                    VerticalAlign: =VerticalAlign.Top
                    Width: =TRExecutionStartLbl.Width
                    X: =TRGalStatusValueLbl.X + TRGalStatusValueLbl.Width
                    ZIndex: =16

            NoSearchTRFoundLbl As label:
                Align: =Align.Center
                Color: =RGBA(107, 106, 106, 1)
                Font: =Font.'Segoe UI'
                FontWeight: =FontWeight.Semibold
                Size: =11
                Text: ="Sorry! No result found"
                Visible: =varErrorMsg
                Width: =TRTestRunGallery.Width
                X: =TRTestRunGallery.X
                Y: =TRTestRunGallery.Y
                ZIndex: =3

            TRTestSuitGal As gallery.variableTemplateHeightGallery:
                '#CopilotOverlayLabel': ="Filtered"
                Default: ={}
                Height: =515
                Items: =SortByColumns( colAllTSuite, "order", SortOrder.Ascending)
                Layout: =Layout.Vertical
                OnSelect: =
                TemplateFill: =If(ThisItem.IsSelected,ColorFade(RGBA(70, 189, 198, 1), 100%),RGBA(0, 0, 0, 0))
                TemplatePadding: =0
                TemplateSize: =30
                Width: =370
                Y: =TRCycleDrodpownL2.Y + TRCycleDrodpownL2.Height + 20
                ZIndex: =4

                TRGalSeperator As rectangle:
                    BorderStyle: =BorderStyle.None
                    Fill: =RGBA(204, 204, 204, 1)
                    FocusedBorderThickness: =0
                    Height: =0.4
                    OnSelect: =Select(Parent)
                    Width: =Parent.Width
                    Y: =29.6
                    ZIndex: =1

                TRGalTSLbl As label:
                    Color: |-
                        =If(
                            TRGalTSLbl.Text = TRTestSuitGal.Selected.name, RGBA(17, 192, 190, 1), RGBA(107, 106, 106, 1)
                        )
                    Font: =Font.'Segoe UI'
                    FontWeight: =FontWeight.Semibold
                    Height: =30
                    HoverColor: =RGBA(70, 189, 198, 1)
                    OnSelect: |-
                        =// Hide NoTestRun Found Status Msg
                        UpdateContext({varErrorMsg: false});
                        
                        //Enabling ETCLoading Spinnier
                        UpdateContext({ showETCLoadingSpinner: true});
                        
                        Concurrent(
                            //This variable holds the current page number of test run gallery pagination
                            Set( varTRpageNumber, 1),
                        
                            //This variable holds the radio button value.
                            Set( varASTVAFilter, "View All"),
                        
                            //Store the cycle info
                            Set( SelectedCycleinfo, TRCycleDrodpownL2.Selected),
                        
                            //Store gallery selected suit info 
                            Set( selectedSuiteInfo, ThisItem),
                        
                            //Store blank value into test run record variable
                            Set( VarTestRunRecord, Blank()),
                        
                            //Using this variable to identify if user sear test runs or not
                            Set( varTRSearch, false),
                        
                            //Using this variable to build the sear query which we pass into the search api.
                            Set( TRSearchquery, ""),
                        
                            //Store status drodpown value into this variable
                            Set( varTestRunsStatus, ""),
                        
                            //Store test run id from test run id text box
                            Set( varTestRunsID, ""),
                        
                            Set(varRadioDropDisplayMode, DisplayMode.Edit),
                        
                            //Clear test run collection
                            Clear(colTestRun),
                        
                            Reset(TestRunStatusDrodpown),
                        
                            Reset(TestRunSearchTxtBox)
                        );
                        
                        If(
                            //Checkl if gallery is selected or not
                            IsBlank(selectedSuiteInfo),
                        
                            //If not then notify user
                            Notify( "To view data, you must first select a Test Suite.", NotificationType.Error, 4000),
                        
                            If(
                                //If radio button value is view all
                                varASTVAFilter = "View All",
                        
                                //Search
