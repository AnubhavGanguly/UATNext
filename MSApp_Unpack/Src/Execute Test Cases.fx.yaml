                    =Reset(TRCycleDrodpownL2);
                    
                    //Enabling ETCLoading Spinnier
                    UpdateContext({ showETCLoadingSpinner: true});
                    
                    Set(
                        varRadioDropDisplayMode,
                        DisplayMode.Edit
                    );
                    
                    //This variable holds the current page number of test run gallery pagination
                    Set( varTRpageNumber, 1);
                    
                    // Hide NoTestRun Found Status Msg
                    UpdateContext({varErrorMsg: false});
                    
                    //Collect all the 'cycle', 'cycle under parent cycle' under this release.
                    //ClearCollect( colSecondCollectionAllTCycle,'ITS-TCOE_OCTO_UATMain_V1'.GetTestcycle( constProjectInfo.id, {parentId: Self.Selected.id, parentType:"test-cycle", expand: "descendants"}));
                    
                    If( !IsBlank( Self.Selected), ClearCollect( colSecondCollectionAllTCycle,'ITS-TCOE_OCTO_UATMain_V1'.GetTestcycle( constProjectInfo.id, {parentId: Self.Selected.id, parentType:"test-cycle", expand: "descendants"})));
                    
                    If(
                        IsBlank(Self.Selected) || IsEmpty(Self.SelectedItems),
                        
                        //Starting Point
                        If(
                            IsBlank( LookUp( colTRNonQaUser, Lower(label) = Lower(nfUserObject.'Primary Email'))) && !IsBlank( LookUp( colTRAssignToUser,Lower(label) = Lower(nfUserObject.'Full Name'))),
                                    
                            Set(
                                VarTestRunRecord,
                                'ITS-TCOE_OCTO_UATMain_V1'.Search(
                                    constProjectInfo.id,
                                    {
                                        object_type: "test-runs",
                                        fields: ["*"],
                                        page: varTRpageNumber,
                                        pageSize: nfTRPageSize,
                                        query: Concatenate(
                                            "'Assigned To' ",
                                            "=",
                                            " '" & nfUserObject.'Full Name' & "' and " & "'Release' ",
                                            "=",
                                            " '" & constReleaseInfo.pid & " " & Trim(constReleaseInfo.name) & "'"
                                        )
                                    }
                                )
                            ),
                    
                            If(
                                !IsBlank(LookUp(colTRNonQaUser,Lower(label) = Lower(nfUserObject.'Primary Email'))) && IsBlank(LookUp(colTRAssignToUser,Lower(label) = Lower(nfUserObject.'Full Name'))),
                    
                                Set(
                                    VarTestRunRecord,
                                    'ITS-TCOE_OCTO_UATMain_V1'.Search(
                                        constProjectInfo.id,
                                        {
                                            object_type: "test-runs",
                                            fields: ["*"],
                                            page: varTRpageNumber,
                                            pageSize: nfTRPageSize,
                                            query: Concatenate(
                                                "'Non-QA User (UATNext Only)' ",
                                                "=",
                                                " '" & nfUserObject.'Primary Email' & "' and " & "'Release' ",
                                                "=",
                                                " '" & constReleaseInfo.pid & " " & Trim(constReleaseInfo.name) & "'"
                                            )
                                        }
                                    )
                                ),
                    
                                If(
                                    !IsBlank(LookUp(colTRNonQaUser,Lower(label) = Lower(nfUserObject.'Primary Email'))) && !IsBlank(LookUp(colTRAssignToUser,Lower(label) = Lower(nfUserObject.'Full Name'))),
                    
                                    Set(
