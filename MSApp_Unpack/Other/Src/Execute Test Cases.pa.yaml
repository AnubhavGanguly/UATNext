aseInfo.pid & \" \" & Trim(constReleaseInfo.name) & \"'\" \n                                    )\n                                }\n                            )\n                        )\n                    )\n                )\n            );\n            Set(\n                totaltestRunCount,\n                VarTestRunRecord.total\n            );\n            ClearCollect(\n                colTestRun,\n                VarTestRunRecord.items\n            ),\n            //Ending Point\n\n            Set(\n                VarTestRunRecord,\n                'ITS-TCOE_OCTO_UATMain_V1'.Search(\n                    constProjectInfo.id,\n                    {\n                        object_type: \"test-runs\",\n                        fields: [\"*\"],\n                        page: varTRpageNumber,\n                        pageSize: nfTRPageSize,\n                        query: Concatenate(\n                            \"'Release' \",\n                            \"=\",\n                            \" '\" & constReleaseInfo.pid & \" \" & Trim(constReleaseInfo.name) & \"'\"\n                        )\n                    }\n                )\n            );\n            Set(\n                totaltestRunCount,\n                VarTestRunRecord.total\n            );\n            ClearCollect(\n                colTestRun,\n                VarTestRunRecord.items\n            )\n        ),\n        If(\n            IsBlank(selectedSuiteInfo) && !IsBlank(SelectedCycleinfo),\n\n            If(\n                varASTVAFilter = \"Assigned To Me\",\n\n                //Starting Point    \n                If(\n                    IsBlank( LookUp( colTRNonQaUser, Lower(label) = Lower(nfUserObject.'Primary Email'))) && !IsBlank( LookUp( colTRAssignToUser,Lower(label) = Lower(nfUserObject.'Full Name'))),\n                            \n                    Set(\n                        VarTestRunRecord,\n                        'ITS-TCOE_OCTO_UATMain_V1'.Search(\n             