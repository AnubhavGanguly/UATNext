ComponentDefinitions:
  Inner_Header_Component:
    DefinitionType: CanvasComponent
    CustomProperties:
      PDFLink:
        PropertyKind: Input
        DisplayName: PDFLink
        Description: A custom property for PDF link
        DataType: Text
        Default: ="Text"
      ScreenName:
        PropertyKind: Input
        DisplayName: ScreenName
        Description: A custom property for screen name
        DataType: Text
        Default: ="Text"
      VideoLink:
        PropertyKind: Input
        DisplayName: VideoLink
        Description: A custom property for video link
        DataType: Text
        Default: ="Text"
    Properties:
      Height: =50
      Width: =1366
    Children:
      - InnerHeaderBackgroundRectangle:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(70, 189, 198, 1)
            Height: =50
            Width: =Parent.Width
      - BackIconbackgroundRectangle:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(0, 134, 146, 1)
            Height: =50
            Width: =50
      - PDFImage:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Height: =InnerHeaderBackgroundRectangle.Height
            Image: ='reshot-icon-pdf-WFAVXEYNPZ'
            PaddingBottom: =5
            PaddingLeft: =5
            PaddingRight: =5
            PaddingTop: =5
            Width: =50
            X: =InnerHeaderBackgroundRectangle.Width-PDFImage.Width-5
            Y: =InnerHeaderBackgroundRectangle.Y
      - AppNameBtn:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisplayMode: =DisplayMode.View
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =InnerHeaderBackgroundRectangle.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =//ColorFade(RGBA(56, 96, 178, 1), -20%)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Size: =16
            Text: ="UATNext"
            Width: =100
            X: =BackIconbackgroundRectangle.Width+20
            Y: =InnerHeaderBackgroundRectangle.Y
      - PlayImage:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Height: =InnerHeaderBackgroundRectangle.Height
            Image: ='Video Help'
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =50
            X: =InnerHeaderBackgroundRectangle.Width-PlayImage.Width-5-PDFImage.Width
            Y: =InnerHeaderBackgroundRectangle.Y
      - ScreenNameLabel:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            Height: =AppNameBtn.Height
            Size: =16
            Text: =Inner_Header_Component.ScreenName
            Width: =400
            X: =HeaderSeperatorTxtInput.X + HeaderSeperatorTxtInput.Width + 5
            Y: =AppNameBtn.Y
      - HeaderSeperatorTxtInput:
          Control: Classic/TextInput@2.3.2
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            BorderStyle: =BorderStyle.None
            Color: =RGBA(255, 255, 255, 1)
            Default: ="|"
            DisplayMode: =DisplayMode.View
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =50
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverFill: =RGBA(0, 0, 0, 0)
            PaddingLeft: =5
            Size: =16
            Width: =30
            X: =AppNameBtn.X+AppNameBtn.Width + 10
      - IHCPlayImfBtn:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderStyle: =BorderStyle.None
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            Height: =PlayImage.Height
            HoverBorderColor: =
            HoverColor: =RGBA(0, 0, 0, 0)
            HoverFill: =
            OnSelect: =Launch(Inner_Header_Component.VideoLink)
            PressedBorderColor: =
            PressedColor: =Self.Fill
            PressedFill: =
            Size: =11
            Text: =""
            Width: =PlayImage.Width
            X: =PlayImage.X
            Y: =PlayImage.Y
      - IHCPDFImageBtn:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderStyle: =BorderStyle.None
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            Height: =PDFImage.Height
            HoverBorderColor: =
            HoverColor: =RGBA(0, 0, 0, 0)
            HoverFill: =
            OnSelect: =Launch(Inner_Header_Component.PDFLink)
            PressedBorderColor: =
            PressedColor: =Self.Fill
            PressedFill: =
            Size: =11
            Text: =""
            Width: =PDFImage.Width
            X: =PDFImage.X
            Y: =PDFImage.Y
