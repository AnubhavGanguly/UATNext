                        Icon: =Icon.ArrowLeft
                        OnSelect: "=UpdateContext({varReqGallerySelected: false});\r\n\r\nUpdateContext({varRQpageNumber: varRQpageNumber-1});\r\n\r\nConcurrent(\r\n    Clear(colReviewTestCase),\r\n\r\n    Clear(colRequirementProperties),\r\n\r\n    UpdateContext({varModulename: Blank()})\r\n);\r\n\r\nIf(\r\n    RSITTCModuleCombobox.Selected.name = Blank(),\r\n    UpdateContext({varModule: constModuleInfo}),\r\n    UpdateContext({varModule: RSITTCModuleCombobox.Selected})\r\n);\r\n\r\nIf( \r\n    varREnableSearch = false,\r\n\r\n    ClearCollect( colRequirement, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { pageSize: nfRequirementPageSize, page: varRQpageNumber, object_type: \"requirements\", fields: [\"*\"], query: Concatenate(\"'Module' \",\"in\",\" '\" & varModule.pid & \" \" & varModule.name & \"'\")}).items),\r\n\r\n    If( \r\n        varREnableSearch = true && !IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, \" \", \"\")) && StartsWith(RSITTCRequirementSearchTxtBox.Text, \"RQ-\"),\r\n            \r\n            ClearCollect( colRequirement, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { pageSize: nfRequirementPageSize, page: varRQpageNumber, object_type: \"requirements\", fields: [\"*\"], query: Concatenate(\"'Module' \",\"in\",\" '\" & varModule.pid & \" \" & varModule.name & \"' And 'id' =\" & \" '\" & RSITTCRequirementSearchTxtBox.Text & \"'\")}).items),\r\n    \r\n        varREnableSearch = true && !IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, \" \", \"\")),\r\n\r\n            ClearCollect( colRequirement, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { pageSize: nfRequirementPageSize, page: varRQpageNumber,object_type: \"requirements\", fields: [\"*\"], query: Concatenate(\"'Module' \",\"in\",\" '\" & varModule.pid & \" \" & varModule.name & \"' And 'name' \", \"~\",\" '\" & RSITTCRequirementSearchTxtBox.Text & \"' \")}).items)  \r\n    )\r\n)"
