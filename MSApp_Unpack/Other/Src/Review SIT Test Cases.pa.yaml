Screens:
  Review SIT Test Cases:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =UpdateContext({varReqGallerySelected: false});

        Concurrent(
            Clear(ColABC),

            Clear(colReviewTestCase),

            Clear(colRequirementProperties),

            Clear(colRequirement),

            UpdateContext({varModulename: Blank()})
        )
      OnVisible: "=Concurrent(   \n    Set(varScreenName, \"Review SIT Test Cases\"),\n    \n    Set(varVideoLink, Concatenate(nfSharepointbaseUrl,\"video/Review_SIT_Test_Cases.mp4\")),\n\n    Set(varPDFLink, Concatenate(nfSharepointbaseUrl,\"pdf/Review_SIT_Test_Cases.pdf\"))\n);\nConcurrent(\n    //Reseting the module combobox\n    Reset(RSITTCModuleCombobox),\n\n    //Updaing collection with blank value\n    //ClearCollect( colEmpty, Blank()),\n\n    //Set variable value to false\n    Set( varREnableSearch, false);\n\n    UpdateContext(\n        {\n            //Update the variable value to true\n            ResetCheckBox: true,\n\n            //Update variable value with number\n            varRQpageNumber: 1,\n\n            //Update variable value with number\n            ReviewTestCasePageNumber: 1,\n\n            //Update variable value with blank value \n            varModule: Blank()\n        }\n    )\n);\n\n//Update requiremnt info in this variable \nUpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", Page: varRQpageNumber, pageSize: nfRequirementPageSize, fields: [\"*\"], query: $\"'Module' in '{constModuleInfo.pid} {constModuleInfo.name}'\"})});\n\n//Update total number of requirement in this variable.\nUpdateContext({ RequirementsCount: varRequirementRecords.total});\n\n//Update total requirement info in this variable.\nClearCollect( colRequirement, varRequirementRecords.items)"
    Children:
      - RSITTCCanvas:
          Control: FluidGrid@2.3.0
          Properties:
            BorderThickness: =0
            Height: =Parent.Height - 50 /*- UATBackgroundRectangle.Height + 50*/
            Width: =Parent.Width
            Y: =RSITTC_Outer_Header_Component.Y + RSITTC_Outer_Header_Component.Height
          Children:
            - RSITTCDataCard:
                Control: DataCard@1.0.2
                Properties:
                  Fill: |-
                    =//RGBA(241, 244, 249, 1)
                    ColorFade(RGBA(70, 189, 198, 1), 90%)
                  Height: =Parent.Height
                  Width: =Parent.Width
                  X: =0
                  Y: =0
                Children:
                  - TCLDataCardbackgroundRectabgle_2:
                      Control: Rectangle@2.3.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Fill: =RGBA(255, 255, 255, 1)
                        Height: =Parent.Height
                        Width: =939
                        X: =427
                        Y: =Parent.Y
                  - RSITTCRequirementSearchTxtBox:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(255, 255, 255, 1)
                        BorderThickness: =0.4
                        Color: =RGBA(153, 153, 153, 1)
                        Default: =""
                        DelayOutput: =true
                        Fill: =Color.White
                        FocusedBorderThickness: =1
                        Font: =Font.'Segoe UI'
                        FontWeight: =FontWeight.Lighter
                        HintText: ="Search Requirement"
                        HoverBorderColor: =RGBA(0, 0, 0, 0)
                        HoverFill: =Self.Fill
                        OnChange: "=If( \n    IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, \" \", \"\")),\n    If(\n        RSITTCModuleCombobox.Selected.name = Blank(),\n\n        UpdateContext(\n            { \n                varRQpageNumber: 1,\n                varModulename: Blank(),\n                varReqGallerySelected: false\n            }\n        );\n\n        Set( varREnableSearch, false);\n\n        Clear(colReviewTestCase);\n\n        Clear(colRequirement);\n\n        Clear(colRequirementProperties);\n\n        UpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", Page: varRQpageNumber, pageSize: nfRequirementPageSize, fields: [\"*\"], query: Concatenate( \"'Module' \",\"in\", \" '\" & constModuleInfo.pid & \" \" & constModuleInfo.name & \"'\")})});\n\n        UpdateContext({ RequirementsCount: varRequirementRecords.total});\n\n        ClearCollect( colRequirement, varRequirementRecords.items);\n        \n        UpdateContext({varErrorMsg: false}),\n\n        UpdateContext(\n            {\n                varRQpageNumber: 1,\n                varModulename: Blank(),\n                varReqGallerySelected: false\n            }\n        );\n\n        Set( varREnableSearch, false);\n\n        Clear(colReviewTestCase);\n\n        Clear(colRequirement);\n\n        Clear(colRequirementProperties);\n\n        UpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", Page: varRQpageNumber, pageSize: nfRequirementPageSize, fields: [\"*\"], query: Concatenate( \"'Module' \",\"in\", \" '\" & RSITTCModuleCombobox.Selected.pid & \" \" & RSITTCModuleCombobox.Selected.name & \"'\")})});\n\n        UpdateContext({ RequirementsCount: varRequirementRecords.total});\n\n        ClearCollect( colRequirement, varRequirementRecords.items);\n\n        UpdateContext({varErrorMsg: false})\n    )\n);\n\nUpdateContext({reqid: Blank()})"
                        OnSelect: |-
                          =If( IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, " ", "")), 

                              Clear(colReviewTestCase);

                              UpdateContext({varModulename: Blank()});

                              Clear(colRequirementProperties);

                              UpdateContext({varReqGallerySelected: false})
                          )
                        PaddingLeft: =10
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        Size: =11
                        Width: =400
                        X: =RSITTCProjectLbl.X
                        Y: =RSITTCModuleLbl.Y + RSITTCModuleLbl.Height + 5
                  - RSITTCRequirementSearchIcon:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =If(RSITTCRequirementSearchTxtBox.DisplayMode = DisplayMode.Edit,RGBA(70, 189, 198, 1), RGBA(153, 153, 153, 1))
                        DisabledColor: =RGBA(153, 153, 153, 1)
                        DisplayMode: =If( !IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, " ", "")), DisplayMode.Edit, DisplayMode.Disabled)
                        Height: =40
                        Icon: =Icon.Search
                        OnSelect: "=Set( varREnableSearch, true);\r\n\r\nReset(RSITTCModuleCombobox);\r\n\r\nUpdateContext(\r\n    { \r\n        varRQpageNumber: 1, \r\n        varModulename: Blank(), \r\n        varReqGallerySelected: false\r\n    }\r\n);\r\n\r\nClear(colReviewTestCase);\r\n\r\nClear(colRequirement);\r\n\r\nClear(colRequirementProperties);\r\n\r\nIf( \r\n    !IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, \" \", \"\")) && StartsWith(RSITTCRequirementSearchTxtBox.Text, \"RQ-\"),\r\n\r\n    UpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", pageSize: nfRequirementPageSize, page: varRQpageNumber, fields: [\"*\"], query: Concatenate(\"'Module' \",\"in\",\" '\" & constModuleInfo.pid & \" \" & constModuleInfo.name & \"' And 'id' =\" & \" '\" & RSITTCRequirementSearchTxtBox.Text & \"'\")})});\r\n\r\n    UpdateContext({ RequirementsCount: varRequirementRecords.total});\r\n\r\n    ClearCollect( colRequirement, varRequirementRecords.items),\r\n    \r\n    !IsBlank( Substitute( RSITTCRequirementSearchTxtBox.Text, \" \", \"\")),\r\n\r\n    UpdateContext({varRequirementRecords: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", pageSize: nfRequirementPageSize, page: varRQpageNumber, fields: [\"*\"], query: Concatenate(\"'Module' \",\"in\",\" '\" & constModuleInfo.pid & \" \" & constModuleInfo.name & \"' And 'name' \", \"~\",\" '\" & RSITTCRequirementSearchTxtBox.Text & \"' \")})});\r\n\r\n    UpdateContext({ RequirementsCount: varRequirementRecords.total});\r\n\r\n    ClearCollect( colRequirement, varRequirementRecords.items)\r\n);\r\n\r\nIf( CountRows(colRequirement) = 0, UpdateContext({varErrorMsg: true}), UpdateContext({varErrorMsg: false}))"
                        PaddingBottom: =10
                        PaddingLeft: =10
                        PaddingRight: =10
                        PaddingTop: =10
                        Width: =40
                        X: =371
                        Y: =RSITTCRequirementSearchTxtBox.Y
