                        - RSITTCGMFilderIcon:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Color: =RGBA(0, 134, 146, 1)
                              Height: =20
                              Icon: =Icon.DocumentWithContent
                              OnSelect: =Select(Parent)
                              Width: =20
                              X: =15
                              Y: =5
                        - RSITTCLabelRequirementName:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Color: |-
                                =If(RSITTCLabelRequirementName.Text=RSITTCGalleryRequirement.Selected.name,
                                RGBA(17, 192, 190, 1), 
                                RGBA(107, 106, 106, 1)
                                )
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Semibold
                              Height: =30
                              HoverColor: =RGBA(70, 189, 198, 1)
                              OnSelect: |-
                                =UpdateContext({ReviewTestCasePageNumber: 1});

                                ClearCollect( colRequirementProperties, ThisItem.properties);

                                ClearCollect( CollectTestcaseId, 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink( constProjectInfo.id, { type: "requirements", ids: ThisItem.id}));

                                Clear(colPTUTestCase);

                                Clear(ColABC);

                                ForAll( CollectTestcaseId, Collect( ColABC, objects));

                                ClearCollect(colTestCaseIdQuery, {Id: 1, TC: ""});

                                ForAll( Filter(ColABC, StartsWith(pid, "TC")), Patch(colTestCaseIdQuery, First(colTestCaseIdQuery),{TC: Concatenate(First(colTestCaseIdQuery).TC, " or ", Concatenate("'Id' = '",ThisRecord.pid,"'" ))}));

                                If(
                                    !IsBlank(Right(First(colTestCaseIdQuery).TC, Len( First(colTestCaseIdQuery).TC)-3)),

                                    UpdateContext({ReviewTestCaseRecord: 'ITS-TCOE_OCTO_UATMain_V1'.Search(constProjectInfo.id,{object_type:"test-cases", page: ReviewTestCasePageNumber, pageSize: nfReviewTestCasePageSize, fields:["*"],query:Right(First(colTestCaseIdQuery).TC, Len( First(colTestCaseIdQuery).TC)-3)})});

                                    UpdateContext({ReviewTestCaseCount: ReviewTestCaseRecord.total});

                                    ClearCollect(colReviewTestCase, ReviewTestCaseRecord.items),

                                    Clear(colReviewTestCase)
                                );

                                UpdateContext({varReqGallerySelected: true});

                                UpdateContext({reqid: ThisItem.id});

                                UpdateContext({varModulename: 'ITS-TCOE_OCTO_UATMain_V1'.GetAModule( constProjectInfo.id, ThisItem.parent_id)})
                              Size: =11
