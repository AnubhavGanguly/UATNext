                  - CTCSaveObjlinkBtn:
                      Control: Classic/Button@2.2.0
                      Group: GroupNewTcForm
                      Properties:
                        BorderColor: =ColorFade(Self.Fill, -15%)
                        BorderThickness: =0.4
                        Color: =RGBA(255, 255, 255, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        DisplayMode: |-
                          =If( 
                              !IsBlank( Substitute( GOLNameTextInput.Text, " ", "")) && !IsBlank( Substitute( GOLDescriptionTxtInput.Text, " ", "")), 
                              DisplayMode.Edit, 
                              DisplayMode.Disabled
                          )
                        Fill: =RGBA(70, 189, 198, 1)
                        FocusedBorderThickness: =0.4
                        Font: =Font.'Segoe UI'
                        Height: =31
                        HoverBorderColor: =ColorFade(Self.HoverFill, 20%)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =RGBA(255, 152, 1, 1)
                        OnSelect: |-
                          =//Enabling TCLoading Spinnier
                          UpdateContext(
                              { 
                                  showTCLoadingSpinner: true
                              }
                          );

                          //Store the created by full name
                          ClearCollect(
                              colPropertyTCCreatedBy,
                              {
                                  field_id: Value(First(colAllTestCaseFieldId).CreatedByUAT),
                                  field_name: "Created By (UATNext Only)",
                                  field_value: nfUserObject.'Full Name',
                                  field_value_name:""
                              }
                          );

                          //Store the updated by full name
                          ClearCollect(
                              colPropertyTCUpdatedBy,
                              {
                                  field_id: Value(First(colAllTestCaseFieldId).UpdatedByUAT),
                                  field_name: "Updated By (UATNext Only)",
                                  field_value: nfUserObject.'Full Name',
                                  field_value_name:""
                              }
                          );

                          ClearCollect(
                              colFinalTCProperty,
                              If(
                                  !IsEmpty( colPropertyTCAssignedTo),
                                  colPropertyTCAssignedTo
                              ),
                              If(
                                  !IsEmpty( colPropertyTCBusinessUser),
                                  colPropertyTCBusinessUser
                              ),
                              If(
                                  !IsEmpty( colPropertyTCCreatedBy),
                                  colPropertyTCCreatedBy
                              ),
                              If(
                                  !IsEmpty( colPropertyTCUpdatedBy),
                                  colPropertyTCUpdatedBy
                              )
                          );

                          If( 
                              constTestcaseLoc = 1, 
                              Set( FinalconstTestcaseLoc, varModulename.id),
                              Set( FinalconstTestcaseLoc, constTestcaseLoc)
                          );

                          ClearCollect( 
                              colTempTC, 
                              'ITS-TCOE_OCTO_UATMain_V1'.CreateTestcase( 
                                  constProjectInfo.id, 
                                  {
                                      name:GOLNameTextInput.Text, 
                                      parent_id: FinalconstTestcaseLoc, 
                                      description:GOLDescriptionTxtInput.Text, 
                                      precondition:GOLPreconditionTextInput.Text, 
                                      properties: colFinalTCProperty
                                  }
                              )
                          );

                          'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(
                              constProjectInfo.id,
                              "requirements",
                              areqid.id,
                              {
                                  type: "test-cases", 
                                  CreateAobjectlinkingRequestBody: [First(colTempTC).id]
                              }
                          );

                          Set( varTCpageNumber, 1);

                          Collect( 
                              ColABC, 
                              {
                                  id: First(colTempTC).id, 
                                  pid: First(colTempTC).pid, 
                                  link_type: "is_covered_by", 
                                  self: ""
                              }
                          );

                          ClearCollect(
                              colTCOnly,
                              With(
                                  { varTCData: SortByColumns( Filter( ColABC, StartsWith(pid, "TC-")), "pid", SortOrder.Descending)},
                                  ForAll(
                                      Sequence( CountRows( varTCData)),
                                      {
                                          Number: Value,
                                          id: Last( FirstN( varTCData, Value)).id,
                                          pid: Last( FirstN( varTCData, Value)).pid
                                      }
                                  )
                              )
                          );

                          Set(
                              varTCQuery,
                              With(
                                  {
                                      varConcatinatedTCData:
                                          FirstN(
                                              LastN(
                                                  Sort( colTCOnly, Number, SortOrder.Ascending),
                                                  CountRows( colTCOnly) - ( (varTCpageNumber - 1) * nfAuthorTestCasePageSizeTC)
                                              ),
                                              nfAuthorTestCasePageSizeTC
                                          )
                                  },
                                  Concat(
                                      varConcatinatedTCData,
                                      "'Id' = '" & pid & "'",
                                      " or "
                                  )
                              )
                          );

                          If(
                              !IsBlank( varTCQuery),

                              UpdateContext(
                                  {
                                      TotalTCRecords: 
                                      'ITS-TCOE_OCTO_UATMain_V1'.Search( 
                                          constProjectInfo.id, 
                                          {
                                              object_type: "test-cases", 
                                              page: nfAuthorTestCasePageTC, 
                                              pageSize: nfAuthorTestCasePageSizeTC, 
                                              fields: ["*"], 
                                              query: varTCQuery 
                                          }
                                      )
                                  }
                              );

                              Set( varAUTestCaseCount, CountRows( colTCOnly));

                              ClearCollect( colTestCase, TotalTCRecords.items),

                              Clear( colTestCase)
                          );

                          UpdateContext(
                              { 
                                  showTCLoadingSpinner: false
                              }
                          );

                          Select( CTCDiscardObjlinkBtn);

                          Set( close, false);

                          Notify( "Test case has been created successfully.", NotificationType.Success, 4000)
