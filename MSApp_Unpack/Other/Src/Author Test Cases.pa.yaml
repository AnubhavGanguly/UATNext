Screens:
  Author Test Cases:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: =Set( close, false)
      OnVisible: "=//Set variable to decide network call or back func\nSet( checkUpdateTestCase, false);\n\nConcurrent(\n    \n    Set(varScreenName, \"Author Test Cases\"),\n\n    Set(varVideoLink, Concatenate(nfSharepointbaseUrl,\"video/Author_Test_Cases.mp4\")),\n        \n    Set(varPDFLink, Concatenate(nfSharepointbaseUrl,\"pdf/Author_Test_Cases.pdf\"))\n\n);\n\n//Set variable value with false\nSet(varShowRec,false)"
    Children:
      - TCLCanvas:
          Control: FluidGrid@2.3.0
          Properties:
            BorderThickness: =0
            Height: =Parent.Height - 50 /*- UATBackgroundRectangle.Height + 50*/
            Width: =Parent.Width
            Y: =AUATTC_Outer_Header_Component.Y + AUATTC_Outer_Header_Component.Height
          Children:
            - TCLDataCard:
                Control: DataCard@1.0.2
                Properties:
                  Fill: |-
                    =//RGBA(241, 244, 249, 1)
                    ColorFade(RGBA(70, 189, 198, 1), 90%)
                  Height: =Parent.Height
                  Width: =Parent.Width
                  X: =0
                  Y: =0
                Children:
                  - TCLDataCardbackgroundRectabgle:
                      Control: Rectangle@2.3.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Fill: =RGBA(255, 255, 255, 1)
                        Height: =Parent.Height
                        Width: =939
                        X: =427
                        Y: =Parent.Y
                  - RequirementSearchTxtBox:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(255, 255, 255, 1)
                        BorderThickness: =0.4
                        Default: =""
                        DelayOutput: =true
                        Fill: =Color.White
                        FocusedBorderThickness: =1
                        Font: =Font.'Segoe UI'
                        FontWeight: =FontWeight.Lighter
                        HintText: ="Search Requirement"
                        HoverBorderColor: =RGBA(0, 0, 0, 0)
                        HoverFill: =Self.Fill
                        OnChange: "=//Enabling TCLoading Spinnier\nUpdateContext({ showReqLoadingSpinner: true});\n\nIf( \n    IsBlank( Substitute( RequirementSearchTxtBox.Text, \" \", \"\")),\n    \n    If(\n        ATCEpicL1Combobox.Selected.name = Blank(),\n\n        Set( varARQpageNumber, 1);\n\n        Set( varAEnableSearch, false);\n\n        UpdateContext({varModulename: Blank()});\n        \n        UpdateContext({varReqGallerySelected: false});\n\n        Clear(colTestCase);\n\n        Clear(colRequirement);\n\n        Clear(colRequirementProperties);\n\n        Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", Page: varARQpageNumber, pageSize: nfAUATTCRequirementPageSize, fields: [\"*\"], query: Concatenate( \"'Module' \",\"in\", \" '\" & constModuleInfo.pid & \" \" & constModuleInfo.name & \"'\")}));\n\n        Set( varATCRequirementsCount, varATCRequirementRecords.total);\n\n        ClearCollect( colRequirement, varATCRequirementRecords.items);\n        \n        UpdateContext({varErrorMsg: false}),\n\n        Set( varARQpageNumber, 1);\n\n        Set( varAEnableSearch, false);\n\n        UpdateContext({varModulename: Blank()});\n        \n        UpdateContext({varReqGallerySelected: false});\n\n        Clear(colTestCase);\n\n        Clear(colRequirement);\n\n        Clear(colRequirementProperties);\n\n        Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", page: varARQpageNumber, pageSize: nfAUATTCRequirementPageSize, fields: [\"*\"], query: Concatenate( \"'Module' \",\"in\", \" '\" & ATCEpicL1Combobox.Selected.pid & \" \" & ATCEpicL1Combobox.Selected.name & \"'\")}));\n\n        Set( varATCRequirementsCount, varATCRequirementRecords.total);\n\n        ClearCollect( colRequirement, varATCRequirementRecords.items);\n\n        UpdateContext({varErrorMsg: false})\n    ),\n    Select(RequirementSearchIcon)\n);\n\nSet( areqid, Blank());\n\n//Disabling ReqLoading Spinnier\nUpdateContext({ showReqLoadingSpinner: false});"
                        PaddingLeft: =10
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        Size: =11
                        Width: =400
                        X: =DTCProjectLbl.X
                        Y: =ATCTeamLbl.Y + ATCTeamLbl.Height + 10
                  - RequirementSearchIcon:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =If(RequirementSearchTxtBox.DisplayMode = DisplayMode.Edit,RGBA(70, 189, 198, 1), RGBA(153, 153, 153, 1))
                        DisabledColor: =RGBA(153, 153, 153, 1)
                        DisplayMode: =If( !IsBlank( Substitute( RequirementSearchTxtBox.Text, " ", "")), DisplayMode.Edit, DisplayMode.Disabled)
                        Height: =40
                        Icon: =Icon.Search
                        OnSelect: "=//Enabling ReqLoading Spinnier\r\nUpdateContext({ showReqLoadingSpinner: true});\r\n\r\nConcurrent(\r\n    Set( varAEnableSearch, true),\r\n\r\n    //Store gallery selected requirement info \r\n    Set( varSelectedRequirementInfo, Blank()),\r\n\r\n    Reset(ATCEpicL1Combobox),\r\n\r\n    Reset(ATCEpicL2Combobox),\r\n\r\n    Reset(ATCTeamCombobox),\r\n\r\n    Reset(GalleryRequirement),\r\n\r\n    Set( varARQpageNumber, 1),\r\n\r\n    UpdateContext({varModulename: Blank()}),\r\n\r\n    Clear(colTestCase),\r\n\r\n    Clear(colRequirement),\r\n\r\n    Clear(colRequirementProperties),\r\n\r\n    UpdateContext({varReqGallerySelected: false})\r\n);\r\n\r\nIf( \r\n    !IsBlank( Substitute( RequirementSearchTxtBox.Text, \" \", \"\")) && StartsWith(RequirementSearchTxtBox.Text, \"RQ-\"),\r\n\r\n    Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", pageSize: nfAUATTCRequirementPageSize, page: varARQpageNumber, fields: [\"*\"], query: Concatenate(\"'Module' \",\"in\",\" '\" & constModuleInfo.pid & \" \" & constModuleInfo.name & \"' And 'id' =\" & \" '\" & RequirementSearchTxtBox.Text & \"'\")}));\r\n\r\n    Set( varATCRequirementsCount, varATCRequirementRecords.total);\r\n\r\n    ClearCollect( colRequirement, varATCRequirementRecords.items),\r\n    \r\n    !IsBlank( Substitute( RequirementSearchTxtBox.Text, \" \", \"\")) && !IsNumeric( RequirementSearchTxtBox.Text),\r\n\r\n    Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", pageSize: nfAUATTCRequirementPageSize, page: varARQpageNumber, fields: [\"*\"], query: Concatenate(\"'Module' \",\"in\",\" '\" & constModuleInfo.pid & \" \" & constModuleInfo.name & \"' And 'name' \", \"~\",\" '\" & RequirementSearchTxtBox.Text & \"' \")}));\r\n\r\n    Set( varATCRequirementsCount, varATCRequirementRecords.total);\r\n\r\n    ClearCollect( colRequirement, varATCRequirementRecords.items),\r\n	\r\n	!IsBlank( Substitute( RequirementSearchTxtBox.Text, \" \", \"\")) && IsNumeric( RequirementSearchTxtBox.Text),\r\n\r\n    Set( varATCRequirementRecords, 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, { object_type: \"requirements\", pageSize: nfAUATTCRequirementPageSize, page: varARQpageNumber, fields: [\"*\"], query: Concatenate(\"'Module' \",\"in\",\" '\" & constModuleInfo.pid & \" \" & constModuleInfo.name & \"' And 'Link ID' \", \"=\",\" '\" & RequirementSearchTxtBox.Text & \"' \")}));\r\n\r\n    Set( varATCRequirementsCount, varATCRequirementRecords.total);\r\n\r\n    ClearCollect( colRequirement, varATCRequirementRecords.items)\r\n);\r\n\r\nIf( CountRows(colRequirement) = 0, UpdateContext({varErrorMsg: true}), UpdateContext({varErrorMsg: false}));\r\n\r\n//Disabling ReqLoading Spinnier\r\nUpdateContext({ showReqLoadingSpinner: false});"
                        PaddingBottom: =10
                        PaddingLeft: =10
                        PaddingRight: =10
                        PaddingTop: =10
                        Width: =40
                        X: =371
                        Y: =RequirementSearchTxtBox.Y
                  - GalleryRequirement:
                      Control: Gallery@2.15.0
                      Variant: VariableHeight
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Default: =If(!IsBlank(varSelectedRequirementInfo), LookUp(colRequirement,name = areqid.name),{})
                        DelayItemLoading: =false
                        Height: =435
                        Items: =colRequirement
                        LoadingSpinner: =LoadingSpinner.None
                        ShowScrollbar: =false
                        TemplateFill: =If( ThisItem.IsSelected, ColorFade( RGBA(70, 189, 198, 1), 100%), RGBA(0, 0, 0, 0))
                        TemplatePadding: =0
                        TemplateSize: =30
                        Width: =424
                        Y: =RequirementSearchTxtBox.Y + RequirementSearchTxtBox.Height + 5
                      Children:
                        - GMSeperatorRectangle:
                            Control: Rectangle@2.3.0
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              BorderStyle: =BorderStyle.None
                              Fill: =RGBA(204, 204, 204, 1)
                              FocusedBorderThickness: =0
                              Height: =0.4
                              OnSelect: =Select(Parent)
                              Width: =Parent.Width
                              Y: =30
                        - GMFilderIcon:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Color: =RGBA(0, 134, 146, 1)
                              Height: =20
                              Icon: =Icon.DocumentWithContent
                              OnSelect: =Select(Parent)
                              Width: =20
                              X: =15
                              Y: =5
                        - GRAddTestCaseIcon:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Color: =RGBA(255, 152, 1, 1)
                              Height: =20
                              Icon: =Icon.AddLibrary
                              OnSelect: |-
                                =Set( close, true);

                                ClearCollect( colRequirementProperties, ThisItem.properties);

                                Set( areqid, ThisItem)
                              Tooltip: ="Create Test Case"
                              Visible: =If(ThisItem.IsSelected && varReqGallerySelected,true,false)
                              Width: =20
                              X: =LabelRequirementName.X + LabelRequirementName.Width
                              Y: =LabelRequirementName.Y + 5
                        - LabelRequirementName:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Color: =If( LabelRequirementName.Text = GalleryRequirement.Selected.name, RGBA(17, 192, 190, 1), RGBA(107, 106, 106, 1))
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Semibold
                              Height: =30
                              HoverColor: =RGBA(70, 189, 198, 1)
                              OnSelect: |-
                                =UpdateContext(
                                    { 
                                        showTCLoadingSpinner: true
                                    }
                                );

                                Set( close, false);

                                Set( varTCpageNumber, 1);

                                Set( varTCQuery, Blank());

                                Set( areqid, ThisItem);

                                ClearCollect( colRequirementProperties, ThisItem.properties);

                                ClearCollect( 
                                    CollectTestcaseId, 
                                    'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink( 
                                        constProjectInfo.id, 
                                        { 
                                            type: "requirements", 
                                            ids: areqid.id
                                        }
                                    )
                                );

                                Clear( ColABC);

                                ForAll( 
                                    CollectTestcaseId, 
                                    Collect( 
                                        ColABC, 
                                        objects
                                    )
                                );

                                ClearCollect(
                                    colTCOnly,
                                    With(
                                        { varTCData: SortByColumns( Filter( ColABC, StartsWith(pid, "TC-")), "pid", SortOrder.Descending)},
                                        ForAll(
                                            Sequence( CountRows( varTCData)),
                                            {
                                                Number: Value,
                                                id: Last( FirstN( varTCData, Value)).id,
                                                pid: Last( FirstN( varTCData, Value)).pid
                                            }
                                        )
                                    )
                                );

                                Set(
                                    varTCQuery,
                                    With(
                                        {
                                            varConcatinatedTCData:
                                                FirstN(
                                                    LastN(
                                                        Sort( colTCOnly, Number, SortOrder.Ascending),
                                                        CountRows( colTCOnly) - ( (varTCpageNumber - 1) * nfAuthorTestCasePageSizeTC)
                                                    ),
                                                    nfAuthorTestCasePageSizeTC
                                                )
                                        },
                                        Concat(
                                            varConcatinatedTCData,
                                            "'Id' = '" & pid & "'",
                                            " or "
                                        )
                                    )
                                );

                                If(
                                    !IsBlank( varTCQuery),

                                    UpdateContext(
                                        {
                                            TotalTCRecords: 
                                            'ITS-TCOE_OCTO_UATMain_V1'.Search( 
                                                constProjectInfo.id, 
                                                {
                                                    object_type: "test-cases", 
                                                    page: nfAuthorTestCasePageTC, 
                                                    pageSize: nfAuthorTestCasePageSizeTC, 
                                                    fields: ["*"], 
                                                    query: varTCQuery 
                                                }
                                            )
                                        }
                                    );

                                    Set( varAUTestCaseCount, CountRows( colTCOnly));

                                    ClearCollect( colTestCase, TotalTCRecords.items),

                                    Clear( colTestCase)
                                );

                                UpdateContext(
                                    {
                                        varReqGallerySelected: true
                                    }
                                );

                                UpdateContext(
                                    {
                                        varModulename: 
                                        'ITS-TCOE_OCTO_UATMain_V1'.GetAModule( 
                                            constProjectInfo.id, 
                                            ThisItem.parent_id
                                        )
                                    }
                                );

                                UpdateContext(
                                    { 
                                        showTCLoadingSpinner: false
                                    }
                                );
                              Size: =11
                              Text: ="(" & ThisItem.pid & ") "& ThisItem.name
                              Tooltip: =ThisItem.name
                              VerticalAlign: =VerticalAlign.Top
                              Width: =350
                              Wrap: =false
                              X: =GMFilderIcon.X + GMFilderIcon.Width
                        - ButtonRequirementName:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =ColorFade(Self.Fill, -15%)
                              Color: =RGBA(255, 255, 255, 1)
                              DisabledBorderColor: =RGBA(166, 166, 166, 1)
                              Fill: =RGBA(0, 0, 0, 0)
                              Font: =Font.'Segoe UI'
                              Height: =LabelRequirementName.Height
                              HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =
                              OnSelect: =Select(LabelRequirementName)
                              PressedBorderColor: =Self.Fill
                              PressedColor: =Self.Fill
                              PressedFill: =
                              Text: =
                              Tooltip: =ThisItem.name
                              Width: =LabelRequirementName.Width
                              X: =LabelRequirementName.X
                              Y: =LabelRequirementName.Y
