                        FocusedBorderThickness: =0.4
                        Font: =Font.'Segoe UI'
                        HoverBorderColor: =ColorFade(Self.HoverFill, 20%)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =RGBA(255, 152, 1, 1)
                        OnSelect: "=UpdateContext({ showCDLoadingSpinner: true});\n\n\nClearCollect(\n    colTotalAttachments,\n    ShowColumns(\n        AddColumns(\n            ICDAttachmentsHiddenGal.AllItems,\n            data,\n            With(\n                {\n                    varDemoFormAttachmentCOntrol: JSON(\n                        ICDAHGImage.Image,\n                        JSONFormat.IncludeBinaryData\n                    )\n                },\n                Mid(\n                    varDemoFormAttachmentCOntrol,\n                    Find(\n                        \",\",\n                        varDemoFormAttachmentCOntrol\n                    ) + 1,\n                    Len(varDemoFormAttachmentCOntrol) - Find(\n                        \",\",\n                        varDemoFormAttachmentCOntrol\n                    ) - 1\n                )\n            ),\n            name,\n            ICDAHNameValue.Text,\n            content_type,\n            ICDAHContentTypeValue.Text\n        ),\n        data,\n        name,\n        content_type\n    )\n);\n\n\nConcurrent(\n    ClearCollect(\n        colTemDefSummary,\n        {\n            field_id: First(colAllDefectFieldsId).Summary,\n            field_name: \"Summary\",\n            field_value: ICDSummaryTxtInput.Text,\n            field_value_name: \"\"\n        }\n    ),\n    ClearCollect(\n        colTemDefCreatedby,\n        {\n            field_id: First(colAllDefectFieldsId).CreatedByUAT,\n            field_name: \"Created By (UATNext Only)\",\n            field_value: nfUserObject.'Full Name',\n            field_value_name: \"\"\n        }\n    ),\n    ClearCollect(\n        colTempDefUpdatedby,\n        {\n            field_id: First(colAllDefectFieldsId).UpdatedByUAT,\n            field_name: \"Updated By (UATNext Only)\",\n            field_value: nfUserObject.'Full Name',\n            field_value_name: \"\"\n        }\n    ),\n    ClearCollect(\n        colTemDefDescription,\n        {\n            field_id: First(colAllDefectFieldsId).Description,\n            field_name: \"Description\",\n            field_value: ICDDescriptionTxtInput.Text,\n            field_value_name: \"\"\n        }\n    )\n);\n\n\nClear(colTemDefFinalProperty);\n\n\nCollect(\n    colTemDefFinalProperty,\n\n    If( !IsEmpty(colTemDefSummary), colTemDefSummary),\n\n    If( !IsEmpty(colTemDefCreatedby), colTemDefCreatedby),\n\n    If( !IsEmpty(colTempDefUpdatedby), colTempDefUpdatedby),\n\n    If( !IsEmpty(colTemDefDescription), colTemDefDescription),\n    \n    If( !IsEmpty(colTemDefAffReaBuild), colTemDefAffReaBuild),\n\n    If( !IsEmpty(colTemDefSeverity), colTemDefSeverity),\n\n    If( !IsEmpty(colTemDefFixedRelease), colTemDefFixedRelease),\n\n    If( !IsEmpty(colTemDefRootCause), colTemDefRootCause),\n\n    If( !IsEmpty(colTemDefPriority), colTemDefPriority), \n    \n    If( !IsEmpty(colTemDefStatus), colTemDefStatus),\n\n    If( !IsEmpty(colTemDefType), colTemDefType),\n\n    If( !IsEmpty(colTemDefTRBuild), colTemDefTRBuild),\n    \n    If( !IsEmpty(colTemDefReason), colTemDefReason),\n\n    If( !IsEmpty(colTemDefCategory), colTemDefCategory),\n\n    If( !IsEmpty(colTemDefEnvironment), colTemDefEnvironment),\n\n    If( !IsEmpty(colTemDefAssignTo), colTemDefAssignTo),\n\n    If( !IsEmpty(colTemDefNonQAUser), colTemDefNonQAUser),\n\n    If( !IsEmpty(colTemDefTeam), colTemDefTeam),\n\n    If( !IsEmpty(colTemDefModule), colTemDefModule)\n);\n\n\nIf( \n    Lower( nfTeamsInfo)=\"no\",\n\n\n    If(\n        !IsBlank(ICDSummaryTxtInput.Text) && !IsBlank(ICDDescriptionTxtInput.Text) && !IsBlank(CDModuleCombobox.Selected) && !IsBlank(ICDAffectedReleaseCombobox.Selected) && !IsBlank(ICDSeverityCombobox.Selected) && !IsBlank(ICDPriorityCombobox.Selected) && !IsBlank(ICDStatusCombobox.Selected) && !IsBlank(ICDTypeCombobox.Selected),\n\n        UpdateContext({\n            varCreateDefectid:\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateDefect(\n                constProjectInfo.id,\n                {\n                    properties: colTemDefFinalProperty,\n                    attachments: colTotalAttachments\n                }\n            ).id\n        });\n\n\n        Notify( \"Defect Created Successfully\", NotificationType.Success, 4000);\n\n\n        If(\n            !IsBlank(ICDComboBoxBusinessUser.Selected),\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateDefectComment(\n                constProjectInfo.id,\n                varCreateDefectid,\n                {\n                    content: \"Assigned To : \" & ICDComboBoxBusinessUser.Selected.label\n                }\n            )\n        );\n\n        If(\n            !IsBlank(varSelectedTestStepForDefect),\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(\n                constProjectInfo.id,\n                \"test-steps\",\n                varSelectedTestStepForDefect.test_step_log_id,\n                {\n                    type: \"defects\",\n                    CreateAobjectlinkingRequestBody: [varCreateDefectid]\n                }\n            );\n            Set( varFetchedTestStepLinkedDefectPid, 'ITS-TCOE_OCTO_UATMain_V1'.GetObjectLink(constProjectInfo.id,{type:\"test-steps\",ids:varSelectedTestStepForDefect.test_step_log_id}).objects);\n\n            Clear(colFetchedTestStepLinkedDefectPid);\n\n            ForAll( varFetchedTestStepLinkedDefectPid, Collect( colFetchedTestStepLinkedDefectPid, ThisRecord.objects));\n\n            ClearCollect(\n                colTestSteplog,\n                'ITS-TCOE_OCTO_UATMain_V1'.GetTestLog(\n                    constProjectInfo.id,\n                    gallerySelectedTestrun.id\n                ).items\n            ),\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(\n                constProjectInfo.id,\n                \"test-logs\",\n                TestLogId,\n                {\n                    type: \"defects\",\n                    CreateAobjectlinkingRequestBody: [varCreateDefectid]\n                }\n            )\n        );\n\n\n        Back(),\n        \n\n        Notify( \"Please fill in all required fields before saving the defect.\", NotificationType.Information, 4000)\n    ),\n\n\n    If(\n        !IsBlank(ICDSummaryTxtInput.Text) && !IsBlank(ICDDescriptionTxtInput.Text) && !IsBlank(ICDTeamCombobox.Selected) && !IsBlank(CDModuleCombobox.Selected) && !IsBlank(ICDAffectedReleaseCombobox.Selected) && !IsBlank(ICDSeverityCombobox.Selected) && !IsBlank(ICDPriorityCombobox.Selected) && !IsBlank(ICDStatusCombobox.Selected) && !IsBlank(ICDTypeCombobox.Selected),\n\n\n        UpdateContext({\n            varCreateDefectid:\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateDefect(\n                constProjectInfo.id,\n                {\n                    properties: colTemDefFinalProperty,\n                    attachments: colTotalAttachments\n                }\n            ).id\n        });\n\n\n        Notify( \"Defect Created Successfully.\", NotificationType.Success, 4000);\n\n\n        If(\n            !IsBlank(ICDComboBoxBusinessUser.Selected),\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateDefectComment(\n                constProjectInfo.id,\n                varCreateDefectid,\n                {\n                    content: \"Assigned To : \" & ICDComboBoxBusinessUser.Selected.label\n                }\n            )\n        );\n\n\n        If(\n            !IsBlank(varSelectedTestStepForDefect),\n            \n            'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(\n                constProjectInfo.id,\n                \"test-steps\",\n                varSelectedTestStepForDefect.test_step_log_id,\n                {\n                    type: \"defects\",\n                    CreateAobjectlinkingRequestBody: [varCreateDefectid]\n                }\n            );\n            \n            Clear(colFetchedTestStepLinkedDefectPid);\n\n            ForAll( varFetchedTestStepLinkedDefectPid, Collect( colFetchedTestStepLinkedDefectPid, ThisRecord.objects));\n\n            ClearCollect(\n                colTestSteplog,\n                'ITS-TCOE_OCTO_UATMain_V1'.GetTestLog(\n                    constProjectInfo.id,\n                    gallerySelectedTestrun.id\n                ).items\n            ),\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateObjectLink(\n                constProjectInfo.id,\n                \"test-logs\",\n                TestLogId,\n                {\n                    type: \"defects\",\n                    CreateAobjectlinkingRequestBody: [varCreateDefectid]\n                }\n            )\n        );\n\n\n        Back(),\n\n\n        Notify( \"Please fill in all required fields before saving the defect\", NotificationType.Information, 4000)\n    )\n);\n\n\nUpdateContext({ showCDLoadingSpinner: false});"
