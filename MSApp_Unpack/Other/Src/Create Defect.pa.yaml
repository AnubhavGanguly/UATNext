                  - ICDDescriptionTxtInput:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(177, 227, 230, 1)
                        BorderThickness: =1
                        Default: |-
                          =If(
                              !IsBlank(varSelectedTestStepForDefect),

                          "Test Suite : ("& Trim( selectedSuiteInfo.pid) & ") " & PlainText( Trim( selectedSuiteInfo.name)) & Char(10) &
                          "Test Case Name : "& PlainText( FetchedTestCaseDetails.name) & Char(10) &
                          "Business Impact :
                          Role Used : 
                          Test Data (if any) : "& Char(10) & Char(10) &
                          "Steps to Reproduce :" & Char(10) &
                          Concat(
                              Filter( First( colTestSteplog).test_step_logs, Int( order) <= Int( varSelectedTestStepForDefect.order)),
                              PlainText( ThisRecord.order) & ") " & PlainText( ThisRecord.description) & Char(10)
                          ) & Char(10) &
                          "Expected Result : " & PlainText( varSelectedTestStepForDefect.expected_result) & Char(10) & 
                          "Actual Result : " & PlainText( varSelectedTestStepForDefect.actual_result) & Char(10) & Char(10) &
                          "User Name : "& nfUserObject.'Full Name' & Char(10) &
                          "Test Case Number : "& FetchedTestCaseDetails.pid & Char(10) & Char(10) & 
                          "Requirement Details:" & Char(10) &
                          If(
                              !IsEmpty( colRequirementDetails),
                              Concat(
                                  colRequirementDetails,
                                  "(" & pid & " / " & If( !IsBlank( LookUp( properties, field_name = "Link ID").field_value), LookUp( properties, field_name = "Link ID", field_value), "N/A") & ") " & name & Char(10)
                              ),
                              "N/A"
                          ),


                          "Test Suite : ("& Trim( selectedSuiteInfo.pid) & ") " & PlainText( Trim( selectedSuiteInfo.name)) & Char(10) &
                          "Test Case Name : "& PlainText( FetchedTestCaseDetails.name) & Char(10) &
                          "Business Impact :
                          Role Used : 
                          Test Data (if any) : "& Char(10) & Char(10) &
                          "Steps to Reproduce :" & Char(10) &
                          Concat(
                              First( colTestSteplog).test_step_logs,
                              PlainText( ThisRecord.order) & ") " & PlainText( ThisRecord.description) & Char(10)
                          ) & Char(10) &
                          "Expected Result : 
                          Actual Result : 

                          User Name : "& nfUserObject.'Full Name' & Char(10) &
                          "Test Case Number : "& FetchedTestCaseDetails.pid & Char(10) & Char(10) & 
                          "Requirement Details:" & Char(10) &
                          If(
                              !IsEmpty( colRequirementDetails),
                              Concat(
                                  colRequirementDetails,
                                  "(" & pid & " / " & If( !IsBlank( LookUp( properties, field_name = "Link ID").field_value), LookUp( properties, field_name = "Link ID", field_value), "N/A") & ") " & name & Char(10)
                              ),
                              "N/A"
                          )
                          )
                        FocusedBorderThickness: =1
                        Font: =Font.'Segoe UI'
                        Height: =185
                        HoverBorderColor: =RGBA(4, 141, 154, 1)
                        HoverFill: =RGBA(255, 255, 255, 1)
                        Mode: =TextMode.MultiLine
