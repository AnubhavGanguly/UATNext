                          =If(
                              !IsBlank(varSelectedTestStepForDefect),

                              'ITS-TCOE_OCTO_UATMain_V1'.RemoveObjectLink( constProjectInfo.id, "test-steps", varSelectedTestStepForDefect.test_step_log_id, {type: "defects", RemoveLinkedObjectsResuestBody: [First(colGetDef).id]});

                              Clear( colFetchedTestStepLinkedDefectPid),

                              'ITS-TCOE_OCTO_UATMain_V1'.RemoveObjectLink( constProjectInfo.id, "test-logs", First(colTestSteplog).id, {type: "defects", RemoveLinkedObjectsResuestBody: [First(colGetDef).id]})
