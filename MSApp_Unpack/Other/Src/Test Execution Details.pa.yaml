            TimeZoneOffset(Now()),\n                    TimeUnit.Minutes\n                ),\n                \"yyyy-mm-dd\"\n            ),\n            \"T\",\n            Text(\n                DateAdd(\n                    Now(),\n                    TimeZoneOffset(Now()),\n                    TimeUnit.Minutes\n                ),\n                \"hh:mm:ss\"\n            ),\n            \"+00:00\"\n        )\n    }\n);\n\nIf(\n    varCreateTestLog = true,\n\n    ClearCollect(\n        colLatestTestLog,\n        'ITS-TCOE_OCTO_UATMain_V1'.CreateTestlog(\n            constProjectInfo.id,\n            gallerySelectedTestrun.id,\n            {\n                test_step_logs: First(colTestSteplog).test_step_logs,\n                properties: [\n                    {\n                        field_id: varTestRunCreatedByUAT,\n                        field_name: \"Created By (UATNext Only)\",\n                        field_value: nfUserObject.'Full Name',\n                        field_value_name: \"\"\n                    },\n                    {\n                        field_id: varTestRunUpdatedByUAT,\n                        field_name: \"Updated By (UATNext Only)\",\n                        field_value: nfUserObject.'Full Name',\n                        field_value_name: \"\"\n                    }\n                ],\n                status: {\n                    id: If(\n                        IsEmpty(StatusCombobox.SelectedItems),\n                        LookUp(\n                            colTestSteplog,\n                            true,\n                            ThisRecord.status.id\n                        ),\n                        StatusCombobox.Selected.value\n                    )\n                },\n                exe_end_date: ExeEndDate,\n                exe_start_date: ExeStartDate,\n                attachments: colTotalAttachmentsTR\n            }\n        )\n    );\n\n    ClearCollect(\n        colReturnResTr,\n        'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestrun(\n            constProjectInfo.id,\n            gallerySelectedTestrun.id,\n            {\n                properties: [\n                    {\n                        field_id: varTestRunUpdatedByUAT,\n                        field_name: \"Updated By (UATNext Only)\",\n                        field_value: nfUserObject.'Full Name',\n                        field_value_name: \"\"\n                    }\n                ],\n\n                test_case_version_id: lastApprovedVersionId\n            }\n        )\n    );\n\n    Set( varCreateTestLog, false);\n\n    Navigate('Test Execution Details'),\n\n\n    If(\n        IsEmpty( colTestLogTestStep),\n\n        ClearCollect(\n            colLatestTestLog,\n            'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestlogStatus(\n                constProjectInfo.id,\n                gallerySelectedTestrun.id,\n                TSGallery.Selected.id,\n                {\n                    properties: [\n                        {\n                            field_id: varTestRunUpdatedByUAT,\n                            field_name: \"Updated By (UATNext Only)\",\n                            field_value: nfUserObject.'Full Name',\n                            field_value_name: \"\"\n                        }\n                    ],\n\n                    status: {\n                        id: If(\n                            IsEmpty(StatusCombobox.SelectedItems),\n                            LookUp(\n                                colTestSteplog,\n                                true,\n                                ThisRecord.status.id\n                            ),\n                            StatusCombobox.Selected.value\n                        )\n                    },\n\n                    exe_end_date: Text(\n                        LookUp(\n                            colTestSteplog,\n                            result_number = Max(\n                                colTestSteplog,\n                                result_number\n                            ),\n                            exe_end_date\n                        )\n                    ),\n\n                    exe_start_date: Text(\n                        LookUp(\n                            colTestSteplog,\n                            result_number = Max(\n                                colTestSteplog,\n                                result_number\n                            ),\n                            exe_start_date\n                        )\n                    )\n                }\n            )\n        );\n\n        If(\n            !IsEmpty( colTotalAttachmentsTR),\n            ForAll(\n                colTotalAttachmentsTR,\n                Collect(\n                    colAttachmentStatus,\n                    'ITS-TCOE_OCTO_UATNext_Test_AttachmentUpload_Flow'.Run(\n                        ThisRecord.name,\n                        ThisRecord.data,\n                        ThisRecord.content_type,\n                        constProjectInfo.id,\n                        \"test-logs\",\n                        TSGallery.Selected.id\n                    )\n                )\n            )\n        );\n\n        ClearCollect(\n            colReturnResTr,\n            'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestrun(\n                constProjectInfo.id,\n                gallerySelectedTestrun.id,\n                {\n                    properties:[\n                        {\n                            field_id: varTestRunUpdatedByUAT,\n                            field_name: \"Updated By (UATNext Only)\",\n                            field_value: nfUserObject.'Full Name',\n                            field_value_name: \"\"\n                        }\n                    ],\n\n                    test_case_version_id: LookUp(\n                        colTestSteplog,\n                        result_number = Max(\n                            colTestSteplog,\n                            result_number\n                        ),\n                        test_case_version_id\n                    )\n                }\n            )\n        ),\n\n        Set(\n            smallDate,\n            First(\n                SortByColumns(\n                    colTestLogTestStep,\n                    \"exe_date\",\n                    SortOrder.Ascending\n                )\n            ).exe_date\n        );\n\n        Set(\n            LastDate,\n            First(\n                SortByColumns(\n                    colTestLogTestStep,\n                    \"exe_date\",\n                    SortOrder.Descending\n                )\n            ).exe_date\n        );\n\n        If(\n            DateTimeValue( ExeEndDate) > DateTimeValue( LastDate) || IsBlank( LastDate),\n            Set( LastDate, ExeEndDate)\n        );\n\n        If(\n            DateTimeValue( ExeStartDate) < DateTimeValue( smallDate) || IsBlank( smallDate),\n            Set( smallDate, ExeStartDate)\n        );\n\n        ClearCollect(\n            colLatestTestLog,\n            'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestlogStatus(\n                constProjectInfo.id,\n                gallerySelectedTestrun.id,\n                TSGallery.Selected.id,\n                {\n                    properties: [\n                        {\n                            field_id: varTestRunUpdatedByUAT,\n                            field_name: \"Updated By (UATNext Only)\",\n                            field_value: nfUserObject.'Full Name',\n                            field_value_name: \"\"\n                        }\n                    ],\n\n                    status: {\n                        id: If(\n                            IsEmpty(StatusCombobox.SelectedItems),\n                            LookUp(\n                                colTestSteplog,\n                                true,\n                                ThisRecord.status.id\n                            ),\n                            StatusCombobox.Selected.value\n                        )\n                    },\n\n                    exe_start_date: smallDate,\n                    exe_end_date: LastDate,\n                    test_step_logs: colTestLogTestStep\n                }\n            )\n        );\n\n        If (\n            !IsEmpty( colTotalAttachmentsTR),\n            ForAll(\n                colTotalAttachmentsTR,\n                Collect(\n                    colAttachmentStatus,\n                    'ITS-TCOE_OCTO_UATNext_Test_AttachmentUpload_Flow'.Run(\n                        ThisRecord.name,\n                        ThisRecord.data,\n                        ThisRecord.content_type,\n                        constProjectInfo.id,\n                        \"test-logs\",\n                        TSGallery.Selected.id\n                    )\n                )\n            )\n        );\n\n        ClearCollect(\n            colReturnResTr,\n            'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestrun(\n                constProjectInfo.id,\n                gallerySelectedTestrun.id,\n                {\n                     properties:[\n                        {\n                            field_id: varTestRunUpdatedByUAT,\n                            field_name: \"Updated By (UATNext Only)\",\n                            field_value: nfUserObject.'Full Name',\n                            field_value_name: \"\"\n                        }\n                    ],\n\n                    test_case_version_id: LookUp(\n                        colTestSteplog,\n                        result_number = Max(\n                            colTestSteplog,\n                            result_number\n                        ),\n                        test_case_version_id\n                    )\n                }\n            )\n        )\n    )\n);\n\nClearCollect( colTestSteplog, 'ITS-TCOE_OCTO_UATMain_V1'.GetTestLog( constProjectInfo.id, gallerySelectedTestrun.id).items);\n\nSet( varLinkDefectVisibility, true);\n\nIf(\n    !IsEmpty( colTotalAttachmentsTR),\n\n    UpdateContext({ varFailedFiles: Concat( Filter(colAttachmentStatus, StartsWith(status_code,4) ||  StartsWith(status_code,5)), file_name & \", \")}); \n    UpdateContext({ varSuccesedFiles: Concat( Filter(colAttachmentStatus, StartsWith(status_code,2)), file_name & \", \")})\n);\n\nIf(\n    !IsBlank( varSuccesedFiles) && IsBlank( varFailedFiles),\n\n    Notify(\"Testlog Updated Successfully With Attachment.\", NotificationType.Success, 4000),\n\n    !IsBlank( varFailedFiles) && IsBlank( varSuccesedFiles),\n\n    Notify(\"Attachment Upload Failed For \" & varFailedFiles, NotificationType.Error, 8000),\n        \n    Notify( \"Testlog Updated Successfully.\", NotificationType.Success, 4000)  \n);\n\nReset(CDAttachmentUpload_1);\nClear(colAttachmentsTR);\n\n\n//Testrun list screen data show without network call\nUpdate(\n    colTestRun,\n    LookUp(\n        colTestRun,\n        id = gallerySelectedTestrun.id\n    ),\n    {\n        automation: gallerySelectedTestrun.automation,\n        id: gallerySelectedTestrun.id,\n        name: gallerySelectedTestrun.name,\n        order: gallerySelectedTestrun.order,\n        parentId: gallerySelectedTestrun.parentId,\n        parentType: gallerySelectedTestrun.parentType,\n        pid: gallerySelectedTestrun.pid,\n        properties: First(colReturnResTr).properties,\n        testCaseId: gallerySelectedTestrun.testCaseId,\n        latest_test_log: {\n            id: First(colLatestTestLog).id,\n            exe_end_date: First(colLatestTestLog).exe_end_date,\n            exe_start_date: First(colLatestTestLog).exe_start_date,\n            status: \"\"\n        }\n    }\n);\n\n//Disable TEDLoading Spinnier\nUpdateContext({ showTEDLoadingSpinner: false});"
