                        HoverFill: =RGBA(255, 152, 1, 1)
                        OnSelect: "=UpdateContext({ showCIDLoadingSpinner: true});\n\n\nClearCollect(\n    colTotalAttachments,\n    ShowColumns(\n        AddColumns(\n            ECDAttachmentsHiddenGal.AllItems,\n            data,\n            With(\n                {\n                    varDemoFormAttachmentCOntrol: JSON(\n                        ICDAHGImage.Image,\n                        JSONFormat.IncludeBinaryData\n                    )\n                },\n                Mid(\n                    varDemoFormAttachmentCOntrol,\n                    Find(\n                        \",\",\n                        varDemoFormAttachmentCOntrol\n                    ) + 1,\n                    Len(varDemoFormAttachmentCOntrol) - Find(\n                        \",\",\n                        varDemoFormAttachmentCOntrol\n                    ) - 1\n                )\n            ),\n            name,\n            ICDAHNameValue.Text,\n            content_type,\n            ICDAHContentTypeValue.Text\n        ),\n        data,\n        name,\n        content_type\n    )\n);\n\n\nConcurrent(\n    ClearCollect(\n        colTemDefSummary,\n        {\n            field_id: First(colAllDefectFieldsId).Summary,\n            field_name: \"Summary\",\n            field_value: ECDSummaryTxtInput.Text,\n            field_value_name: \"\"\n        }\n    ),\n    ClearCollect(\n        colTemDefCreatedby,\n        {\n            field_id: First(colAllDefectFieldsId).CreatedByUAT,\n            field_name: \"Created By (UATNext Only)\",\n            field_value: nfUserObject.'Full Name',\n            field_value_name: \"\"\n        }\n    ),\n    ClearCollect(\n        colTempDefUpdatedby,\n        {\n            field_id: First(colAllDefectFieldsId).UpdatedByUAT,\n            field_name: \"Updated By (UATNext Only)\",\n            field_value: nfUserObject.'Full Name',\n            field_value_name: \"\"\n        }\n    ),\n    ClearCollect(\n        colTemDefDescription,\n        {\n            field_id: First(colAllDefectFieldsId).Description,\n            field_name: \"Description\",\n            field_value: ECDDescriptionTxtInput.Text,\n            field_value_name: \"\"\n        }\n    )\n);\n\n\nClear(colTemDefFinalProperty);\n\n\nCollect(\n    colTemDefFinalProperty,\n\n    If( !IsEmpty(colTemDefSummary), colTemDefSummary),\n\n    If( !IsEmpty(colTemDefCreatedby), colTemDefCreatedby),\n\n    If( !IsEmpty(colTempDefUpdatedby), colTempDefUpdatedby),\n\n    If( !IsEmpty(colTemDefDescription), colTemDefDescription),\n    \n    If( !IsEmpty(colTemDefAffReaBuild), colTemDefAffReaBuild),\n\n    If( !IsEmpty(colTemDefSeverity), colTemDefSeverity),\n\n    If( !IsEmpty(colTemDefFixedRelease), colTemDefFixedRelease),\n\n    If( !IsEmpty(colTemDefRootCause), colTemDefRootCause),\n\n    If( !IsEmpty(colTemDefPriority), colTemDefPriority), \n    \n    If( !IsEmpty(colTemDefStatus), colTemDefStatus),\n\n    If( !IsEmpty(colTemDefType), colTemDefType),\n\n    If( !IsEmpty(colTemDefTRBuild), colTemDefTRBuild),\n    \n    If( !IsEmpty(colTemDefReason), colTemDefReason),\n\n    If( !IsEmpty(colTemDefCategory), colTemDefCategory),\n\n    If( !IsEmpty(colTemDefEnvironment), colTemDefEnvironment),\n\n    If( !IsEmpty(colTemDefAssignTo), colTemDefAssignTo),\n\n    If( !IsEmpty(colTemDefNonQAUser), colTemDefNonQAUser),\n\n    If( !IsEmpty(colTemDefTeam), colTemDefTeam),\n\n    If( !IsEmpty(colTemDefModule), colTemDefModule)\n);\n\n\nIf( \n    Lower(nfTeamsInfo)=\"no\",\n    \n\n    If(\n        !IsBlank(ECDSummaryTxtInput.Text) && !IsBlank(ECDDescriptionTxtInput.Text) && !IsBlank(ECDModuleCombobox.Selected) && !IsBlank(ECDAffectedReleaseCombobox.Selected) && !IsBlank(ECDSeverityCombobox.Selected) && !IsBlank(ECDPriorityCombobox.Selected) && !IsBlank(ECDStatusCombobox.Selected) && !IsBlank(ECDTypeCombobox.Selected),\n\n\n        UpdateContext({\n            varIndCreateDefectid:\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateDefect(\n                constProjectInfo.id,\n                {\n                    properties: colTemDefFinalProperty,\n                    attachments: colTotalAttachments\n                }\n            ).id\n        });\n\n\n        Notify( \"Defect Created Successfully\", NotificationType.Success, 4000);\n\n\n        If(\n            !IsBlank(ECDComboBoxBusinessUser.Selected),\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateDefectComment(\n                constProjectInfo.id,\n                varIndCreateDefectid,\n                {\n                    content: \"Assigned To : \" & ECDComboBoxBusinessUser.Selected.label\n                }\n            )\n        );\n\n\n        Navigate('Create_Defect_Independent_Creation'),\n\n\n        Notify( \"Please fill in all required fields before saving the defect\", NotificationType.Information, 4000)\n    ),\n\n\n    If(\n        !IsBlank(ECDSummaryTxtInput.Text) && !IsBlank(ECDDescriptionTxtInput.Text) && !IsBlank(ECDTeamCombobox.Selected) && !IsBlank(ECDModuleCombobox.Selected) && !IsBlank(ECDAffectedReleaseCombobox.Selected) && !IsBlank(ECDSeverityCombobox.Selected) && !IsBlank(ECDPriorityCombobox.Selected) && !IsBlank(ECDStatusCombobox.Selected) && !IsBlank(ECDTypeCombobox.Selected),\n\n\n        UpdateContext({ \n            varIndCreateDefectid:\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateDefect(\n                constProjectInfo.id,\n                {\n                    properties: colTemDefFinalProperty,\n                    attachments: colTotalAttachments\n                }\n            ).id\n        });\n\n\n        Notify( \"Defect Created Successfully\", NotificationType.Success, 4000);\n\n\n        If(\n            !IsBlank( ECDComboBoxBusinessUser.Selected),\n\n            'ITS-TCOE_OCTO_UATMain_V1'.CreateDefectComment(\n                constProjectInfo.id,\n                varIndCreateDefectid,\n                {\n                    content: \"Assigned To : \" & ECDComboBoxBusinessUser.Selected.label\n                }\n            )\n        );\n\n\n        Navigate('Create_Defect_Independent_Creation'),\n\n\n        Notify( \"Please fill in all required fields before saving the defect\", NotificationType.Information, 4000)\n    )\n);\n\n\nUpdateContext({ showCIDLoadingSpinner: false});"
