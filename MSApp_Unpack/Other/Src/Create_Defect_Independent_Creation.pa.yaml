Screens:
  Create_Defect_Independent_Creation:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =Clear(colTemDefFinalProperty);

        Clear(Attachments);

        Reset(ECDAttachmentUpload); Reset(ECDSummaryTxtInput); Reset(ECDDescriptionTxtInput); Reset(ECDAffectedReleaseCombobox); Reset(ECDSeverityCombobox); Reset('ECDFR/BCombobox'); Reset(ECDRootCauseCombobox); Reset(ECDPriorityCombobox); Reset(ECDModuleCombobox); Reset(ECDAssignedToCOmbobox); Reset(ECDStatusCombobox); Reset(ECDTypeCombobox); Reset(ECDTRBuildCombobox); Reset(ECDReasonCombobox); Reset(ECDCategoryCombobox);
      OnVisible: "=Concurrent(\r\n    Set(varScreenName, \" Create_Defect_Independent_Creation\"),\r\n\r\n    Set(varVideoLink, Concatenate(nfSharepointbaseUrl,\"video/Create_Defect_Independent_Creation.mp4\")),\r\n    \r\n    Set(varPDFLink, Concatenate(nfSharepointbaseUrl,\"pdf/Create_Defect_Independent_Creation.pdf\"))\r\n);\r\n\r\n\r\nConcurrent( Clear(Attachments), Reset(ECDTeamCombobox), Reset(ECDGalleryENVCombobox));\r\n\r\n\r\nConcurrent( Clear(colTemDefAffReaBuild), Clear(colTemDefSeverity), Clear(colTemDefFixedRelease), Clear(colTemDefRootCause), Clear(colTemDefPriority), Clear(colTemDefModule), Clear(colTemDefEnvironment), Clear(colTemDefStatus), Clear(colTemDefType), Clear(colTemDefTRBuild), Clear(colTemDefReason), Clear(colTemDefCategory), Clear(colTemDefAssignTo), Clear(colTemDefNonQAUser), Clear(colTemDefTeam));\r\n\r\n\r\nConcurrent(\r\n    ClearCollect(\r\n        colTemDefAffReaBuild,\r\n        {\r\n            field_id: First(colAllDefectFieldsId).AffectedReleaseBuild,\r\n            field_name: \"Affected Release/Build\",\r\n            field_value: Text( LookUp( colAffectReleaseValues, label = constReleaseInfo.name).value),\r\n            field_value_name: LookUp( colAffectReleaseValues, label = constReleaseInfo.name).label\r\n        }\r\n    ),\r\n\r\n    If(\r\n        !IsBlank( LookUp( colSeverityValues, is_default = true)),\r\n\r\n        ClearCollect(\r\n            colTemDefSeverity,\r\n            {\r\n                field_id: First(colAllDefectFieldsId).Severity,\r\n                field_name: \"Severity\",\r\n                field_value: Text( LookUp( colSeverityValues, is_default = true).value),\r\n                field_value_name: LookUp( colSeverityValues, is_default = true).label\r\n            }\r\n        ),\r\n\r\n        ClearCollect( colTemDefSeverity, Blank())\r\n    ),\r\n\r\n    If(\r\n        !IsBlank( LookUp( colRotCauseValues, is_default = true)),\r\n    \r\n        ClearCollect(\r\n            colTemDefRootCause,\r\n            {\r\n                field_id: First(colAllDefectFieldsId).RootCause,\r\n                field_name: \"Root Cause\",\r\n                field_value: Text( LookUp( colRotCauseValues, is_default = true).value),\r\n                field_value_name: LookUp( colRotCauseValues, is_default = true).label\r\n            }\r\n        ),\r\n\r\n        ClearCollect( colTemDefRootCause, Blank())\r\n    ),\r\n    \r\n    If(\r\n        !IsBlank( LookUp( colPriorityValues, is_default = true)),\r\n\r\n        ClearCollect(\r\n            colTemDefPriority,\r\n            {\r\n                field_id: First(colAllDefectFieldsId).Priority,\r\n                field_name: \"Priority\",\r\n                field_value: Text( LookUp( colPriorityValues, is_default = true).value),\r\n                field_value_name: LookUp( colPriorityValues, is_default = true).label\r\n            }\r\n        ),\r\n\r\n        ClearCollect( colTemDefPriority, Blank())\r\n    ),\r\n\r\n    ClearCollect(\r\n        colTemDefModule,\r\n        {\r\n            field_id: First(colAllDefectFieldsId).Module,\r\n            field_name: \"Module\",\r\n            field_value: Text( LookUp( colModuleValues, value = constAreaPathModuleInfo.id).value),\r\n            field_value_name: LookUp( colModuleValues, value = constAreaPathModuleInfo.id).label\r\n        }\r\n    ),\r\n\r\n    If(\r\n        !IsBlank( LookUp( colStatusValues, is_default = true)),\r\n\r\n        ClearCollect(\r\n            colTemDefStatus,\r\n            {\r\n                field_id: First(colAllDefectFieldsId).Status,\r\n                field_name: \"Status\",\r\n                field_value: Text( LookUp( colStatusValues, is_default = true).value),\r\n                field_value_name: LookUp( colStatusValues, is_default = true).label\r\n            }\r\n        ),\r\n\r\n        ClearCollect( colTemDefStatus, Blank())\r\n    ),\r\n\r\n    If(\r\n        !IsBlank( LookUp( colTypeValues, is_default = true)),\r\n\r\n        ClearCollect(\r\n            colTemDefType,\r\n            {\r\n                field_id: First(colAllDefectFieldsId).Type,\r\n                field_name: \"Type\",\r\n                field_value: Text( LookUp( colTypeValues, is_default = true).value),\r\n                field_value_name: LookUp( colTypeValues, is_default = true).label\r\n            }\r\n        ),\r\n\r\n        ClearCollect( colTemDefType, Blank())\r\n    ),\r\n\r\n    If(\r\n        !IsBlank( LookUp( colCategoryValues, is_default = true)),\r\n\r\n        ClearCollect(\r\n            colTemDefCategory,\r\n            {\r\n                field_id: First(colAllDefectFieldsId).Category,\r\n                field_name: \"Category\",\r\n                field_value: Text( LookUp( colCategoryValues, is_default = true).value),\r\n                field_value_name: LookUp( colCategoryValues, is_default = true).label\r\n            }\r\n        ),\r\n\r\n        ClearCollect( colTemDefCategory, Blank())\r\n    )\r\n)"
