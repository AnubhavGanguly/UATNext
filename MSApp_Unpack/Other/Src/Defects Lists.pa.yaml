                        Color: =RGBA(153, 153, 153, 1)
                        DisabledColor: =RGBA(153, 153, 153, 1)
                        Height: =DLSearchIcon.Height
                        Icon: =Icon.Reset
                        OnSelect: "=UpdateContext({searchOn: false});\r\n\r\nIf(\r\n    varDFSearchReset= true,\r\n\r\n    Set(varDFPageNumber, 1);\r\n\r\n    UpdateContext({varDefectRecord: 'ITS-TCOE_OCTO_UATMain_V1'.Search(constProjectInfo.id,{object_type:\"defects\", Page: varDFPageNumber, pageSize: nfDefectPageSize, fields:[\"*\"], query: varFilteredDefectsQuery})});\r\n\r\n    UpdateContext({defectCount: varDefectRecord.total});\r\n\r\n    ClearCollect(colDefectList, varDefectRecord.items);\r\n    \r\n    Concurrent( Reset(DLDefectIdTxtInput),Reset(DLSummaryTxtInput),Reset(DLStatusCombobox),Reset(DLTeamCombobox),Reset(DLSeverityCombobox), Reset(DLPriorityCombobox),Reset(DLAssignedToCombobox),Reset(DLBusinessUserCombobox),Reset(DLAffReleaBuildCombobox), Reset(DLCreatedByCombobox)),\r\n\r\n    Concurrent( Reset(DLDefectIdTxtInput),Reset(DLSummaryTxtInput),Reset(DLStatusCombobox),Reset(DLTeamCombobox),Reset(DLSeverityCombobox), Reset(DLPriorityCombobox),Reset(DLAssignedToCombobox),Reset(DLBusinessUserCombobox),Reset(DLAffReleaBuildCombobox), Reset(DLCreatedByCombobox))\r\n);\r\n\r\nConcurrent(\r\n    UpdateContext({DefectId: \"\"}),\r\n    UpdateContext({DefectSummery: \"\"}),\r\n    UpdateContext({DefectStatus: \"\"}),\r\n    UpdateContext({DefectPriority: \"\"}),\r\n    UpdateContext({DefectSeverity: \"\"}),\r\n    UpdateContext({DefectAssignedTo: \"\"}),\r\n    UpdateContext({DefectBusinessUser: \"\"}),\r\n    UpdateContext({DefectTeam: \"\"}),\r\n    UpdateContext({DefectCreatedBy: \"\"}),\r\n    UpdateContext({varDFSearchReset: false}),\r\n    If( CountRows(colDefectList) = 0, UpdateContext({varDefectErrorMsg: true}), UpdateContext({varDefectErrorMsg: false}))\r\n)"
