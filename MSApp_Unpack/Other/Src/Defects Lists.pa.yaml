            Visible: =If( DLDefectListGallery.AllItemsCount = 0 || varDFPageNumber = RoundUp( defectCount / nfDefectPageSize, 0), false, true)
            Width: =35
            X: =DLPaginationInfoLbl.X + DLPaginationInfoLbl.Width
            Y: =DLPaginationInfoLbl.Y + 5
      - DLPaginationInfoLbl:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(19, 61, 83, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Lighter
            Size: =11
            Text: ="Page " & varDFPageNumber & " of " & RoundUp( defectCount / nfDefectPageSize, 0) & " Pages"
            Visible: =If( DLDefectListGallery.AllItemsCount > 0 , true, false)
            X: =DLPaginationLeftNavIcon.X + DLPaginationLeftNavIcon.Width
            Y: =725
      - DL_Outer_Header_Component:
          Control: CanvasComponent
          ComponentName: Outer_Header_Component
          Properties:
            Height: =50
            OuterComponentPDFLink: =varPDFLink
            OuterComponentVideoLink: =varVideoLink
            TabMenuItems: =ColTabMenuItems
            Width: =1366
            conProjectID: =constProjectInfo.id
