Screens:
  Defects Lists:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: =Clear(colDefectList)
      OnVisible: "=Concurrent(\r\n    Set(varScreenName, \"Defect List\"),\r\n\r\n    Set(varVideoLink, Concatenate(nfSharepointbaseUrl,\"video/Defect_List.mp4\")),\r\n    \r\n    Set(varPDFLink, Concatenate(nfSharepointbaseUrl,\"pdf/Defect_List.pdf\"))\r\n);\r\n\r\nUpdateContext({varDefectErrorMsg: false});\r\n\r\nUpdateContext({ searchOn: false});\r\n\r\nUpdateContext({ varDFSearchReset: false});\r\n\r\nUpdateContext({ varFilteredDefectsQuery: Concat( colAffectReleaseValues, \"'Affected Release/Build' = \" & \"'\" & label & \"'\", \" or \")});\r\n\r\nUpdateContext({ varDefectRecord: 'ITS-TCOE_OCTO_UATMain_V1'.Search( constProjectInfo.id, {object_type: \"defects\", page: varDFPageNumber, pageSize: nfDefectPageSize, fields:[\"*\"], query: varFilteredDefectsQuery})});\r\n\r\nUpdateContext({ defectCount: varDefectRecord.total});\r\n\r\nClearCollect( colDefectList, varDefectRecord.items);\r\n\r\nConcurrent(\r\n    Reset(DLDefectIdTxtInput), Reset(DLSummaryTxtInput), Reset(DLStatusCombobox), Reset(DLTeamCombobox), Reset(DLSeverityCombobox), Reset(DLPriorityCombobox), Reset(DLAssignedToCombobox), Reset(DLBusinessUserCombobox), Reset(DLAffReleaBuildCombobox), Reset(DLCreatedByCombobox)\r\n)"
