                        HoverBorderColor: =ColorFade(Self.HoverFill, 20%)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =RGBA(255, 152, 1, 1)
                        OnSelect: "=UpdateContext({ showACTCLoadingSpinner: true});\n\n'ITS-TCOE_OCTO_UATMain_V1'.ApproveTestcase( constProjectInfo.id, ATCSearchTestCaseGal.Selected.id);\n\nClear(colEXPSO);\n\nForAll(\n    colTestStep,\n\n    If(\n        IsBlank( ThisRecord.called_test_case) && IsBlank( LookUp( ThisRecord.customFieldInfo,  Lower(name) = Lower(\"UAT Category\")).value),\n        \n        Collect(\n            colEXPSO,\n            {\n                description: ThisRecord.description,\n                expected: ThisRecord.expected,\n                order: ThisRecord.order, \n                customFieldInfo: [\n                    {\n                        id: TestStepUATCategory,\n                        value: Text( LookUp( colBusinessValuesTS, value = 779257).value),\n                        objectId: 0,\n                        type: \"PropertyDropdownComponent\",\n                        name: \"UAT CATEGORY\",\n                        propertyEditorComponent: false,\n                        stripHTMLValue: Text( LookUp( colBusinessValuesTS, value = 779257).value)\n                    }\n                ]\n            }\n        ),\n       \n        IsBlank(ThisRecord.called_test_case) && !IsBlank( LookUp( ThisRecord.customFieldInfo, Lower(name) = Lower(\"UAT Category\")).value),\n\n        Collect(\n            colEXPSO,\n            {\n                description: ThisRecord.description,\n                expected: ThisRecord.expected,\n                order: ThisRecord.Order,\n                customFieldInfo: ThisRecord.customFieldInfo\n            }\n        ),\n\n        !IsBlank( ThisRecord.called_test_case),\n\n        Collect(\n            colEXPSO,\n            {\n                description: ThisRecord.description,\n                expected: ThisRecord.expected,\n                order: ThisRecord.Order,\n                called_test_case: {\n                    id: ThisRecord.called_test_case.id,\n                    approved: true\n                }, \n                customFieldInfo: \n                [\n                    {\n                        id: TestStepUATCategory,\n                        value: Text( LookUp( colBusinessValuesTS, value = 779257).value),\n                        objectId: 0,\n                        type: \"PropertyDropdownComponent\",\n                        name: \"UAT CATEGORY\",\n                        propertyEditorComponent: false,\n                        stripHTMLValue: Text( LookUp( colBusinessValuesTS, value = 779257).value)\n                    }\n                ]\n            }\n        )\n    )\n);\n\nCollect(\n    colEXPSO,\n    {\n        description: ATCSearchTestCaseGal.Selected.name,\n        expected: \"Look into the called test case.\",\n        order: CountRows(colTestStep) + 1,\n        called_test_case: {\n            id: ATCSearchTestCaseGal.Selected.id,\n            approved: true\n        }, \n        customFieldInfo: \n        [\n            {\n                id: TestStepUATCategory,\n                value: Text( LookUp( colBusinessValuesTS, value = 779257).value),\n                objectId: 0,\n                type: \"PropertyDropdownComponent\",\n                name: \"UAT CATEGORY\",\n                propertyEditorComponent: false,\n                stripHTMLValue: Text( LookUp( colBusinessValuesTS, value = 779257).value)\n            }\n        ]\n    }\n);\n\nIf( IsBlank( LookUp( colTCProperties, field_id = Value( First( colAllTestCaseFieldId).Type)).field_value), Remove( colTCProperties, LookUp( colTCProperties, field_id = Value( First( colAllTestCaseFieldId).Type))));\n\n'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestcase( constProjectInfo.id, gallerySelectedTestcase.id, {properties: colTCProperties, test_steps: colEXPSO});\n\n//'ITS-TCOE_OCTO_UATMain_V1'.ApproveTestcase( constProjectInfo.id, gallerySelectedTestcase.id);\n\nNavigate('Author Test Case Details');\n\nUpdateContext({varAddTestCaseVisiblity: false});\n\nNotify( \"Test case added successfully.\", NotificationType.Success, 4000);\n\nUpdateContext({ showACTCLoadingSpinner: false});"
