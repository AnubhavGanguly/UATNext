                        OnSelect: "=UpdateContext({ showTCDLoadingSpinner: true});\n\n//Set variable to decide network call or back func\nSet(checkUpdateTestCase,true);\n\nClear(colEXPSO);\n\nForAll( \n    colTestStep1,\n\n    If( \n        IsBlank( ThisRecord.called_test_case) && IsBlank( LookUp( ThisRecord.customFieldInfo, true).value),\n\n        Collect( \n            colEXPSO, \n            {\n                id: ThisRecord.id, \n                description: ThisRecord.description, \n                expected: ThisRecord.expected, \n                order: ThisRecord.order,\n                customFieldInfo: [\n                    {\n                        id: TestStepUATCategory,\n                        value: Text( LookUp( colBusinessValuesTS, value = 779257).value),\n                        objectId:ThisRecord.id,\n                        type: \"PropertyDropdownComponent\",\n                        name: \"UAT CATEGORY\",\n                        propertyEditorComponent: false,\n                        stripHTMLValue: Text( LookUp( colBusinessValuesTS, value = 779257).value)\n                    }\n                ]\n            }\n        )\n    );\n\n    If( \n        IsBlank(ThisRecord.called_test_case) && !IsBlank( LookUp( ThisRecord.customFieldInfo, true).value), \n        \n        Collect( \n            colEXPSO, \n            { \n                id: ThisRecord.id, \n                description: ThisRecord.description, \n                expected: ThisRecord.expected, \n                order: ThisRecord.order,\n                customFieldInfo:ThisRecord.customFieldInfo\n            }\n        )\n    ); \n\n    If( \n        !IsBlank(ThisRecord.called_test_case),\n\n        Collect( \n            colEXPSO, \n            {   \n                id:ThisRecord.id,\n                description: ThisRecord.description, \n                expected: ThisRecord.expected,\n                order: ThisRecord.order,\n                called_test_case: { id: ThisRecord.called_test_case.id, approved: true },\n                customFieldInfo: [\n                    {\n                        id: TestStepUATCategory,\n                        value: Text( LookUp( colBusinessValuesTS, value = 779257).value),\n                        objectId:ThisRecord.id,\n                        type: \"PropertyDropdownComponent\",\n                        name: \"UAT CATEGORY\",\n                        propertyEditorComponent: false,\n                        stripHTMLValue: Text( LookUp( colBusinessValuesTS, value = 779257).value)\n                    }\n                ]\n            }\n        )\n    ) \n);\n\nIf( IsBlank( LookUp( colTCProperties, field_id = Value( First( colAllTestCaseFieldId).Type)).field_value), Remove( colTCProperties, LookUp( colTCProperties, field_id = Value( First( colAllTestCaseFieldId).Type))));\n\nUpdateContext({ varUpdatedTestcaseDetails: 'ITS-TCOE_OCTO_UATMain_V1'.UpdateTestcase( constProjectInfo.id, gallerySelectedTestcase.id, {name: TCDTitlevalueTxtinput.Text, description: TCDDescriptionValueTxtInput.Text, precondition: TCDPreconditionValueTxtInput.Text, properties: colTCProperties, test_steps: colEXPSO })});\n\nIf( !IsBlank( LookUp( colUpdatedTestCaseDetail, id = gallerySelectedTestcase.id)), Update( colUpdatedTestCaseDetail, LookUp( colUpdatedTestCaseDetail, id = gallerySelectedTestcase.id), varUpdatedTestcaseDetails),   Collect( colUpdatedTestCaseDetail, varUpdatedTestcaseDetails));\n\nNotify( \"Successfully updated.\", NotificationType.Success, 4000);\n\nClearCollect( colTestStep, AddColumns( 'ITS-TCOE_OCTO_UATMain_V1'.GetTestStep( constProjectInfo.id, gallerySelectedTestcase.id), Order, order));\n\n//ClearCollect( colTestStep, AddColumns( varUpdatedTestcaseDetails.test_steps, Order, order));\n    \nClearCollect( colTestStep1, colTestStep);\n\nClearCollect( colTestCase1, colTestCase);\n\nIf(\n    CountRows(colTraceOfClickTC) = 1,\n\n    ForAll( \n        colTestCase1,\n        \n        UpdateIf( \n            colTestCase, id = LookUp( colUpdatedTestCaseDetail, id = ThisRecord.id).id,\n            {\n                description: LookUp( colUpdatedTestCaseDetail, id = ThisRecord.id).description,\n                id: LookUp( colUpdatedTestCaseDetail, id = ThisRecord.id).id,\n                name: LookUp( colUpdatedTestCaseDetail, id = ThisRecord.id).name,\n                order: LookUp( colUpdatedTestCaseDetail, id = ThisRecord.id).order,\n                parent_id: LookUp( colUpdatedTestCaseDetail, id = ThisRecord.id).parent_id,\n                pid: LookUp( colUpdatedTestCaseDetail, id = ThisRecord.id).pid,\n                properties: LookUp( colUpdatedTestCaseDetail, id = ThisRecord.id).properties\n            }\n        )\n    )\n);\n\nUpdateContext({ showTCDLoadingSpinner: false});\n"
